openapi: "3.1.0"
info:
  title: Anoryx Sentinel API
  version: "1.0.0"
  description: |
    Zero-trust AI gateway. OpenAI-compatible surface.

    SINGLE SOURCE OF TRUTH for all Sentinel API surfaces.
    ONLY the api-architect agent may edit this file (protect-paths hook enforces this).
    Every builder agent CONFORMS to this file — never invents endpoints.

    ## OpenAI compatibility
    Clients change ONE base URL (point an OpenAI SDK at a Sentinel server) and
    nothing else. Request and response bodies on /v1/chat/completions,
    /v1/completions, and /v1/models mirror the OpenAI shapes so existing SDKs work
    unmodified. Sentinel adds a virtual-API-key auth layer and four required
    routing/attribution headers on top of that surface.

    ## The four stable IDs (see contracts/ids.md — LOCKED, IMMUTABLE)
    Every inbound request MUST carry all four identifiers as request headers:
      - X-Anoryx-Tenant-Id   (UUID v4)
      - X-Anoryx-Team-Id     (UUID v4)
      - X-Anoryx-Project-Id  (UUID v4)
      - X-Anoryx-Agent-Id    (lowercase slug; internal Sentinel component name,
                              NOT the end-user AI model name)
    Missing or malformed ANY of the four = 400 Bad Request. These IDs are threaded
    into the request context of every endpoint and propagated onto every outbound
    event (see contracts/events.schema.json).

    ## Authoritative tenant resolution (key→ID binding)
    The four ID headers are NOT trusted as the source of truth. Sentinel resolves
    tenant_id / team_id / project_id AUTHORITATIVELY and SERVER-SIDE from the
    virtual API key's bound scope. The supplied headers are treated as a
    cross-check ONLY: if any of X-Anoryx-Tenant-Id / X-Anoryx-Team-Id /
    X-Anoryx-Project-Id does not match the scope the key is authorized for, the
    request is REJECTED with 403 (`id_context_mismatch`). Headers MAY NEVER widen,
    override, or impersonate a context the key does not already authorize. The
    values propagated onto outbound events and audit logs are always the
    server-resolved values, never the raw client headers.

    ## Fail-safe semantics
    On ANY inspection or policy-evaluation error, Sentinel BLOCKS the request and
    returns a 4xx/5xx error. It never silently passes traffic through on failure.

    ## Request-body bounds (fail-safe sizing)
    The gateway enforces a global maximum request-body size of 1 MiB (1048576
    bytes). Oversized requests are rejected with 400 (or 413 Payload Too Large)
    BEFORE any body parsing or content inspection occurs — size is checked
    fail-safe at the edge so an attacker cannot exhaust inspection resources. Per
    field maxLength / maxItems / maximum constraints in the request schemas below
    are enforced in addition to the global cap. Request bodies set
    `additionalProperties: false`: unknown keys are rejected, never silently
    forwarded to the upstream model.

    ## Streaming fail-safe (SSE)
    A streamed response (`stream: true`) is only complete when it ends with the
    `data: [DONE]` sentinel. Output chunks are inspected BEFORE they are flushed to
    the client. If a mid-stream inspection or policy finding fires, the gateway
    STOPS emitting content chunks and emits a single terminal `event: error` frame
    carrying the standard Error envelope, then closes the stream WITHOUT `[DONE]`.
    On an output-policy denial the final emitted chunk (if any) carries
    `finish_reason: content_filter`. A client that receives a stream which ends
    WITHOUT `data: [DONE]` MUST treat the result as BLOCKED / incomplete, never as a
    successful completion.

    ## Privacy
    Error responses never echo the request body and never contain plaintext PII.
    Correlate issues using the request_id returned on every response.

    Framing in this document is intentionally "audit-ready" and "risk reduction",
    never "compliant" or "blocks all attacks".
servers:
  - url: https://sentinel.anoryx.io/v1
    description: Production
  - url: http://localhost:8000/v1
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: chat
    description: OpenAI-compatible chat completions.
  - name: completions
    description: OpenAI-compatible legacy text completions.
  - name: models
    description: Model discovery.
  - name: observability
    description: |
      Operational observability surface (metrics, health). NOT part of the
      OpenAI-compatible client surface. Operated/scraped by infrastructure, not
      by AI SDK clients.
  - name: compliance
    description: |
      Audit-ready compliance evidence surface (F-011, see
      docs/adr/0013-compliance-evidence-engine.md). NOT part of the
      OpenAI-compatible client surface. Read-only over the tenant's own audit
      trail; tenant-self-service under the existing tenant Bearer scheme (tenant
      is SERVER-RESOLVED from the key — there is NO tenant_id parameter). v1
      frameworks are SOC2 + ISO27001 ONLY. Evidence is metadata (control status,
      event counts, hashes), never payloads/PII/secrets, and every artifact
      carries a disclaimer: it is audit-ready evidence, NOT a certification
      claim. Operator/cross-tenant evidence is out of scope (deferred to F-012).
  - name: audit
    description: |
      Tenant self-service audit-log read surface (F-012a, see
      docs/adr/0014-admin-console-api.md). NOT part of the OpenAI-compatible
      client surface. Read-only over the AUTHENTICATED tenant's OWN events under
      the existing tenant Bearer scheme — the tenant is SERVER-RESOLVED from the
      key and the read runs under the tenant-isolated RLS path, so a request only
      ever sees its own tenant's rows. Keyset cursor pagination on the monotonic
      sequence_number. Metadata only; never payloads, PII, or secrets.
  - name: admin
    description: |
      Operator / admin surface (F-012a, see
      docs/adr/0014-admin-console-api.md). NOT part of the OpenAI-compatible
      client surface and NOT under the tenant Bearer scheme. Authenticated by the
      SEPARATE deploy-injected operator secret `SENTINEL_ADMIN_TOKEN` via the
      `adminAuth` scheme (fail-closed: unset/empty secret → 401 on every
      `/admin/*` route, never a fall-back to tenant scope). This is Sentinel's
      FIRST cross-tenant principal: it manages tenants, mints/rotates/revokes
      virtual keys, reads the audit log across tenants, and thinly controls the
      F-007/F-008/F-009/F-011 engines. Cross-tenant access uses NO new RLS bypass
      — per-target tenant data is read/written inside the target tenant's RLS
      session (one explicitly-named tenant per request); the global tenant
      registry uses the existing break-glass session. Every mutating action and
      every cross-tenant read emits an `admin_*` audit event attributing the act
      to the `admin-console` principal + the TARGET tenant (see
      contracts/events.schema.json, contracts/ids.md). The target tenant is a
      PATH parameter (tenant_id / key_id); it is NEVER taken from a request body.
      v1 is single-operator: no multi-admin, no per-operator attribution, no
      SSO/SAML, no fine-grained RBAC, no frontend (F-012 proper). "audit-ready",
      never "compliant".

paths:
  /chat/completions:
    post:
      tags: [chat]
      operationId: createChatCompletion
      summary: Create a chat completion (OpenAI-compatible)
      description: |
        Proxies an OpenAI-style chat completion through Sentinel's inspection and
        policy path. Set `stream: true` to receive a Server-Sent Events (SSE)
        stream of partial deltas instead of a single JSON body.

        Inbound traffic is inspected (PII, prompt-injection, secret-leak detection)
        and governed by tenant/team/project/agent policy. On any inspection or
        policy error the request is BLOCKED (fail-safe) — never passed through.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/TeamId"
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatCompletionRequest"
      responses:
        "200":
          description: |
            Chat completion result.

            - Non-streaming (`stream` omitted or false): a single
              `ChatCompletionResponse` JSON object (`application/json`).
            - Streaming (`stream: true`): a `text/event-stream` of
              `ChatCompletionChunk` objects, each on a `data:` line, terminated
              by a `data: [DONE]` sentinel.

            Streaming fail-safe: output chunks are inspected BEFORE flush. On a
            mid-stream inspection/policy finding the gateway STOPS sending content
            and emits a single terminal `event: error` frame carrying the `Error`
            envelope, then closes the stream WITHOUT `[DONE]`. On an output-policy
            denial the final emitted chunk carries `finish_reason: content_filter`.
            A stream that ends WITHOUT `data: [DONE]` MUST be treated by the client
            as BLOCKED, never complete. See SSEErrorEvent.
          headers:
            X-RateLimit-Limit:    { $ref: "#/components/headers/XRateLimitLimit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
            X-RateLimit-Reset:    { $ref: "#/components/headers/XRateLimitReset" }
            X-Request-Id:         { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ChatCompletionChunk"
                  - $ref: "#/components/schemas/SSEErrorEvent"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /completions:
    post:
      tags: [completions]
      operationId: createCompletion
      summary: Create a text completion (OpenAI-compatible, legacy)
      description: |
        Proxies an OpenAI-style legacy text completion through Sentinel's
        inspection and policy path. Set `stream: true` for an SSE stream of
        partial deltas. On any inspection or policy error the request is BLOCKED
        (fail-safe) — never passed through.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/TeamId"
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompletionRequest"
      responses:
        "200":
          description: |
            Text completion result.

            - Non-streaming: a single `CompletionResponse` JSON object.
            - Streaming (`stream: true`): a `text/event-stream` of
              `CompletionChunk` objects terminated by `data: [DONE]`.

            Streaming fail-safe: output chunks are inspected BEFORE flush. On a
            mid-stream inspection/policy finding the gateway STOPS sending content
            and emits a single terminal `event: error` frame carrying the `Error`
            envelope, then closes the stream WITHOUT `[DONE]`. On an output-policy
            denial the final emitted chunk carries `finish_reason: content_filter`.
            A stream that ends WITHOUT `data: [DONE]` MUST be treated by the client
            as BLOCKED, never complete. See SSEErrorEvent.
          headers:
            X-RateLimit-Limit:    { $ref: "#/components/headers/XRateLimitLimit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
            X-RateLimit-Reset:    { $ref: "#/components/headers/XRateLimitReset" }
            X-Request-Id:         { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
            text/event-stream:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CompletionChunk"
                  - $ref: "#/components/schemas/SSEErrorEvent"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "413": { $ref: "#/components/responses/PayloadTooLarge" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /models:
    get:
      tags: [models]
      operationId: listModels
      summary: List available models (OpenAI-compatible)
      description: |
        Returns the models the calling virtual API key is permitted to use, after
        tenant/team/project/agent allow-list policy is applied. The list reflects
        policy and may be a subset of upstream provider models.
      parameters:
        - $ref: "#/components/parameters/TenantId"
        - $ref: "#/components/parameters/TeamId"
        - $ref: "#/components/parameters/ProjectId"
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: A list of model objects permitted for this request context.
          headers:
            X-RateLimit-Limit:    { $ref: "#/components/headers/XRateLimitLimit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
            X-RateLimit-Reset:    { $ref: "#/components/headers/XRateLimitReset" }
            X-Request-Id:         { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListModelsResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /metrics:
    get:
      tags: [observability]
      operationId: getMetrics
      summary: Prometheus metrics exposition (operational)
      description: |
        Operational metrics in Prometheus text exposition format, for the
        Prometheus pull/scrape model. This is NOT part of the OpenAI-compatible
        client surface — it is operated by infrastructure, not called by AI SDK
        clients. It is the ONLY new HTTP endpoint added for observability (see
        docs/adr/0011-rate-limiting-observability.md §5).

        UNAUTHENTICATED BY DESIGN. Prometheus scrapes this endpoint anonymously
        (pull model), so the global bearerAuth requirement is overridden to empty
        for this path. Because it carries no auth, this endpoint MUST be
        network-isolated / firewalled in production and never bound to a
        public-facing listener. This is an operational control, not a substitute
        for authentication.

        CONTENT (audit-ready, honest framing): exposes AGGREGATE operational
        metrics only — request counts, latencies, rate-limit decision counts,
        detection/policy counters, and a Redis-health gauge. It contains NO
        secrets, NO virtual API keys, NO prompt or completion content, and NO PII
        (per ADR-0011 §5 / R9). Default label sets are bounded and do NOT grow
        with tenant count. A `tenant_id` label is added to tenant-scoped series
        ONLY when `ENABLE_PER_TENANT_METRICS=true`, and only ever uses the
        server-resolved tenant_id (never a client-supplied header value).
      security: []
      responses:
        "200":
          description: |
            Metrics in Prometheus text exposition format. The body is a sequence
            of `# HELP` / `# TYPE` comment lines followed by sample lines. The
            exact metric set is operational and may evolve; clients MUST parse it
            as Prometheus exposition text, not as a fixed schema.

            CONTENT-TYPE: the response `Content-Type` is the value of
            `prometheus_client.CONTENT_TYPE_LATEST` for the installed client
            version (pinned `prometheus-client>=0.20,<1`) — currently
            `text/plain; version=1.0.0; charset=utf-8`; older clients in range
            emit `version=0.0.4`. The media type below is keyed generically as
            `text/plain` so the contract stays true across the pinned range; rely
            on the actual response header for the exact exposition version rather
            than hard-coding it.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            text/plain:
              schema:
                type: string
                description: |
                  Prometheus text exposition payload (the concrete `version=` is
                  reported in the response Content-Type header). Aggregate
                  operational metrics only; no secrets, keys, content, or PII.

  /compliance/evidence:
    get:
      tags: [compliance]
      operationId: getComplianceEvidence
      summary: Get an audit-ready compliance evidence summary (tenant self-service)
      description: |
        Returns an audit-ready compliance evidence summary for the AUTHENTICATED
        tenant over the window [t0, t1] (F-011, see
        docs/adr/0013-compliance-evidence-engine.md). The summary reports, per
        framework control, a status (passed / gap / not_applicable / not_covered),
        the full gap list, and a readiness score (a transparent ratio =
        passed / applicable, never weighted or inflated).

        AUTH / TENANT SCOPING: authenticated with the existing tenant Bearer
        virtual key (the SAME scheme /chat/completions uses). The tenant is
        SERVER-RESOLVED from the verified key — there is NO `tenant_id` parameter
        and no client-supplied tenant header is trusted as the source of truth.
        The evidence read runs under the tenant-isolated RLS path, so a request
        only ever sees its own tenant's data. Operator/cross-tenant evidence is
        OUT OF SCOPE (deferred to F-012).

        SCOPE: read-only aggregate over the tenant's own audit trail; issues no
        writes to the audit log on the generation path. Evidence is METADATA
        (control status, event counts, hashes) — never payloads, prompt content,
        PII, or secrets. v1 frameworks are SOC2 + ISO27001 ONLY.

        HONEST FRAMING: this is audit-ready evidence for audit preparation, NOT a
        certification or "compliant" claim. Every response carries the
        `disclaimer` field verbatim.
      parameters:
        - name: framework
          in: query
          required: true
          description: |
            Audit framework to summarize. v1 supports SOC2 + ISO27001 ONLY.
          schema:
            type: string
            enum: [SOC2, ISO27001]
          example: SOC2
        - name: t0
          in: query
          required: true
          description: |
            Inclusive start of the evidence window (RFC 3339 / ISO 8601 date-time,
            UTC). Evidence is bounded to [t0, t1]; events outside the window are
            excluded.
          schema:
            type: string
            format: date-time
            maxLength: 64
          example: "2026-01-01T00:00:00Z"
        - name: t1
          in: query
          required: true
          description: |
            Inclusive end of the evidence window (RFC 3339 / ISO 8601 date-time,
            UTC).
          schema:
            type: string
            format: date-time
            maxLength: 64
          example: "2026-04-01T00:00:00Z"
      responses:
        "200":
          description: |
            Audit-ready evidence summary for the authenticated tenant over
            [t0, t1]: per-control status, the gap list, the readiness score, and
            the mandatory disclaimer. Metadata only; no payloads, PII, or secrets.
          headers:
            X-RateLimit-Limit:     { $ref: "#/components/headers/XRateLimitLimit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
            X-RateLimit-Reset:     { $ref: "#/components/headers/XRateLimitReset" }
            X-Request-Id:          { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceEvidenceSummary"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /compliance/export:
    post:
      tags: [compliance]
      operationId: exportCompliancePack
      summary: Export a signed, tamper-evident compliance evidence pack ZIP
      description: |
        Exports a tenant-scoped, ECDSA-signed, tamper-evident compliance evidence
        pack as a ZIP for the AUTHENTICATED tenant over the window [t0, t1]
        (F-011, see docs/adr/0013-compliance-evidence-engine.md). The pack is a
        deterministic, byte-reproducible archive (canonical evidence JSON + a
        detached ES256/JWS signature + the bundled public key + a manifest) so an
        auditor can verify it OFFLINE without live access to Sentinel.

        AUTH / TENANT SCOPING: authenticated with the existing tenant Bearer
        virtual key (the SAME scheme /chat/completions uses). The tenant is
        SERVER-RESOLVED from the verified key — there is NO `tenant_id` parameter
        and no client-supplied tenant header is trusted as the source of truth.
        The exported pack contains only the requester's own tenant data.
        Operator/cross-tenant export is OUT OF SCOPE (deferred to F-012).

        SCOPE: read-only over the tenant's own audit trail for pack content.
        Evidence is METADATA (control status, event counts, hashes) — never
        payloads, prompt content, PII, or secrets. v1 frameworks are SOC2 +
        ISO27001 ONLY.

        HONEST FRAMING: this is audit-ready evidence for audit preparation, NOT a
        certification or "compliant" claim. The bundled manifest carries the
        disclaimer verbatim.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportCompliancePackRequest"
      responses:
        "200":
          description: |
            The signed, tamper-evident evidence pack as a binary ZIP archive
            (`application/zip`). Deterministic: the same
            [tenant, window, framework] inputs produce a byte-identical archive.
            Contains evidence metadata only; no payloads, PII, or secrets.
          headers:
            X-RateLimit-Limit:     { $ref: "#/components/headers/XRateLimitLimit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
            X-RateLimit-Reset:     { $ref: "#/components/headers/XRateLimitReset" }
            X-Request-Id:          { $ref: "#/components/headers/XRequestId" }
          content:
            application/zip:
              schema:
                type: string
                format: binary
                description: |
                  The signed evidence pack ZIP (canonical evidence.json +
                  evidence.json.jws + pubkey.pem + manifest.json). Verifiable
                  offline. Metadata only; never payloads, PII, or secrets.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /audit:
    get:
      tags: [audit]
      operationId: getTenantAuditLog
      summary: Read the authenticated tenant's own audit log (tenant self-service)
      description: |
        Returns a page of the AUTHENTICATED tenant's OWN audit events (F-012a, see
        docs/adr/0014-admin-console-api.md §6). Read-only metadata over the tenant's
        own append-only audit trail; the serving query issues ZERO writes to the
        audit log.

        AUTH / TENANT SCOPING: authenticated with the existing tenant Bearer virtual
        key (the SAME scheme /chat/completions uses). The tenant is SERVER-RESOLVED
        from the verified key — there is NO tenant_id parameter and no client header
        is trusted as the source of truth. The read runs under the tenant-isolated
        RLS path, so a request only ever sees its own tenant's rows.

        PAGINATION: keyset cursor on the monotonic sequence_number (after_sequence +
        bounded limit) — stable under concurrent appends, no offset drift.

        CONTENT: aggregate audit metadata only (event_type, action_taken, the four
        stable IDs, timestamps, sequence_number) — never payloads, prompt content,
        PII, or secrets.
      parameters:
        - $ref: "#/components/parameters/AuditAfterSequence"
        - $ref: "#/components/parameters/AuditLimit"
      responses:
        "200":
          description: |
            A page of the authenticated tenant's own audit events plus the keyset
            cursor for the next page. Metadata only; no payloads, PII, or secrets.
          headers:
            X-RateLimit-Limit:     { $ref: "#/components/headers/XRateLimitLimit" }
            X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
            X-RateLimit-Reset:     { $ref: "#/components/headers/XRateLimitReset" }
            X-Request-Id:          { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/whoami:
    get:
      tags: [admin]
      operationId: adminWhoami
      summary: Return the authenticated admin principal (admin/operator)
      description: |
        Smoke route that proves the admin auth primitive end-to-end (F-012a, ADR-0014):
        reachable ONLY with a valid `SENTINEL_ADMIN_TOKEN` via the `adminAuth` scheme,
        and requires no tenant headers (the tenant middlewares skip the `/admin`
        prefix). Returns the fixed `admin-console` principal slug. No tenant data is
        read or written; emits no audit event.
      security:
        - adminAuth: []
      responses:
        "200":
          description: The authenticated admin principal slug.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminWhoami"
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants:
    post:
      tags: [admin]
      operationId: adminCreateTenant
      summary: Create a tenant (admin/operator)
      description: |
        Creates a tenant in the global tenant registry (F-012a, ADR-0014 §4) via the
        existing break-glass session (the registry is non-RLS-scoped). Emits
        `admin_tenant_created` attributing the act to `admin-console` + the created
        tenant. No hard delete exists anywhere in this surface; lifecycle end is
        soft-deactivate.
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateTenantRequest"
      responses:
        "201":
          description: The created tenant record (registry metadata only).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenant"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }
    get:
      tags: [admin]
      operationId: adminListTenants
      summary: List tenants (admin/operator)
      description: |
        Lists tenant registry records (F-012a, ADR-0014 §4). Registry metadata only;
        no secrets. This is a global-registry read (not tenant-scoped data), so it
        emits no per-target `admin_audit_accessed` event.
      security:
        - adminAuth: []
      responses:
        "200":
          description: A list of tenant registry records (metadata only).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantList"
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}:
    get:
      tags: [admin]
      operationId: adminGetTenant
      summary: Get a tenant by id (admin/operator)
      description: |
        Returns a single tenant registry record (F-012a, ADR-0014 §4). Registry
        metadata only; no secrets.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      responses:
        "200":
          description: The tenant registry record (metadata only).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenant"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/deactivate:
    post:
      tags: [admin]
      operationId: adminDeactivateTenant
      summary: Soft-deactivate a tenant (admin/operator)
      description: |
        Soft-deactivates a tenant by flipping `is_active=false` (F-012a, ADR-0014
        §4). NO hard delete: the append-only audit log and its hash chain are
        untouched and remain verifiable. The tenant's keys are denied at the gateway
        afterward. Emits `admin_tenant_deactivated` attributing the act to
        `admin-console` + the target tenant.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      responses:
        "200":
          description: The updated tenant registry record (is_active=false).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenant"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/keys:
    post:
      tags: [admin]
      operationId: adminMintKey
      summary: Mint a virtual API key for a tenant (admin/operator)
      description: |
        Mints a virtual API key for the target tenant (F-012a, ADR-0014 §5). The
        plaintext secret is generated server-side and returned EXACTLY ONCE in this
        response — it is stored only as an HMAC fingerprint and is never re-readable.
        team/project/agent are supplied in the body and validated to belong to the
        target tenant. Runs inside the target tenant's RLS session. Emits
        `admin_key_minted` carrying the key's real team/project.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminMintKeyRequest"
      responses:
        "201":
          description: |
            The minted key. The plaintext `secret` is present ONCE here and NEVER
            returned again by any endpoint.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMintedKey"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }
    get:
      tags: [admin]
      operationId: adminListKeys
      summary: List a tenant's virtual API keys (admin/operator)
      description: |
        Lists the target tenant's virtual API keys (F-012a, ADR-0014 §5). Returns
        METADATA ONLY (key_id, label, is_active, timestamps) — NEVER the plaintext
        secret or the HMAC fingerprint. Runs inside the target tenant's RLS session;
        a tenant principal can never list another tenant's keys. Emits
        `admin_audit_accessed` (cross-tenant read).
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      responses:
        "200":
          description: A list of key metadata records (no secrets, no fingerprints).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKeyList"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/keys/{key_id}/rotate:
    post:
      tags: [admin]
      operationId: adminRotateKey
      summary: Rotate a virtual API key (immediate-revoke, admin/operator)
      description: |
        Rotates a virtual API key in one transaction (F-012a, ADR-0014 §5):
        IMMEDIATELY revokes the old key and mints a new one with the same scope. The
        new plaintext secret is returned EXACTLY ONCE here; the old key is dead the
        instant the new one mints (smallest exposure window). Runs inside the target
        tenant's RLS session. Emits `admin_key_revoked` (old) + `admin_key_minted`
        (new), each carrying the key's real team/project.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
        - $ref: "#/components/parameters/AdminKeyId"
      responses:
        "201":
          description: |
            The newly minted replacement key. Its plaintext `secret` is present
            ONCE here; the rotated-out key is already revoked.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMintedKey"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/keys/{key_id}/revoke:
    post:
      tags: [admin]
      operationId: adminRevokeKey
      summary: Revoke a virtual API key (admin/operator)
      description: |
        Revokes a virtual API key by deactivating it (F-012a, ADR-0014 §5). The
        gateway denies the key on its next request via the existing is_active=false
        lookup filter. Runs inside the target tenant's RLS session. Emits
        `admin_key_revoked` carrying the key's real team/project.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
        - $ref: "#/components/parameters/AdminKeyId"
      responses:
        "200":
          description: The revoked key's metadata (is_active=false; no secret).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminKeyMetadata"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/audit:
    get:
      tags: [admin]
      operationId: adminGetTenantAuditLog
      summary: Read a target tenant's audit log (admin/operator)
      description: |
        Returns a page of the TARGET tenant's audit events (F-012a, ADR-0014 §6),
        read inside the target tenant's RLS session. The data-serving query issues
        ZERO writes to the audit log; the cross-tenant read itself is recorded by a
        separate, explicit `admin_audit_accessed` append (ADR-0014 §9 R1/R5
        reconciliation). The response honestly surfaces the F-003 chain
        verification result (`chain_verified` / `chain_rows_checked`) — never a
        fabricated "valid". Keyset cursor pagination on sequence_number. Metadata
        only; no payloads, PII, or secrets.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
        - $ref: "#/components/parameters/AuditAfterSequence"
        - $ref: "#/components/parameters/AuditLimit"
      responses:
        "200":
          description: |
            A page of the target tenant's audit events, the keyset cursor, and the
            honestly-surfaced F-003 chain verification status. Metadata only.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditPage"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/config:
    get:
      tags: [admin]
      operationId: adminGetTenantConfig
      summary: View a tenant's routing/engine config (admin/operator)
      description: |
        Returns the target tenant's routing config (classifier_model_id /
        audit_mode / team_rpm_limit) via the existing read path (F-012a, ADR-0014
        §7). Read inside the target tenant's RLS session. Emits
        `admin_audit_accessed` (cross-tenant read).
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      responses:
        "200":
          description: The tenant's current routing/engine config.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantConfig"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }
    patch:
      tags: [admin]
      operationId: adminUpdateTenantConfig
      summary: Adjust a tenant's routing/engine config (admin/operator)
      description: |
        Applies a BOUNDED update to the target tenant's routing config
        (classifier_model_id / audit_mode / team_rpm_limit) — F-012a, ADR-0014 §7.
        The update is validated against the table's EXISTING CHECK constraints
        (classifier_model_id allow-list, audit_mode in {full,redacted},
        team_rpm_limit > 0); it changes config DATA, not classifier/limiter LOGIC.
        Runs inside the target tenant's RLS session. Emits `admin_config_updated`.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateTenantConfigRequest"
      responses:
        "200":
          description: The tenant's config after the bounded update.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantConfig"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/policies:
    get:
      tags: [admin]
      operationId: adminGetTenantPolicies
      summary: View a tenant's policy-intake status (admin/operator)
      description: |
        Returns the target tenant's policy-intake status via the existing
        PolicyRepository read path (F-012a, ADR-0014 §7). READ ONLY — no policy is
        created or modified here. Read inside the target tenant's RLS session.
        Emits `admin_audit_accessed` (cross-tenant read). Policy metadata only; no
        signature/key material.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      responses:
        "200":
          description: The tenant's policy-intake status records (metadata only).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPolicyList"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

  /admin/tenants/{tenant_id}/compliance/evidence:
    post:
      tags: [admin]
      operationId: adminGenerateTenantEvidence
      summary: Generate a target tenant's compliance evidence (admin/operator)
      description: |
        Generates an audit-ready compliance evidence summary for the TARGET tenant
        over [t0, t1] (F-012a, ADR-0014 §7) — the deferred operator path of F-011,
        calling the existing generate_evidence(..., tenant_id=TARGET) engine
        unchanged. Read inside the target tenant's RLS session. Emits
        `admin_audit_accessed` (cross-tenant read). Evidence is METADATA (control
        status, event counts, hashes) — never payloads, PII, or secrets. v1
        frameworks are SOC2 + ISO27001 ONLY. HONEST FRAMING: audit-ready evidence
        for audit preparation, NOT a certification or "compliant" claim — the
        `disclaimer` is carried verbatim.
      security:
        - adminAuth: []
      parameters:
        - $ref: "#/components/parameters/AdminTargetTenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminGenerateEvidenceRequest"
      responses:
        "200":
          description: |
            Audit-ready evidence summary for the target tenant over [t0, t1]: the
            control-status totals, the readiness score, and the mandatory
            disclaimer (a totals projection, not the per-control list). Metadata
            only; no payloads, PII, or secrets.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminTenantEvidenceSummary"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Virtual API key issued by Sentinel, presented as `Authorization: Bearer <key>`.
        The virtual key maps server-side to a vaulted upstream provider credential —
        clients never hold provider keys. A missing, malformed, revoked, or unknown
        key returns 401. A valid key lacking permission for the requested resource
        (model, action, or routing context) returns 403.

        AUTHORITATIVE TENANT BINDING (security-critical): the virtual API key is
        the SOLE source of truth for tenant_id, team_id, and project_id. Sentinel
        resolves these IDs SERVER-SIDE from the scope bound to the key. The
        X-Anoryx-Tenant-Id / X-Anoryx-Team-Id / X-Anoryx-Project-Id request headers
        are a cross-check ONLY and are NEVER trusted as the source of truth. If any
        supplied ID header does not match the key's authorized scope, the request
        is REJECTED with 403 (`id_context_mismatch`) — headers can never widen,
        override, or impersonate a context the key does not already authorize. All
        attribution propagated onto events and audit logs uses the server-resolved
        values, not the raw client headers.

    adminAuth:
      type: http
      scheme: bearer
      description: |
        Operator / admin authentication for the `/admin/*` surface ONLY (F-012a,
        see docs/adr/0014-admin-console-api.md). Presented as
        `Authorization: Bearer <token>` where the token is the deploy-injected
        operator secret `SENTINEL_ADMIN_TOKEN`.

        DISTINCT FROM bearerAuth (security-critical): this is NOT a tenant virtual
        API key. `SENTINEL_ADMIN_TOKEN` is a SINGLE operator secret read at runtime
        from the environment (Vault/KMS-injected at deploy; never in
        code/config/logs/tests). The admin validator compares the presented token
        to this secret with a constant-time compare and validates ONLY against it —
        it NEVER falls through to the virtual-key lookup. A tenant virtual key
        presented on `/admin/*` therefore fails the compare and is rejected with
        401; the admin token presented on a tenant route fails the key lookup. The
        two principals are mutually exclusive by path AND by validator.

        FAIL-CLOSED: if `SENTINEL_ADMIN_TOKEN` is unset/empty, every `/admin/*`
        route returns 401 — there is NO fall-back to tenant scope and NO tenant
        data is ever returned. A missing/malformed header or a mismatched token
        returns 401.

        CROSS-TENANT, AUDITED: this is Sentinel's first cross-tenant principal.
        Cross-tenant access uses no new RLS bypass (per-target reads run under the
        target tenant's RLS session; the global tenant registry uses the existing
        break-glass session). Every mutating action and every cross-tenant read is
        recorded as an `admin_*` audit event attributing the act to the
        `admin-console` principal and the target tenant. v1 is single-operator
        (no multi-admin, no per-operator attribution, no revoke-without-redeploy);
        protect this secret like the F-008 signing key.

  parameters:
    TenantId:
      name: X-Anoryx-Tenant-Id
      in: header
      required: true
      description: |
        Stable tenant identifier (UUID v4). REQUIRED. Missing/malformed = 400.
        CROSS-CHECK ONLY — NOT the source of truth. Sentinel resolves tenant_id
        authoritatively server-side from the virtual API key's scope. If this header
        does not match the key's authorized tenant, the request is REJECTED with 403
        (`id_context_mismatch`). Overlong values (> 64 chars) are rejected at 400.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
    TeamId:
      name: X-Anoryx-Team-Id
      in: header
      required: true
      description: |
        Stable team identifier (UUID v4). REQUIRED. Missing/malformed = 400.
        CROSS-CHECK ONLY — NOT the source of truth. Sentinel resolves team_id
        authoritatively server-side from the virtual API key's scope. If this header
        does not match the key's authorized team, the request is REJECTED with 403
        (`id_context_mismatch`). Overlong values (> 64 chars) are rejected at 400.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "7d9e2f3a-1234-5c6b-8def-0123456789ab"
    ProjectId:
      name: X-Anoryx-Project-Id
      in: header
      required: true
      description: |
        Stable project identifier (UUID v4). REQUIRED. Missing/malformed = 400.
        CROSS-CHECK ONLY — NOT the source of truth. Sentinel resolves project_id
        authoritatively server-side from the virtual API key's scope. If this header
        does not match the key's authorized project, the request is REJECTED with 403
        (`id_context_mismatch`). Overlong values (> 64 chars) are rejected at 400.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "b3c4d5e6-abcd-1234-ef01-234567890abc"
    AgentId:
      name: X-Anoryx-Agent-Id
      in: header
      required: true
      description: |
        Stable agent identifier — a lowercase slug naming the internal Sentinel
        component, NOT the end-user AI model name. REQUIRED. Missing/malformed = 400.
        Validated against the virtual API key's authorized component scope; a value
        outside that scope is REJECTED with 403 (`id_context_mismatch`). Overlong
        values (> 64 chars) are rejected at 400.
      schema:
        type: string
        maxLength: 64
        pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
      example: "gateway-core"

    AdminTargetTenantId:
      name: tenant_id
      in: path
      required: true
      description: |
        The TARGET tenant the admin/operator action applies to (UUID v4). PATH
        parameter — the target is NEVER taken from a request body. Per-tenant data
        is read/written inside this tenant's RLS session (no new RLS bypass). The
        emitted `admin_*` audit event sets `tenant_id` to this value (the tenant
        acted upon), never `WILDCARD_UUID`. Overlong values (> 64 chars) are
        rejected at 400.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"

    AdminKeyId:
      name: key_id
      in: path
      required: true
      description: |
        Identifier of the virtual API key to act on (UUID v4), scoped to the target
        tenant in the path. PATH parameter. The key secret/fingerprint is NEVER
        accepted or returned here; only this id and metadata. Overlong values
        (> 64 chars) are rejected at 400.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "c4d5e6f7-1234-4abc-9def-0123456789ab"

    AuditAfterSequence:
      name: after_sequence
      in: query
      required: false
      description: |
        Keyset cursor: return only events whose monotonic `sequence_number` is
        strictly greater than this value (F-012a, ADR-0014 §6). Omit for the first
        page. Stable under concurrent appends — no offset drift, no deep-scan cost.
      schema:
        type: integer
        minimum: 0
      example: 0

    AuditLimit:
      name: limit
      in: query
      required: false
      description: |
        Maximum number of audit events to return in this page. Bounded to cap
        scan/response cost (fail-safe sizing).
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 100
      example: 100

  headers:
    XRateLimitLimit:
      description: |
        Requests permitted in the current window for this key/context. These
        headers REPORT the limit; enforcement is server-side (see the rate-limiting
        note on the TooManyRequests response). Defaults (Phase 0, overridable by
        Delta policy via contracts/policy.schema.json): 600 requests / 60 s window.
      schema: { type: integer, minimum: 0 }
    XRateLimitRemaining:
      description: Requests remaining in the current window.
      schema: { type: integer, minimum: 0 }
    XRateLimitReset:
      description: Unix epoch seconds when the current rate-limit window resets.
      schema: { type: integer, minimum: 0 }
    XRequestId:
      description: |
        Server-generated correlation id for this request. Use it (not request body
        content) for support and audit correlation. Mirrors `request_id` in error
        bodies.
      schema: { type: string }

  responses:
    BadRequest:
      description: |
        Malformed request. Includes missing or malformed required headers (any of
        the four stable IDs), an overlong ID header (> 64 chars), an invalid or
        out-of-bounds body (exceeding a field maxLength/maxItems/maximum or carrying
        unknown keys), an oversized body (> 1 MiB — may surface as 413 instead), or
        a request the gateway could not safely interpret. Body-size and structural
        checks run BEFORE inspection (fail-safe). Per fail-safe policy, ambiguous
        requests are rejected, not passed through.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: missing_required_header
            message: "A required header is missing or malformed."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    Unauthorized:
      description: Missing, malformed, revoked, or unknown virtual API key.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: invalid_api_key
            message: "Virtual API key is missing, revoked, or invalid."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    AdminUnauthorized:
      description: |
        Admin authentication failed on an `/admin/*` route. Returned when the
        `Authorization: Bearer <token>` header is missing/malformed, the token does
        not match `SENTINEL_ADMIN_TOKEN` (constant-time compare), or the operator
        secret is unset/empty (fail-closed). A tenant virtual key presented here is
        also rejected with 401 — admin and tenant principals never cross. No
        fall-back to tenant scope; no tenant data is returned.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: invalid_api_key
            message: "Virtual API key is missing, revoked, or invalid."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    NotFound:
      description: |
        The addressed resource (tenant_id / key_id path parameter) does not exist or
        is not visible in the addressed scope. The body never echoes request content
        or PII; correlate via request_id.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: invalid_request
            message: "The request body is invalid or violates a field constraint."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    Forbidden:
      description: |
        Authenticated but not permitted. Returned when a policy DENIES the request
        (model not on allow-list, action blocked, budget exceeded), when an
        inspection finding (e.g. detected secret leak or injection) blocks it, or
        when a supplied ID header does not match the scope the virtual API key is
        authorized for (`id_context_mismatch` — the key, not the header, is the
        source of truth for tenant/team/project). This is the fail-safe outcome for
        policy/inspection denials and context-mismatch attempts.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            policyDenied:
              value:
                error_code: policy_blocked
                message: "Request blocked by policy for this tenant/team/project/agent context."
                request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
            contextMismatch:
              value:
                error_code: id_context_mismatch
                message: "Supplied routing context does not match the API key's authorized scope."
                request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    PayloadTooLarge:
      description: |
        Request body exceeds the global maximum size (1 MiB / 1048576 bytes). The
        cap is enforced at the edge BEFORE any body parsing or content inspection
        (fail-safe sizing). Oversized bodies may surface here as 413, or as 400 via
        BadRequest; both outcomes reject before inspection.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: request_too_large
            message: "The request body exceeds the maximum allowed size."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    TooManyRequests:
      description: |
        Rate limit exceeded for this virtual key / request context. Limits are
        ENFORCED server-side (the X-RateLimit-* headers merely report state; they
        are not the control). Phase 0 defaults, overridable per-key/per-tenant by
        Delta policy (contracts/policy.schema.json):
          - 600 requests per 60-second sliding window,
          - scoped BOTH per virtual key AND per server-resolved tenant_id
            (the stricter of the two applies),
          - a maximum of 20 concurrent open streaming (SSE) connections per
            resolved tenant.
        Exhausting the request window OR the concurrent-stream cap returns 429 with
        a Retry-After header indicating when to retry.
      headers:
        X-RateLimit-Limit:    { $ref: "#/components/headers/XRateLimitLimit" }
        X-RateLimit-Remaining: { $ref: "#/components/headers/XRateLimitRemaining" }
        X-RateLimit-Reset:    { $ref: "#/components/headers/XRateLimitReset" }
        Retry-After:
          description: Seconds to wait before retrying.
          schema: { type: integer, minimum: 0 }
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: rate_limit_exceeded
            message: "Rate limit exceeded. Retry after the window resets."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    InternalError:
      description: |
        Unexpected server-side error. Per fail-safe policy, when inspection or
        policy evaluation cannot complete, the request is BLOCKED and a 5xx is
        returned — traffic is never passed through on internal failure. The body
        never contains request content or PII; correlate via request_id.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: internal_error
            message: "An internal error occurred. The request was not processed."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"

  schemas:

    Error:
      type: object
      description: |
        Standard error envelope for all non-2xx responses. Deliberately minimal:
        it carries no request body, no headers, and no PII. `message` is a FIXED
        template string selected SOLELY by `error_code` — there is NO
        request-derived interpolation (no header names, field names, values, or
        body content are ever inserted), so each code maps 1:1 to one stable,
        constant string. Use request_id to correlate with server-side audit logs.
        NOTE: the specific code→message pairing is NOT schema-enforced (error_code
        and message are independent enums), so it MUST be guaranteed by the gateway
        implementation and covered by a unit test.
      required: [error_code, message, request_id]
      additionalProperties: false
      properties:
        error_code:
          type: string
          description: |
            Stable, machine-readable error category. Enumerated so messages map 1:1
            to codes.
          enum:
            - missing_required_header
            - invalid_request
            - request_too_large
            - invalid_api_key
            - id_context_mismatch
            - policy_blocked
            - rate_limit_exceeded
            - internal_error
        message:
          type: string
          description: |
            Fixed, human-readable explanation chosen ONLY by error_code. Constant
            per code; never echoes request content, header names, field names, or
            PII. Enumerated to guarantee no request-derived interpolation.
          maxLength: 200
          enum:
            - "A required header is missing or malformed."
            - "The request body is invalid or violates a field constraint."
            - "The request body exceeds the maximum allowed size."
            - "Virtual API key is missing, revoked, or invalid."
            - "Supplied routing context does not match the API key's authorized scope."
            - "Request blocked by policy for this tenant/team/project/agent context."
            - "Rate limit exceeded. Retry after the window resets."
            - "An internal error occurred. The request was not processed."
        request_id:
          type: string
          description: Correlation id; matches the X-Request-Id response header.
          maxLength: 64

    SSEErrorEvent:
      type: object
      description: |
        Terminal streaming error frame. On any mid-stream inspection or policy
        finding, the gateway STOPS emitting content chunks and emits exactly one
        SSE frame with `event: error` whose `data:` line is this object (the
        standard Error envelope), then closes the stream WITHOUT a `data: [DONE]`
        sentinel. A client MUST treat a stream that ends without `[DONE]` as
        BLOCKED / incomplete, never as a successful completion. This is the
        streaming fail-safe: no further model output is flushed after this frame.
      allOf:
        - $ref: "#/components/schemas/Error"

    ChatMessage:
      type: object
      required: [role, content]
      additionalProperties: false
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          type: string
          maxLength: 131072
          description: |
            Message text. Bounded (131072 chars) in addition to the global 1 MiB
            request-body cap; oversized content is rejected before inspection.
        name:
          type: string
          maxLength: 256

    CreateChatCompletionRequest:
      type: object
      description: |
        Closed schema (additionalProperties: false): only the fields enumerated
        below are accepted. Unknown keys are REJECTED with 400 and never forwarded
        to the upstream model. All requests are additionally bound by the global
        1 MiB request-body cap.
      required: [model, messages]
      additionalProperties: false
      properties:
        model:
          type: string
          maxLength: 256
          description: Upstream model identifier (the end-user AI model name).
        messages:
          type: array
          minItems: 1
          maxItems: 256
          items: { $ref: "#/components/schemas/ChatMessage" }
        stream:
          type: boolean
          default: false
          description: When true, responses are streamed as text/event-stream (SSE).
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        n:
          type: integer
          minimum: 1
          maximum: 8
          default: 1
          description: Number of completions to generate. Bounded to limit fan-out.
        max_tokens:
          type: integer
          minimum: 1
          maximum: 131072
        stop:
          oneOf:
            - type: string
              maxLength: 256
            - type: array
              maxItems: 4
              items:
                type: string
                maxLength: 256
        user:
          type: string
          maxLength: 256
          description: Optional opaque end-user handle. Do not put PII here.

    ChatCompletionChoice:
      type: object
      required: [index, message, finish_reason]
      properties:
        index: { type: integer }
        message: { $ref: "#/components/schemas/ChatMessage" }
        finish_reason:
          type: string
          enum: [stop, length, content_filter, tool_calls]

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: { type: string }
        object:
          type: string
          const: chat.completion
        created:
          type: integer
          description: Unix epoch seconds.
        model: { type: string }
        choices:
          type: array
          items: { $ref: "#/components/schemas/ChatCompletionChoice" }
        usage: { $ref: "#/components/schemas/Usage" }

    ChatCompletionChunkChoice:
      type: object
      required: [index, delta]
      properties:
        index: { type: integer }
        delta:
          type: object
          properties:
            role: { type: string }
            content: { type: string }
        finish_reason:
          type: [string, "null"]
          enum: [stop, length, content_filter, tool_calls, null]

    ChatCompletionChunk:
      type: object
      description: One SSE event in a streamed chat completion (stream=true).
      required: [id, object, created, model, choices]
      properties:
        id: { type: string }
        object:
          type: string
          const: chat.completion.chunk
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items: { $ref: "#/components/schemas/ChatCompletionChunkChoice" }

    CreateCompletionRequest:
      type: object
      description: |
        Closed schema (additionalProperties: false): only the fields enumerated
        below are accepted. Unknown keys are REJECTED with 400 and never forwarded
        to the upstream model. All requests are additionally bound by the global
        1 MiB request-body cap.
      required: [model, prompt]
      additionalProperties: false
      properties:
        model:
          type: string
          maxLength: 256
        prompt:
          oneOf:
            - type: string
              maxLength: 131072
            - type: array
              maxItems: 256
              items:
                type: string
                maxLength: 131072
        stream:
          type: boolean
          default: false
          description: When true, responses are streamed as text/event-stream (SSE).
        temperature:
          type: number
          minimum: 0
          maximum: 2
        top_p:
          type: number
          minimum: 0
          maximum: 1
        n:
          type: integer
          minimum: 1
          maximum: 8
          default: 1
          description: Number of completions to generate. Bounded to limit fan-out.
        max_tokens:
          type: integer
          minimum: 1
          maximum: 131072
        stop:
          oneOf:
            - type: string
              maxLength: 256
            - type: array
              maxItems: 4
              items:
                type: string
                maxLength: 256
        user:
          type: string
          maxLength: 256
          description: Optional opaque end-user handle. Do not put PII here.

    CompletionChoice:
      type: object
      required: [index, text, finish_reason]
      properties:
        index: { type: integer }
        text: { type: string }
        finish_reason:
          type: string
          enum: [stop, length, content_filter]

    CompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: { type: string }
        object:
          type: string
          const: text_completion
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items: { $ref: "#/components/schemas/CompletionChoice" }
        usage: { $ref: "#/components/schemas/Usage" }

    CompletionChunk:
      type: object
      description: One SSE event in a streamed text completion (stream=true).
      required: [id, object, created, model, choices]
      properties:
        id: { type: string }
        object:
          type: string
          const: text_completion
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            required: [index, text]
            properties:
              index: { type: integer }
              text: { type: string }
              finish_reason:
                type: [string, "null"]

    Usage:
      type: object
      description: |
        Token accounting. Any cost figure derived from this is a client-side cost
        estimate, not a billed amount.
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens: { type: integer, minimum: 0 }
        completion_tokens: { type: integer, minimum: 0 }
        total_tokens: { type: integer, minimum: 0 }

    Model:
      type: object
      required: [id, object, created, owned_by]
      properties:
        id: { type: string }
        object:
          type: string
          const: model
        created: { type: integer }
        owned_by: { type: string }

    ListModelsResponse:
      type: object
      required: [object, data]
      properties:
        object:
          type: string
          const: list
        data:
          type: array
          items: { $ref: "#/components/schemas/Model" }

    ComplianceControlStatus:
      type: object
      description: |
        Per-control evidence status within a framework. Status is exactly one of
        passed / gap / not_applicable / not_covered (F-011, ADR-0013 §5). A
        control with no Sentinel mapping is ALWAYS reported `not_covered`, never
        fabricated as coverage.
      required: [control_id, status]
      additionalProperties: false
      properties:
        control_id:
          type: string
          maxLength: 64
          pattern: "^[A-Za-z0-9._-]{1,64}$"
          description: |
            Framework-specific control identifier (e.g. 'CC7.2', 'A.5.30').
            Charset restricted to [A-Za-z0-9._-] to forbid control characters and
            whitespace (log-injection defense).
        title:
          type: string
          maxLength: 256
          description: Human-readable control title from the mapping YAML.
        status:
          type: string
          enum: [passed, gap, not_applicable, not_covered]
          description: |
            Honest control status: `passed` (mapped + evidence in window), `gap`
            (mapped but no evidence in window), `not_applicable` (explicit YAML
            override), `not_covered` (no Sentinel mapping — reported, never faked).
        evidence_event_count:
          type: integer
          minimum: 0
          description: |
            Count of mapped evidence events observed in the window for this
            control. Aggregate metadata only; never event payloads.

    ComplianceEvidenceSummary:
      type: object
      description: |
        Audit-ready compliance evidence summary for the authenticated tenant over
        a window [t0, t1] (F-011, ADR-0013). Read-only metadata: per-control
        status, the gap list, and a transparent readiness ratio. Carries NO
        payloads, prompt content, PII, or secrets. The `disclaimer` field is
        mandatory and present on every response. This is audit-ready evidence for
        audit preparation, NOT a certification or "compliant" claim.
      required:
        - framework
        - framework_version
        - window
        - controls
        - gaps
        - readiness_score
        - disclaimer
      additionalProperties: false
      properties:
        framework:
          type: string
          enum: [SOC2, ISO27001]
          description: Audit framework summarized. v1 supports SOC2 + ISO27001 ONLY.
        framework_version:
          type: string
          maxLength: 64
          pattern: "^[A-Za-z0-9._-]{1,64}$"
          description: |
            Pinned framework mapping version copied verbatim from the
            version-controlled mapping YAML (e.g. '2017-TSC-rev2022').
        window:
          type: object
          description: The evidence window [t0, t1] (inclusive), as supplied.
          required: [t0, t1]
          additionalProperties: false
          properties:
            t0:
              type: string
              format: date-time
              maxLength: 64
              description: Inclusive window start (RFC 3339 / ISO 8601, UTC).
            t1:
              type: string
              format: date-time
              maxLength: 64
              description: Inclusive window end (RFC 3339 / ISO 8601, UTC).
        controls:
          type: array
          description: Per-control evidence status across the framework.
          items: { $ref: "#/components/schemas/ComplianceControlStatus" }
        gaps:
          type: array
          description: |
            Control identifiers reported as `gap` or `not_covered` (the honest gap
            list). Derivable from `controls`; surfaced explicitly so a gap is
            never hidden.
          items:
            type: string
            maxLength: 64
            pattern: "^[A-Za-z0-9._-]{1,64}$"
        readiness_score:
          type: number
          minimum: 0
          maximum: 1
          description: |
            Readiness ratio = passed / applicable (applicable = total minus
            not_applicable). A plain, recomputable ratio in [0,1] — NO weighting,
            NO rounding-up, NO hiding of not_covered controls. Not a certification.
        disclaimer:
          type: string
          maxLength: 256
          description: |
            Mandatory disclaimer carried verbatim on every summary: "Automated
            evidence for audit preparation. Certification requires an accredited
            auditor." Audit-ready, never "compliant".

    ExportCompliancePackRequest:
      type: object
      description: |
        Request body for POST /compliance/export. Closed schema
        (additionalProperties: false): only the fields below are accepted. The
        tenant is SERVER-RESOLVED from the Bearer key — there is intentionally NO
        `tenant_id` field a caller could set to another tenant.
      required: [framework, t0, t1]
      additionalProperties: false
      properties:
        framework:
          type: string
          enum: [SOC2, ISO27001]
          description: Audit framework to export. v1 supports SOC2 + ISO27001 ONLY.
        t0:
          type: string
          format: date-time
          maxLength: 64
          description: Inclusive window start (RFC 3339 / ISO 8601 date-time, UTC).
        t1:
          type: string
          format: date-time
          maxLength: 64
          description: Inclusive window end (RFC 3339 / ISO 8601 date-time, UTC).

    AuditLogEntry:
      type: object
      description: |
        One audit-log row, returned as METADATA ONLY (F-012a, ADR-0014 §6). Carries
        the event classification, the four stable IDs, the correlation id, the
        monotonic sequence_number used as the keyset cursor, and the F-003 chain
        hashes (prev_hash / row_hash) so a reader can independently follow the chain
        OFFLINE (ADR-0014 §6 D5; F-011 precedent — the hashes are integrity metadata,
        exposed BY DESIGN, never secret material). NEVER carries payloads, prompt
        content, PII, or secrets. Built field-for-field from admin.schemas
        .AuditEventResponse; used by BOTH /v1/audit and /admin/tenants/{id}/audit.
      required:
        - sequence_number
        - event_id
        - event_type
        - event_timestamp
        - request_id
        - tenant_id
        - team_id
        - project_id
        - agent_id
        - prev_hash
        - row_hash
      additionalProperties: false
      properties:
        sequence_number:
          type: integer
          minimum: 0
          description: |
            Monotonic per-row sequence number (the keyset pagination cursor). Stable
            and strictly increasing under concurrent appends.
        event_id:
          type: string
          maxLength: 64
          description: Stable per-event identifier of the recorded audit row.
        event_type:
          type: string
          maxLength: 64
          description: |
            The recorded event type (one of the contracts/events.schema.json
            variants). Metadata only.
        event_timestamp:
          type: string
          maxLength: 64
          description: |
            When the event was recorded, as the stored string value (RFC 3339 /
            ISO 8601, UTC). Carried verbatim from the audit row (no re-formatting).
        request_id:
          type: string
          maxLength: 64
          description: Correlation id of the originating request.
        tenant_id:
          type: string
          maxLength: 64
          description: Server-resolved tenant id on the recorded event.
        team_id:
          type: string
          maxLength: 64
          description: Team id on the recorded event (may be WILDCARD_UUID per contracts/ids.md).
        project_id:
          type: string
          maxLength: 64
          description: Project id on the recorded event (may be WILDCARD_UUID per contracts/ids.md).
        agent_id:
          type: string
          maxLength: 64
          description: Internal Sentinel component slug on the recorded event.
        action_taken:
          type: [string, "null"]
          maxLength: 64
          description: |
            The disposition recorded for this event (e.g. 'logged', 'blocked'), or
            null when the recorded event carried no action.
        prev_hash:
          type: string
          maxLength: 128
          description: |
            F-003 hash-chain link to the previous row. Integrity metadata exposed
            BY DESIGN (ADR-0014 §6 D5) so a reader can verify the chain offline;
            never secret material.
        row_hash:
          type: string
          maxLength: 128
          description: |
            F-003 hash of this row. Integrity metadata exposed BY DESIGN (ADR-0014
            §6 D5) for offline chain verification; never secret material.

    AuditPage:
      type: object
      description: |
        A keyset-paginated page of audit events plus the honestly-surfaced F-003
        chain verification status (F-012a, ADR-0014 §6). ONE flat schema (NOT an
        {object, data} envelope) used by BOTH the tenant self-service read
        (GET /v1/audit) and the operator cross-tenant read
        (GET /admin/tenants/{tenant_id}/audit). Built field-for-field from
        admin.schemas.AuditPageResponse. The data-serving query writes zero rows;
        on the admin path the cross-tenant read itself is recorded by a separate
        `admin_audit_accessed` append. Metadata only; no payloads, PII, or secrets.
      required: [events, count, next_cursor, chain_verified, chain_rows_checked]
      additionalProperties: false
      properties:
        events:
          type: array
          maxItems: 200
          items: { $ref: "#/components/schemas/AuditLogEntry" }
          description: This page of audit events (keyset-ordered by sequence_number).
        count:
          type: integer
          minimum: 0
          description: Number of events returned in this page (length of `events`).
        next_cursor:
          type: [integer, "null"]
          minimum: 0
          description: |
            Keyset cursor to pass as `after_sequence` for the next page, or null
            when this is the last page.
        chain_verified:
          type: boolean
          description: |
            Honestly-surfaced F-003 chain verification result (from
            validate_chain()) — whether the verified segment of the audit hash
            chain is intact. Reported as-is, never fabricated as "valid".
        chain_rows_checked:
          type: integer
          minimum: 0
          description: Number of audit rows covered by the chain verification.

    AdminWhoami:
      type: object
      description: |
        Response for GET /admin/whoami (F-012a, ADR-0014). Built field-for-field from
        admin.router.whoami — the authenticated admin principal slug. No tenant data.
      required: [principal]
      additionalProperties: false
      properties:
        principal:
          type: string
          maxLength: 64
          description: |
            The fixed admin principal slug (`admin-console`) — the agent_id attributed
            on every `admin_*` audit event (admin.auth.ADMIN_PRINCIPAL).

    AdminCreateTenantRequest:
      type: object
      description: |
        Request body for POST /admin/tenants (F-012a, ADR-0014 §4). Closed schema.
        There is intentionally NO `tenant_id` field — the id is server-assigned. No
        secret is accepted here.
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          maxLength: 128
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
          description: |
            Stable machine name for the tenant. Charset restricted to forbid control
            characters and whitespace.
        display_name:
          type: string
          maxLength: 256
          description: Optional human-readable display name.

    AdminTenant:
      type: object
      description: |
        A tenant registry record (F-012a, ADR-0014 §4). Registry metadata only; no
        secrets. Soft-deactivate is represented by `is_active=false` — there is no
        hard-delete state. Built field-for-field from admin.schemas.TenantResponse.
      required: [tenant_id, name, display_name, is_active, created_at, updated_at]
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          maxLength: 64
          description: Server-assigned stable tenant id (UUID v4).
        name:
          type: string
          maxLength: 128
        display_name:
          type: [string, "null"]
          maxLength: 256
          description: Optional human-readable display name; null when unset.
        is_active:
          type: boolean
          description: |
            Whether the tenant is active. Soft-deactivate flips this to false; the
            audit log and hash chain are never deleted.
        created_at:
          type: string
          format: date-time
          maxLength: 64
        updated_at:
          type: string
          format: date-time
          maxLength: 64

    AdminTenantList:
      type: object
      description: |
        A list of tenant registry records (F-012a, ADR-0014 §4). FLAT shape (NOT an
        {object, data} envelope) — built field-for-field from
        admin.schemas.TenantListResponse. Metadata only.
      required: [tenants, count]
      additionalProperties: false
      properties:
        tenants:
          type: array
          items: { $ref: "#/components/schemas/AdminTenant" }
        count:
          type: integer
          minimum: 0
          description: Number of tenant records returned (length of `tenants`).

    AdminMintKeyRequest:
      type: object
      description: |
        Request body for POST /admin/tenants/{tenant_id}/keys (F-012a, ADR-0014 §5).
        Closed schema. The target tenant is the PATH parameter — there is NO
        `tenant_id` field here. team/project/agent scope the minted key and are
        validated to belong to the target tenant. No secret is accepted (the plaintext
        is generated server-side and returned once).
      required: [team_id, project_id, agent_id]
      additionalProperties: false
      properties:
        team_id:
          type: string
          format: uuid
          maxLength: 64
          description: Team the key is scoped to (must belong to the target tenant).
        project_id:
          type: string
          format: uuid
          maxLength: 64
          description: Project the key is scoped to (must belong to the target tenant).
        agent_id:
          type: string
          maxLength: 64
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: Internal Sentinel component slug the key is scoped to.
        label:
          type: string
          maxLength: 256
          description: Optional human-readable label for the key.
        expires_at:
          type: string
          format: date-time
          description: Optional expiry (RFC 3339 / ISO 8601 date-time, UTC).

    AdminKeyMetadata:
      type: object
      description: |
        Virtual API key METADATA (F-012a, ADR-0014 §5). NEVER carries the plaintext
        secret or the HMAC fingerprint — only the id, scope, label, and lifecycle
        timestamps. Built field-for-field from admin.schemas.KeyResponse; the nullable
        fields (label / expires_at / last_used_at) are present-but-null when unset.
      required: [key_id, tenant_id, team_id, project_id, agent_id, label, is_active, created_at, expires_at, last_used_at]
      additionalProperties: false
      properties:
        key_id:
          type: string
          maxLength: 64
        tenant_id:
          type: string
          maxLength: 64
        team_id:
          type: string
          maxLength: 64
        project_id:
          type: string
          maxLength: 64
        agent_id:
          type: string
          maxLength: 64
        label:
          type: [string, "null"]
          maxLength: 256
          description: Optional human-readable label; null when unset.
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          maxLength: 64
        expires_at:
          type: [string, "null"]
          format: date-time
          maxLength: 64
          description: Optional expiry (RFC 3339 / ISO 8601, UTC); null when none.
        last_used_at:
          type: [string, "null"]
          format: date-time
          maxLength: 64
          description: Last-use timestamp; null when the key has not been used.

    AdminMintedKey:
      type: object
      description: |
        Response for mint and rotate (F-012a, ADR-0014 §5). Carries the key metadata
        PLUS the plaintext `secret` EXACTLY ONCE — this is the only place and only
        time the secret is ever returned. It is stored server-side only as an HMAC
        fingerprint and is never re-readable. Built field-for-field from
        admin.schemas.KeyMintResponse (the plaintext field is named `secret`). Treat
        the response as sensitive.
      required: [secret, key]
      additionalProperties: false
      properties:
        secret:
          type: string
          maxLength: 256
          description: |
            The plaintext virtual API key. Returned ONCE on mint/rotate and NEVER
            again by any endpoint. Surface it to the operator immediately; it cannot
            be recovered later.
        key:
          $ref: "#/components/schemas/AdminKeyMetadata"

    AdminKeyList:
      type: object
      description: |
        A list of virtual API key metadata records for a tenant (F-012a, ADR-0014
        §5). FLAT shape (NOT an {object, data} envelope) — built field-for-field from
        admin.schemas.KeyListResponse. Metadata only — never the plaintext secret or
        the fingerprint.
      required: [keys, count]
      additionalProperties: false
      properties:
        keys:
          type: array
          items: { $ref: "#/components/schemas/AdminKeyMetadata" }
        count:
          type: integer
          minimum: 0
          description: Number of key records returned (length of `keys`).

    AdminTenantConfig:
      type: object
      description: |
        A target tenant's routing/engine config (F-012a, ADR-0014 §7), reflecting the
        tenant_routing_policy row. Built field-for-field from
        admin.schemas.ConfigResponse. `configured` is false (and the three config
        fields are null) when no routing-policy row exists for the tenant. Config
        data only — never classifier/limiter logic.
      required: [tenant_id, classifier_model_id, audit_mode, team_rpm_limit, configured]
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          maxLength: 64
        classifier_model_id:
          type: [string, "null"]
          maxLength: 128
          description: |
            The configured judge/classifier model id (F-007), or null when unset.
            Constrained to the table's allow-list CHECK constraint when set.
        audit_mode:
          type: [string, "null"]
          maxLength: 16
          description: |
            Audit-evidence mode (F-007), or null when unset. Constrained to
            {full, redacted} by the table's CHECK constraint when set.
        team_rpm_limit:
          type: [integer, "null"]
          description: |
            Per-team requests-per-minute limit (F-009), or null when unset.
            Constrained to > 0 by the table's CHECK constraint when set.
        configured:
          type: boolean
          description: |
            False (with the three fields null) when no tenant_routing_policy row
            exists for the tenant; true when a row was found.

    AdminUpdateTenantConfigRequest:
      type: object
      description: |
        Request body for PATCH /admin/tenants/{tenant_id}/config (F-012a, ADR-0014
        §7). Closed schema (extra='forbid'); partial update — only the supplied
        fields (model_fields_set) are changed. Each value is validated against the
        tenant_routing_policy table's EXISTING CHECK constraints (config data only,
        no engine logic). The target tenant is the PATH parameter — there is NO
        `tenant_id` field here. Field-for-field from admin.schemas
        .ConfigUpdateRequest. An empty body (no fields) is rejected by the route with
        400 (`no_fields`).
      additionalProperties: false
      properties:
        classifier_model_id:
          type: string
          maxLength: 128
          description: |
            New classifier model id. Validated against the table's allow-list CHECK
            constraint; a value outside the allow-list is rejected with 400.
        audit_mode:
          type: string
          maxLength: 16
          enum: [full, redacted]
          description: New audit mode. Constrained to {full, redacted}.
        team_rpm_limit:
          type: integer
          minimum: 1
          description: New per-team RPM limit. Must be > 0 (table CHECK constraint).

    AdminPolicyStatus:
      type: object
      description: |
        One policy-intake status record for the target tenant (F-012a, ADR-0014 §7),
        from PolicyRepository read. Built field-for-field from
        admin.schemas.PolicyResponse. Metadata only — never signature or key material.
      required:
        - policy_id
        - policy_type
        - current_version
        - effective_from
        - team_id
        - project_id
        - agent_id
        - created_at
      additionalProperties: false
      properties:
        policy_id:
          type: string
          maxLength: 64
          description: Identifier of the policy; joins to contracts/policy.schema.json policy_id.
        policy_type:
          type: string
          maxLength: 64
          description: The policy type/category (e.g. budget, model allow-list).
        current_version:
          type: integer
          minimum: 0
          description: |
            The stored current policy version (replay/rollback defense uses strict
            monotonicity).
        effective_from:
          type: string
          format: date-time
          maxLength: 64
          description: When this policy version became effective (RFC 3339 / ISO 8601, UTC).
        team_id:
          type: string
          maxLength: 64
          description: Team scope of the policy (may be WILDCARD_UUID per contracts/ids.md).
        project_id:
          type: string
          maxLength: 64
          description: Project scope of the policy (may be WILDCARD_UUID per contracts/ids.md).
        agent_id:
          type: string
          maxLength: 64
          description: Agent/component scope of the policy.
        created_at:
          type: string
          format: date-time
          maxLength: 64
          description: When this policy record was created (RFC 3339 / ISO 8601, UTC).

    AdminPolicyList:
      type: object
      description: |
        A list of policy-intake status records for a tenant (F-012a, ADR-0014 §7).
        FLAT shape (NOT an {object, data} envelope) — built field-for-field from
        admin.schemas.PolicyListResponse. Read-only metadata; no signature/key
        material.
      required: [policies, count]
      additionalProperties: false
      properties:
        policies:
          type: array
          items: { $ref: "#/components/schemas/AdminPolicyStatus" }
        count:
          type: integer
          minimum: 0
          description: Number of policy records returned (length of `policies`).

    AdminGenerateEvidenceRequest:
      type: object
      description: |
        Request body for POST /admin/tenants/{tenant_id}/compliance/evidence (F-012a,
        ADR-0014 §7) — the F-011 operator path. Closed schema (extra='forbid'). The
        target tenant is the PATH parameter — there is NO `tenant_id` field here.
        Built field-for-field from admin.schemas.OperatorEvidenceRequest. v1
        frameworks are SOC2 + ISO27001 ONLY.
      required: [framework, t0, t1]
      additionalProperties: false
      properties:
        framework:
          type: string
          enum: [SOC2, ISO27001]
          description: Audit framework to summarize. v1 supports SOC2 + ISO27001 ONLY.
        t0:
          type: string
          format: date-time
          description: Inclusive window start (RFC 3339 / ISO 8601 date-time, UTC).
        t1:
          type: string
          format: date-time
          description: Inclusive window end (RFC 3339 / ISO 8601 date-time, UTC).

    AdminTenantEvidenceSummary:
      type: object
      description: |
        Audit-ready compliance evidence summary for a TARGET tenant over a window
        [t0, t1], returned by the F-011 operator path
        (POST /admin/tenants/{tenant_id}/compliance/evidence, F-012a ADR-0014 §7).
        Built field-for-field from admin.control.operator_generate_evidence — this is
        a TOTALS-and-readiness projection (NOT the tenant-self-service
        ComplianceEvidenceSummary, which carries the per-control list). Aggregate
        metadata only: control-status counts and a transparent readiness ratio —
        never payloads, prompt content, PII, or secrets. The `disclaimer` is carried
        verbatim: audit-ready evidence for audit preparation, NOT a certification or
        "compliant" claim.
      required:
        - tenant_id
        - framework
        - framework_version
        - window
        - readiness_score
        - totals
        - disclaimer
      additionalProperties: false
      properties:
        tenant_id:
          type: string
          maxLength: 64
          description: The TARGET tenant the evidence was generated for (path parameter).
        framework:
          type: string
          enum: [SOC2, ISO27001]
          description: Audit framework summarized. v1 supports SOC2 + ISO27001 ONLY.
        framework_version:
          type: string
          maxLength: 64
          description: |
            Pinned framework mapping version copied verbatim from the
            version-controlled mapping YAML (e.g. '2017-TSC-rev2022').
        window:
          type: object
          description: The evidence window [t0, t1] (inclusive), echoed as supplied.
          required: [t0, t1]
          additionalProperties: false
          properties:
            t0:
              type: string
              maxLength: 64
              description: Inclusive window start as supplied (RFC 3339 / ISO 8601, UTC).
            t1:
              type: string
              maxLength: 64
              description: Inclusive window end as supplied (RFC 3339 / ISO 8601, UTC).
        readiness_score:
          type: number
          minimum: 0
          maximum: 1
          description: |
            Readiness ratio = passed / applicable (applicable = total minus
            not_applicable). A plain, recomputable ratio in [0,1] — NO weighting,
            NO rounding-up, NO hiding of not_covered controls. Not a certification.
        totals:
          type: object
          description: Aggregate control-status counts across the framework.
          required: [total, passed, gap, not_applicable, not_covered, applicable]
          additionalProperties: false
          properties:
            total:
              type: integer
              minimum: 0
              description: Total number of controls in the framework mapping.
            passed:
              type: integer
              minimum: 0
              description: Controls mapped with evidence in the window.
            gap:
              type: integer
              minimum: 0
              description: Controls mapped but with no evidence in the window.
            not_applicable:
              type: integer
              minimum: 0
              description: Controls marked not-applicable by explicit YAML override.
            not_covered:
              type: integer
              minimum: 0
              description: Controls with no Sentinel mapping (reported, never faked).
            applicable:
              type: integer
              minimum: 0
              description: total minus not_applicable (the readiness denominator).
        disclaimer:
          type: string
          maxLength: 256
          description: |
            Mandatory disclaimer carried verbatim: "Automated evidence for audit
            preparation. Certification requires an accredited auditor." Audit-ready,
            never "compliant".
