[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anoryx-sentinel"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115", "uvicorn[standard]>=0.30", "claude-agent-sdk",
    "presidio-analyzer>=2.2", "presidio-anonymizer>=2.2", "spacy>=3.7",
    "opa-python-client>=1.3", "asyncpg>=0.29", "redis>=5.0", "arq>=0.26",
    "boto3>=1.34", "python-jose[cryptography]>=3.3", "httpx>=0.27",
    "structlog>=24", "opentelemetry-api>=1.24", "opentelemetry-sdk>=1.24",
    "pydantic>=2.7", "pydantic-settings>=2.3", "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4", "black>=24", "pytest>=8", "pytest-asyncio>=0.23",
    "pytest-cov>=5", "httpx", "semgrep", "hypothesis>=6",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "B", "I", "S"]
# S603/S607: subprocess calls with literal command lists are not a
# security risk in our orchestrator (we control all inputs; git/gh/
# pytest are trusted, pinned dev dependencies).
# S110: best-effort cleanup paths intentionally swallow exceptions —
# logging would mask the original SDK exception we want to propagate.
ignore = ["S603", "S607", "S110"]

[tool.ruff.lint.per-file-ignores]
# Tests use assert as their core assertion mechanism; S101 doesn't apply.
"tests/**/*.py" = ["S101"]

[tool.black]
target-version = ["py312"]
line-length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
fail_under = 80
