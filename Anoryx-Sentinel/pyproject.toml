[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "anoryx-sentinel"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115,<1",
    "uvicorn[standard]>=0.30,<1",
    "claude-agent-sdk",
    "presidio-analyzer>=2.2,<3",
    "presidio-anonymizer>=2.2,<3",
    "spacy>=3.7,<4",
    "opa-python-client>=1.3,<2",
    # asyncpg: required by SQLAlchemy async engine (postgresql+asyncpg://).
    "asyncpg>=0.29,<1",
    "redis>=5.0,<6",
    "arq>=0.26,<1",
    "boto3>=1.34,<2",
    "python-jose[cryptography]>=3.3,<4",
    "httpx>=0.27,<1",
    "structlog>=24,<26",
    "opentelemetry-api>=1.24,<2",
    "opentelemetry-sdk>=1.24,<2",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.3,<3",
    "pyyaml>=6.0,<7",
    # SQLAlchemy 2.x async API (stream_scalars, async_sessionmaker, etc.).
    "sqlalchemy>=2.0,<3",
    "alembic>=1.13,<2",
    # psycopg (v3): used by Alembic migrations (sync connection).
    "psycopg[binary]>=3.1,<4",
    # argon2-cffi: Argon2id password hashing per OWASP recommendation.
    "argon2-cffi>=23,<25",
    "python-dotenv>=1.0,<2",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4,<1",
    "black>=24,<26",
    "pytest>=8,<9",
    "pytest-asyncio>=0.23,<1",
    "pytest-cov>=5,<7",
    "pytest-httpx>=0.30,<1",
    "httpx",
    "semgrep",
    "hypothesis>=6,<7",
    # jsonschema: used by gateway contract tests to validate events.schema.json
    "jsonschema[format]>=4.22,<5",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "B", "I", "S"]
# S603/S607: subprocess calls with literal command lists are not a
# security risk in our orchestrator (we control all inputs; git/gh/
# pytest are trusted, pinned dev dependencies).
# S110: best-effort cleanup paths intentionally swallow exceptions —
# logging would mask the original SDK exception we want to propagate.
ignore = ["S603", "S607", "S110"]

[tool.ruff.lint.per-file-ignores]
# Tests use assert as their core assertion mechanism; S101 doesn't apply.
"tests/**/*.py" = ["S101"]

[tool.black]
target-version = ["py312"]
line-length = 100

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests (require live DB and migrations)",
]

[tool.coverage.run]
source = ["src"]
branch = true

[tool.coverage.report]
fail_under = 80
