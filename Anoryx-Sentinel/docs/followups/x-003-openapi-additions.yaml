# ── (D) SCHEMAS: insert immediately BEFORE the line `    AdminPolicyStatus:` ──
    SignedPolicyRecord:
      type: object
      description: |
        A Delta/Orchestrator-signed policy record — the SAME shape
        `sentinel-cli policy push` feeds into `intake_policy()` and the SAME bytes
        Orchestrator's O-004 distribution engine POSTs here (F-008, ADR-0009;
        ADR-0042). NOT re-invented: the AUTHORITATIVE, closed shape is
        contracts/policy.schema.json (`sentinel:policy:v1`) — a Draft 2020-12 `oneOf`
        over the six closed policy variants (budget_limit, model_allowlist,
        model_denylist, model_approval, code_scan, data_lock), each
        additionalProperties:false with its own enforcement fields. This OpenAPI
        schema documents the common SIGNED ENVELOPE (the eight signature-covered
        fields + the compact-JWS `signature`) only; `additionalProperties: true` here
        carries the per-variant enforcement fields, which `intake_policy()`
        RE-VALIDATES against the full closed sentinel:policy:v1 schema — the endpoint
        relaxes nothing (a record that fails that closed validation is rejected 422).
        The body IDs are a cross-check ONLY: the authoritative scope is resolved
        server-side from the verified signature and can never widen or impersonate a
        scope the signature does not authorize.
      required:
        - policy_type
        - tenant_id
        - team_id
        - project_id
        - agent_id
        - policy_id
        - policy_version
        - effective_from
        - signature
      additionalProperties: true
      properties:
        policy_type:
          type: string
          maxLength: 64
          description: |
            Variant discriminator; MUST be one of the six sentinel:policy:v1 types
            (budget_limit, model_allowlist, model_denylist, model_approval, code_scan,
            data_lock). Signature-covered; cross-checked against the body.
        tenant_id:
          type: string
          format: uuid
          maxLength: 64
          description: |
            Cross-check ONLY (never the wildcard — rejected as scope mismatch). The
            authoritative tenant is resolved from the verified signature.
        team_id:
          type: string
          format: uuid
          maxLength: 64
          description: Cross-check only; authoritative scope resolved from the signature.
        project_id:
          type: string
          format: uuid
          maxLength: 64
          description: Cross-check only; authoritative scope resolved from the signature.
        agent_id:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          maxLength: 64
          description: Cross-check only; authoritative scope resolved from the signature.
        policy_id:
          type: string
          format: uuid
          maxLength: 64
          description: Stable policy identifier; the monotonicity target key for replay defense.
        policy_version:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: |
            Monotonic per policy_id. Rejected (409, policy_intake_replay_rejected) if
            not strictly greater than the stored version for the same policy_id.
        effective_from:
          type: string
          format: date-time
          maxLength: 64
          description: When this policy begins to apply (RFC 3339 / ISO 8601, UTC).
        signature:
          type: string
          minLength: 16
          maxLength: 4096
          pattern: "^[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+$"
          description: |
            Compact-JWS (ES256) signature over the record, produced by
            Delta/Orchestrator. Schema guards PRESENCE + FORMAT only; cryptographic
            validity, the authoritative scope claims, and the full-record content hash
            are verified at runtime inside intake_policy() (a well-formed but
            invalid/forged signature is rejected 403, never accepted).

    AdminPolicyIntakeAccepted:
      type: object
      description: |
        Result of a successful policy intake (IntakeResult.Accepted): the signed
        policy verified, its scope resolved from the signature, its version was
        strictly newer than the stored version, and it was persisted + audited
        atomically. Metadata only — never signature bytes, key material, or the
        enforcement body. Built field-for-field from policy.results.Accepted.
      required: [status, policy_id, policy_version, policy_type]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [accepted]
          description: Fixed discriminator for the accepted outcome.
        policy_id:
          type: string
          maxLength: 64
          description: Identifier of the accepted policy (joins to contracts/policy.schema.json policy_id).
        policy_version:
          type: integer
          minimum: 1
          description: The stored version now in force for this policy_id.
        policy_type:
          type: string
          maxLength: 64
          description: The accepted policy's type (one of the sentinel:policy:v1 variants).
