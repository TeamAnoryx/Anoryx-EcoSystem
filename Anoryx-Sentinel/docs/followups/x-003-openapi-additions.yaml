# Ready-to-apply additions to Anoryx-Sentinel/contracts/openapi.yaml (X-003 / ADR-0042).
# Blocked from direct write: protect-paths hook did not receive ANORYX_ACTIVE_AGENT=api-architect.
# Four insertions, each with a unique anchor already present in the file.

# ── (A) PATH: insert immediately BEFORE the line `  /admin/tenants/{tenant_id}/models:` ──
  /admin/policies/intake:
    post:
      tags: [admin]
      operationId: adminIntakePolicy
      summary: Intake a signed policy over the wire (admin/operator)
      description: |
        Accepts a Delta/Orchestrator-signed policy record pushed DOWN into Sentinel
        over the wire and hands it UNCHANGED to the existing fail-closed
        `intake_policy()` pipeline (F-008, ADR-0009 §3; ADR-0042). This route is a
        THIN ingress wrapper: it adds an authenticated HTTP entry point for the SAME
        function `sentinel-cli policy push` already calls, and bypasses NONE of its
        checks. Every record still runs the full pipeline — Draft 2020-12 schema
        validation, ES256 compact-JWS signature verification, scope-resolve-and-
        reject (the VERIFIED signature is the authoritative scope; the body IDs are a
        cross-check only and can never widen scope), a full-record content-hash
        integrity check, and intake-time replay/rollback rejection — and a
        hash-chained audit event is emitted on EVERY path, including every rejection.
        The body IDs are NOT trusted: an unsigned, forged, tampered, or replayed
        record is rejected here exactly as on the CLI path (the route adds ingress,
        not trust). The target tenant is resolved SERVER-SIDE from the verified
        signature — there is NO tenant_id path parameter and the wildcard tenant is
        rejected. Closes the X-003 budget-enforcement loop over the wire (Delta cap
        breach → Orchestrator O-004 distribution → this route → enforcement on the
        next request). This route REVERSES ADR-0009 §11's R1 "internal-only, no HTTP
        endpoint" decision; see ADR-0042 for the reconciliation and threat model. As
        a new ingress path into a zero-trust product's policy store, it still
        warrants human security sign-off before merge.
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignedPolicyRecord"
      responses:
        "200":
          description: |
            The signed policy verified, its scope resolved from the signature, it was
            version-fresh, and it was persisted + audited atomically
            (IntakeResult.Accepted).
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPolicyIntakeAccepted"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/AdminUnauthorized" }
        "403": { $ref: "#/components/responses/PolicyIntakeSignatureRejected" }
        "409": { $ref: "#/components/responses/PolicyIntakeConflict" }
        "422": { $ref: "#/components/responses/PolicyIntakeSchemaRejected" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalError" }

# ── (B) RESPONSES: insert immediately BEFORE the line `    SsoUnavailable:` ──
    PolicyIntakeSchemaRejected:
      description: |
        The signed policy record failed Draft 2020-12 schema validation, or was
        unparseable / oversized (IntakeResult.RejectedSchema). Transport auth passed,
        but the policy shape violates contracts/policy.schema.json
        (sentinel:policy:v1). No policy is persisted; a rejection audit event is still
        emitted. The body never echoes record content or PII; correlate via request_id.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: policy_intake_schema_rejected
            message: "The signed policy record failed schema validation."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    PolicyIntakeSignatureRejected:
      description: |
        The signed policy's signature could not be verified
        (IntakeResult.RejectedSignature): the compact-JWS signature was absent,
        malformed, wrong-algorithm, did not verify, or no verifying key is configured
        (fail-closed). Distinct from 401 (transport auth): the admin bearer was valid
        but the RECORD's signature was not. No policy is persisted; a rejection audit
        event is still emitted. The body never echoes signature bytes, key material,
        or record content; correlate via request_id.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error_code: policy_intake_signature_rejected
            message: "The signed policy record signature could not be verified."
            request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
    PolicyIntakeConflict:
      description: |
        The signed policy conflicts with Sentinel's authoritative state and was
        rejected WITHOUT persistence. TWO distinct causes, distinguished by
        error_code:
          - `policy_intake_scope_mismatch` (IntakeResult.RejectedScopeMismatch): the
            VERIFIED signature scope disagrees with the record body, the record claims
            the forbidden wildcard tenant, or the body content hash does not match the
            signed hash (post-signing tamper). Body IDs can never widen the
            signature-resolved scope.
          - `policy_intake_replay_rejected` (IntakeResult.RejectedReplay):
            policy_version is not strictly greater than the stored version for this
            policy_id (replay/rollback defense) — an older signed policy cannot roll
            enforcement back.
        No policy is persisted on either path; a rejection audit event is still
        emitted. The body never echoes disputed IDs, signature bytes, or record
        content (raw disputed IDs go only to request_id-keyed structured logs);
        correlate via request_id.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          examples:
            scopeMismatch:
              value:
                error_code: policy_intake_scope_mismatch
                message: "The signed policy scope does not match the record body."
                request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"
            replayRejected:
              value:
                error_code: policy_intake_replay_rejected
                message: "The policy version is not newer than the stored version (replay/rollback)."
                request_id: "req_01HZX9Q2K3T4V5W6X7Y8Z9A0B1"

# ── (C) Error.error_code enum: add after the `- invalid_model_transition` line ──
            - policy_intake_schema_rejected
            - policy_intake_signature_rejected
            - policy_intake_scope_mismatch
            - policy_intake_replay_rejected

# ── (C) Error.message enum: add after `- "The requested model-approval transition is not allowed."` ──
            - "The signed policy record failed schema validation."
            - "The signed policy record signature could not be verified."
            - "The signed policy scope does not match the record body."
