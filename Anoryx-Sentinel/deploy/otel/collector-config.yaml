# OpenTelemetry Collector config — Anoryx Sentinel (F-010, ADR-0012 §5).
#
# Default posture (OTel export = β): receive OTLP from the gateway and export to
# the collector's stdout via the `debug` exporter (the current name for the old
# `logging` exporter). NO external backend is wired by default — traces/metrics
# "flow" into the collector log so the pipeline is provably working, but nothing
# is shipped off-box until you add an exporter. Backend examples (Jaeger, Tempo,
# Honeycomb, Datadog) are in deploy/otel/README.md.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # memory_limiter MUST be first in each pipeline — it drops data under memory
  # pressure before the batch processor buffers it (standard production order).
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # `debug` writes received telemetry to the collector's stdout. This is the
  # ONLY default exporter (no backend wired). To add a backend, declare it here
  # and reference it in service.pipelines below — see deploy/otel/README.md.
  # TODO(F-010.2): `normal` verbosity is noisy at high request volume — lower to
  # `basic` or wire a real backend for production (code-review Low).
  debug:
    verbosity: normal
  # --- Example backends (commented; uncomment + configure, then add to a
  #     pipeline's `exporters` list) -------------------------------------------
  # otlp/jaeger:
  #   endpoint: jaeger:4317
  #   tls: { insecure: true }
  # otlp/tempo:
  #   endpoint: tempo:4317
  #   tls: { insecure: true }
  # otlp/honeycomb:
  #   endpoint: api.honeycomb.io:443
  #   headers: { "x-honeycomb-team": "${env:HONEYCOMB_API_KEY}" }
  # datadog:
  #   api: { key: "${env:DD_API_KEY}", site: "datadoghq.com" }

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]   # add e.g. otlp/jaeger here to ship traces to a backend
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
