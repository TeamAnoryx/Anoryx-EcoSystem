# Anoryx Sentinel Helm values (F-010, ADR-0012).
#
# Production checklist (see deploy/SELF_HOST.md):
#   - Set postgres.bundled=false / redis.bundled=false → point at managed services.
#   - Pre-create the envSecret (DATABASE_URL, APP_DATABASE_URL, REDIS_URL,
#     SENTINEL_KEY_SECRET, UPSTREAM_BASE_URL, provider keys) and set envSecret below.
#   - Wire ingress + TLS (cert-manager) at your edge.

image:
  repository: ghcr.io/teamanoryx/anoryx-sentinel
  # Image variant (F-010, ADR-0012 §Image variants): "slim" (default — core only,
  # no Bedrock/PII/gRPC; ≤350MB) or "full" (all extras, ~2.3GB). Use "full" if you
  # need AWS Bedrock, Presidio PII detection, or gRPC OTLP export.
  variant: slim
  # Defaults to "{AppVersion}-{variant}" (e.g. 0.10.0-slim). Set to pin an explicit tag.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 2

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false               # operators wire their own (nginx + cert-manager example in README)
  className: ""
  annotations: {}
  hosts: []
  tls: []

# --- Sensitive config -------------------------------------------------------- #
# Name of a PRE-EXISTING Kubernetes Secret holding the gateway's sensitive env,
# surfaced via envFrom: secretRef on gateway / worker / frontend / seed.
# Create it WITHOUT committing values — see deploy/helm/gen-k8s-secret.sh
# (ADR-0027 D3). Required keys (bundled-store demo):
#   SENTINEL_KEY_SECRET        HMAC for virtual API key fingerprints (64 hex)
#   SENTINEL_ADMIN_TOKEN       break-glass admin token (console + /admin/*)
#   SESSION_SECRET             admin-console session cookie HMAC
#   BULK_STORAGE_ACCESS_KEY    MinIO access key (== minio root user)
#   BULK_STORAGE_SECRET_KEY    MinIO secret key (== minio root password)
# External-store mode (bundled=false) ALSO needs: DATABASE_URL, APP_DATABASE_URL,
# REDIS_URL, UPSTREAM_BASE_URL, provider keys.
envSecret: ""
# Set true ONLY to have the chart render the Secret from secretData below (not
# recommended for production — prefer an externally-managed Secret / ESO).
createEnvSecret: false
secretData: {}                 # map of KEY: value, used only when createEnvSecret=true

# --- Non-secret config (plain env vars) -------------------------------------- #
# Upstream provider base URL (OpenAI-compatible). REQUIRED by the gateway — the
# app fails to start without it (GatewaySettings.upstream_base_url). Mirrors the
# compose default (`UPSTREAM_BASE_URL:-https://api.openai.com/v1`) so the chart
# boots zero-config; override per provider. The provider API KEY is delivered
# separately (vault/virtual-key vault), so with this set but no key configured,
# governed requests are blocked (the demo's 403 policy_blocked path).
upstreamBaseUrl: "https://api.openai.com/v1"
# PII detection (Presidio) master toggle. The default `slim` image (image.variant)
# does NOT bundle Presidio/spaCy — they ship only in the full image / the
# `pii-spacy` extra. Per the fail-safe contract (ADR-0007 D3) a PII hook that
# cannot load its analyzer BLOCKS every request (HookFailSafeError → 500), so the
# slim image MUST run with PII detection OFF or it cannot serve any /v1 traffic.
# Set this true ONLY when image.* points at a full image built with the pii-spacy
# extra. (Secret + injection detection have no heavy deps and stay on by default.)
piiDetectionEnabled: false
env: []                        # list of {name, value}
extraEnv: []

# --- Multi-region (F-022, ADR-0028) ------------------------------------------ #
# OFF by default: with region.enabled=false the chart renders byte-identically to
# the single-cluster ADR-0027 chart (nothing below is emitted). Turn on per region
# (one active, N passive) to surface region identity, residency labels, geo-routing
# annotations, cross-region replication of ONLY the global stores, and HA topology
# spread. See deploy/MULTI-REGION.md for the active/passive deploy + failover runbook.
region:
  enabled: false
  # Region identifier — SENTINEL_REGION env + topology.kubernetes.io/region label,
  # e.g. "us-east-1". Required when enabled.
  name: ""
  # "active"  — the SOLE writer for the policy store + audit log (ADR-0028 D2).
  # "passive" — read-only replica + failover standby (promote via the runbook).
  role: active
  # Data-residency jurisdiction label — SENTINEL_DATA_RESIDENCY env +
  # anoryx.io/data-residency label, e.g. "us" / "eu". Informational at the
  # deployment tier; app-tier residency ENFORCEMENT is a named deferral (ADR-0028).
  residency: ""

  # Cross-region logical replication of ONLY the globally-uniform stores
  # (policies, policy_versions, events_audit_log). Renders publication SQL on the
  # active region and subscription SQL on a passive region into a ConfigMap the
  # operator applies (ADR-0028 D3). Logical replication is row-faithful, so the
  # audit hash chain + policy signatures survive intact; the passive copy is
  # read-only so the chain cannot fork. Physical replication is deliberately NOT
  # used — it would clone residency-bound rows across regions.
  replication:
    enabled: false
    # The exact tables to replicate. Defaults = the two global stores only.
    tables:
      - policies
      - policy_versions
      - events_audit_log
    # Logical-replication publication / subscription names.
    publicationName: sentinel_global
    subscriptionName: sentinel_global_sub
    # PASSIVE only: libpq conninfo to the ACTIVE region's primary, WITHOUT the
    # password (the password is supplied by the operator from a Secret at apply
    # time — never commit it). e.g.
    #   "host=active.db.example.com port=5432 dbname=sentinel user=replicator sslmode=require"
    # Empty renders the conninfo with a ${REPLICATION_PASSWORD} placeholder to
    # substitute at apply time.
    activePrimaryConninfo: ""
    # Opt-in Job that APPLIES the rendered SQL against the local DB. OFF by default
    # — cross-region networking + credentials are operator-owned, so by default the
    # SQL is rendered for manual review + apply (ADR-0028 D3).
    bootstrapJob:
      enabled: false

  # Geo-routing: annotations surfaced onto the gateway Service (and Ingress when
  # enabled) so an operator wires a global load balancer / GeoDNS to route users
  # to the nearest healthy region with failover to active. The chart does NOT
  # provision the GSLB — it is edge/account-owned (ADR-0028 D4).
  geoRouting:
    annotations: {}

  # Intra-region HA: spread gateway replicas across zones. Additive + gated.
  topologySpread:
    enabled: false
    maxSkew: 1
    # DoNotSchedule (hard) | ScheduleAnyway (soft).
    whenUnsatisfiable: ScheduleAnyway

# --- Workers / probes -------------------------------------------------------- #
workers: 1                     # SENTINEL_WORKERS

# --- Bundled Postgres (γ: bundled by default; escape hatch below) ------------ #
postgres:
  bundled: true
  image: postgres:16-alpine
  storage: 8Gi
  storageClassName: ""
  # Used when bundled=true to seed the bundled instance + assemble URLs.
  auth:
    username: sentinel
    database: sentinel_dev
    # Dev-grade default password for the BUNDLED instance (ADR-0012 §4: bundled
    # stores are demo-grade). Production uses bundled=false + an external secret.
    password: sentinel
    existingSecret: ""         # Secret with POSTGRES_PASSWORD (else password above is used)
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }
  # Escape hatch — set bundled=false and fill these to use managed Postgres.
  external:
    host: ""
    port: 5432
    database: sentinel
    secretName: ""             # Secret providing DATABASE_URL / APP_DATABASE_URL

# --- Bundled Redis (γ) ------------------------------------------------------- #
redis:
  bundled: true
  image: redis:7-alpine
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 320Mi }
  external:
    host: ""
    port: 6379
    secretName: ""             # Secret providing REDIS_URL

# --- Bundled MinIO (bulk storage; ADR-0027 D2 — mirrors compose minio + init)  #
# Access/secret keys are SENSITIVE and come from the app envSecret
# (BULK_STORAGE_ACCESS_KEY / BULK_STORAGE_SECRET_KEY); only endpoint + bucket are
# injected as plain env. minio-init creates the bucket (mc mb --ignore-existing).
minio:
  enabled: true
  image: minio/minio:RELEASE.2024-10-13T13-34-11Z
  mcImage: minio/mc:RELEASE.2024-10-08T09-37-26Z
  bucket: sentinel-bulk
  storage: 8Gi
  storageClassName: ""
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Worker (bulk pipeline; ADR-0027 D2/D4) --------------------------------- #
# Separate image from the gateway — needs the bulk extras (boto3/aioboto3). The
# run_worker.py runner is mounted from a ConfigMap (mirrors the compose
# bind-mount; it is NOT baked into the image).
worker:
  enabled: true
  image:
    repository: ghcr.io/teamanoryx/anoryx-sentinel
    # Defaults to "{AppVersion}-bulk" (e.g. 0.10.0-bulk). Override for local images.
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }

# --- Frontend / admin console (Next.js BFF; ADR-0027 D2) -------------------- #
# Reaches the gateway in-cluster (SENTINEL_API_URL). SENTINEL_ADMIN_TOKEN +
# SESSION_SECRET come from the app envSecret.
frontend:
  enabled: true
  image:
    repository: ghcr.io/teamanoryx/anoryx-sentinel-frontend
    tag: ""                    # Defaults to {AppVersion}. Override for local images.
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests: { cpu: 100m, memory: 192Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Demo seed Job (ADR-0027 D4) -------------------------------------------- #
# Idempotent demo tenant/team/project/virtual-key (deploy/seed/seed.py via a
# ConfigMap). The minted key surfaces in the Job logs. Disable for non-demo installs.
seed:
  enabled: true

# --- OpenTelemetry Collector (bundled interop; logging exporter only) -------- #
otelCollector:
  enabled: true
  image: otel/opentelemetry-collector-contrib:0.104.0
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }

# --- Schema migrations (pre-upgrade Alembic Job; ADR-0012 §4) ---------------- #
migrations:
  enabled: true
  # provision the sentinel_app role on first run (F-003b).
  provisionAppRole: true

resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { cpu: 500m, memory: 1Gi }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# --- NetworkPolicy (restrictive by default — R8) ----------------------------- #
networkPolicy:
  enabled: true
  # Plain k8s NetworkPolicy cannot match egress by hostname. The chart scopes
  # in-cluster egress to the bundled Postgres/Redis/OTel pods on their specific
  # ports, plus DNS + provider :443. To RESTRICT provider egress by IP set CIDRs
  # here (FQDN rules need a Cilium/Calico CNI). Empty = :443 to any IP (ADR-0012 §10).
  providerEgressCIDRs: []      # e.g. ["203.0.113.0/24"]
  # Extra raw egress rules. REQUIRED for EXTERNAL managed Postgres/Redis
  # (bundled=false — the in-cluster pod rules won't match them) and for AWS
  # Bedrock (F-007 carryover). Example:
  #   - to: [{ ipBlock: { cidr: 10.20.0.0/16 } }]
  #     ports: [{ port: 5432, protocol: TCP }]
  extraEgress: []
  # Namespace allowed to scrape /metrics + probes (Prometheus).
  monitoringNamespace: monitoring

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Security contexts (R9) -------------------------------------------------- #
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
