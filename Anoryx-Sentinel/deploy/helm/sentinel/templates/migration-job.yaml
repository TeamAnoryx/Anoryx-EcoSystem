{{- if .Values.migrations.enabled -}}
# Alembic migration Job (ADR-0027 D1). A NORMAL release resource (NOT a Helm
# pre-install hook): a pre-install hook would run before the bundled Postgres
# resource exists and fail on a fresh install (the bug that shipped in PR #14 —
# the chart only ever worked against an external DB). Instead, a
# `wait-for-postgres` initContainer gates the migration on the DB accepting
# connections, and the serve/seed pods gate on schema-at-head via a
# `wait-for-migrate` initContainer. Runs `alembic upgrade head` + (when
# provisionAppRole) the sentinel_app SCRAM provisioning THROUGH the entrypoint
# shim, so it assembles the connection URLs from the password secretKeyRef
# exactly as the compose stack does (the Part-1 gap-#1 fix, reproduced unchanged).
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sentinel.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  backoffLimit: 2
  # Bound a hung migration. NOTE: this counts initContainer + image-pull time, so
  # it must tolerate a cold first pull of the bundled-store images on a fresh node
  # (the wait-for-postgres init blocks until Postgres is up). 30m headroom; on a
  # warm node the Job finishes in seconds.
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "sentinel.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- $waitPg := include "sentinel.waitForPostgres" . | trim }}
      {{- if $waitPg }}
      initContainers:
        {{- $waitPg | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "sentinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # Run via the entrypoint shim so it assembles the connection URLs from
          # the password secretKeyRef (kept out of the pod spec), then execs alembic.
          command: ["/usr/local/bin/docker-entrypoint.sh"]
          args: ["alembic", "upgrade", "head"]
          env:
            {{- if .Values.migrations.provisionAppRole }}
            - name: SENTINEL_PROVISION_APP_ROLE
              value: "1"
            {{- end }}
            {{- include "sentinel.pgEnv" . | nindent 12 }}
          {{- if or .Values.envSecret .Values.createEnvSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecret | default (printf "%s-env" (include "sentinel.fullname" .)) }}
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
