{{- if and .Values.postgres.bundled (not .Values.postgres.auth.existingSecret) -}}
# Bundled Postgres password Secret (ADR-0012 §3 / code-review Med). The password
# is referenced via secretKeyRef so it never appears in a Deployment/Job pod spec
# (etcd / `kubectl get pod -o yaml`). DEV-GRADE — production should use
# postgres.bundled=false with an externally-managed instance + envSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel.postgresFullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
{{- end }}
