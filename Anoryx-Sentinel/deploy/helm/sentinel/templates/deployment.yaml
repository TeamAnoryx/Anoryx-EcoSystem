apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sentinel.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: sentinel
          image: {{ include "sentinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: SENTINEL_WORKERS
              value: {{ .Values.workers | quote }}
            - name: SENTINEL_PORT
              value: {{ .Values.service.port | quote }}
            - name: ENABLE_OTEL
              value: {{ .Values.otelCollector.enabled | quote }}
            {{- if .Values.otelCollector.enabled }}
            # OTLP/HTTP (:4318) is the core default; gRPC (:4317) needs the
            # [otlp-grpc] extra (full image) + OTEL_EXPORTER_OTLP_PROTOCOL=grpc.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "sentinel.otelCollectorFullname" . }}:4318"
            {{- end }}
            {{- if .Values.postgres.bundled }}
            # Bundled Postgres: connection PARTS + password via secretKeyRef (kept
            # OUT of the pod spec — code-review Med). The entrypoint shim assembles
            # DATABASE_URL / APP_DATABASE_URL. External mode (bundled=false) supplies
            # full URLs via envSecret instead.
            - name: POSTGRES_HOST
              value: {{ include "sentinel.postgresFullname" . | quote }}
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.auth.existingSecret | default (include "sentinel.postgresFullname" .) }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            {{- if .Values.redis.bundled }}
            - name: REDIS_HOST
              value: {{ include "sentinel.redisFullname" . | quote }}
            - name: REDIS_PORT
              value: "6379"
            {{- end }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.envSecret .Values.createEnvSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecret | default (printf "%s-env" (include "sentinel.fullname" .)) }}
          {{- end }}
          # readOnlyRootFilesystem=true → provide writable scratch dirs (R9).
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            # Grace for cold start / migration-gated readiness (up to ~120s).
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
