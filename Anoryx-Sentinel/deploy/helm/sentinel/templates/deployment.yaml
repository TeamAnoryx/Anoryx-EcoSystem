apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.fullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sentinel.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Gate serving on the schema being at head (ADR-0027 D1). wait-for-migrate
      # polls `alembic current` so no replica serves an un-migrated DB and none
      # races the migrate Job.
      initContainers:
        {{- include "sentinel.waitForPostgres" . | nindent 8 }}
        {{- include "sentinel.waitForMigrate" . | nindent 8 }}
      containers:
        - name: sentinel
          image: {{ include "sentinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: SENTINEL_WORKERS
              value: {{ .Values.workers | quote }}
            - name: SENTINEL_PORT
              value: {{ .Values.service.port | quote }}
            - name: ENABLE_OTEL
              value: {{ .Values.otelCollector.enabled | quote }}
            {{- if .Values.otelCollector.enabled }}
            # OTLP/HTTP (:4318) is the core default; gRPC (:4317) needs the
            # [otlp-grpc] extra (full image) + OTEL_EXPORTER_OTLP_PROTOCOL=grpc.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "sentinel.otelCollectorFullname" . }}:4318"
            {{- end }}
            # Bundled Postgres: connection PARTS + password via secretKeyRef (kept
            # OUT of the pod spec). The entrypoint shim assembles DATABASE_URL /
            # APP_DATABASE_URL. External mode (bundled=false) supplies full URLs
            # via envSecret instead.
            {{- include "sentinel.pgEnv" . | nindent 12 }}
            {{- if .Values.redis.bundled }}
            - name: REDIS_HOST
              value: {{ include "sentinel.redisFullname" . | quote }}
            - name: REDIS_PORT
              value: "6379"
            {{- end }}
            # Bulk storage (MinIO) endpoint + bucket; keys come via envSecret.
            {{- include "sentinel.bulkEnv" . | nindent 12 }}
            # Upstream provider base URL — REQUIRED (GatewaySettings.upstream_base_url);
            # without it the app crashes on boot. Mirrors the compose default.
            - name: UPSTREAM_BASE_URL
              value: {{ .Values.upstreamBaseUrl | quote }}
            # PII detection toggle — OFF for the slim image (no Presidio); on the
            # slim image a PII hook fail-safe-blocks every request (ADR-0007 D3).
            - name: PII_DETECTION_ENABLED
              value: {{ .Values.piiDetectionEnabled | quote }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.envSecret .Values.createEnvSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.envSecret | default (printf "%s-env" (include "sentinel.fullname" .)) }}
          {{- end }}
          # readOnlyRootFilesystem=true → provide writable scratch dirs (R9).
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            # Grace for cold start / migration-gated readiness (up to ~120s).
            httpGet:
              path: /livez
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
