{{- if .Values.otelCollector.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel.otelCollectorFullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
data:
  collector-config.yaml: |
    # Bundled OTel Collector (ADR-0012 §5). Default `debug` exporter only — no
    # backend wired. Edit this ConfigMap (or values) to add Jaeger/Tempo/etc.
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 5s
        send_batch_size: 1024
    exporters:
      debug:
        verbosity: normal
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [debug]
{{- end }}
