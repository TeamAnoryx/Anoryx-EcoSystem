{{- if .Values.frontend.enabled -}}
# Admin console / BFF (ADR-0027 D2) — mirrors the compose `frontend` service.
# Reaches the gateway in-cluster via SENTINEL_API_URL. SENTINEL_ADMIN_TOKEN +
# SESSION_SECRET come from the app envSecret (the Next image reads them from env;
# no entrypoint shim needed). Runs as the image's non-root user (uid 1001).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sentinel.frontendFullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "sentinel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "sentinel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          image: {{ include "sentinel.frontendImage" . }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: {{ .Values.frontend.service.port | quote }}
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: SENTINEL_API_URL
              value: "http://{{ include "sentinel.fullname" . }}:{{ .Values.service.port }}"
          {{- if or .Values.envSecret .Values.createEnvSecret }}
          # SENTINEL_ADMIN_TOKEN + SESSION_SECRET (envSecret keys).
          envFrom:
            - secretRef:
                name: {{ include "sentinel.envSecretName" . }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.port }}
              protocol: TCP
          # Grace for Next.js cold start (mirrors the compose start_period). Liveness
          # is suppressed until this passes, so a slow boot is not restart-looped.
          startupProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 5
            failureThreshold: 36
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
