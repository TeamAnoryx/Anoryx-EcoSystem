apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentinel.fullname" . }}
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
  {{- if and .Values.region.enabled .Values.region.geoRouting.annotations }}
  # Geo-routing hints for an external global load balancer / GeoDNS (F-022,
  # ADR-0028 D4). The chart SURFACES these; it does NOT provision the GSLB.
  annotations:
    {{- toYaml .Values.region.geoRouting.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "sentinel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
