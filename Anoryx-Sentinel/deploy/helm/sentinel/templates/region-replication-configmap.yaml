{{- if and .Values.region.enabled .Values.region.replication.enabled -}}
# Cross-region logical-replication bootstrap SQL (F-022, ADR-0028 D3). RENDERED,
# not auto-applied by default — an operator reviews + applies it (or opts into the
# bootstrap Job, region.replication.bootstrapJob.enabled). Replicates ONLY the
# globally-uniform stores (policies, policy_versions, events_audit_log) active ->
# passive. Logical (not physical) replication so nothing residency-bound is copied;
# row-faithful so the audit hash chain + policy signatures survive replication.
# The generated SQL is append-only safe: it only CREATEs a publication/subscription
# — it never drops, deletes, or rewrites data.
#
# PASSIVE WRITE-EXCLUSION (F-022 audit H1 — RESOLVED, app-tier). The passive
# region's read-only posture is now ENFORCED fail-closed in the app tier:
# GatewaySettings reads SENTINEL_REGION_ROLE and PassiveRegionGuardMiddleware (the
# outermost middleware) returns 503 for every governed / audit-generating request
# on a passive region BEFORE the terminal audit writes — so a passive region cannot
# append to its LOCAL events_audit_log, fork the chain, or collide on the per-DB
# sequence_number. Only k8s probes are served on passive (promotable on failover).
# Tradeoff: passive serves NO residency-local reads (a read would still write the
# chain); safely serving them needs a global audit sequencer (still deferred — see
# docs/followups/f-022-passive-readonly-enforcement.md).
#
# Residency safety is ENFORCED here (not merely conventional): the guard below
# fails the render if region.replication.tables is not a subset of the approved
# global stores, so a residency-bound / tenant-scoped table can never be published.
{{- range .Values.region.replication.tables }}
{{- if not (has . (list "policies" "policy_versions" "events_audit_log")) }}
{{- fail (printf "region.replication.tables: %q is not an approved global store — only policies, policy_versions, events_audit_log may cross regions (ADR-0028 D3 residency safety)" .) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sentinel.fullname" . }}-region-replication
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
    app.kubernetes.io/component: region-replication
data:
{{- $tables := join ", " .Values.region.replication.tables }}
{{- if eq .Values.region.role "active" }}
  publication.sql: |
    -- ACTIVE region ({{ .Values.region.name }}): run ONCE on the primary.
    -- Prerequisite: wal_level=logical on the publisher (server config — see
    -- deploy/MULTI-REGION.md). Every replicated table needs a primary key /
    -- REPLICA IDENTITY (policies, policy_versions, events_audit_log all have one).
    CREATE PUBLICATION {{ .Values.region.replication.publicationName }}
      FOR TABLE {{ $tables }};
{{- else if eq .Values.region.role "passive" }}
  {{- $conn := .Values.region.replication.activePrimaryConninfo | trim }}
  subscription.sql: |
    -- PASSIVE region ({{ .Values.region.name }}): run ONCE on this region's primary.
    -- Substitute ${REPLICATION_PASSWORD} at apply time from a Secret — NEVER commit
    -- the password (the bootstrap Job seds it in from the app envSecret key
    -- REPLICATION_PASSWORD; a manual apply substitutes it yourself).
    CREATE SUBSCRIPTION {{ .Values.region.replication.subscriptionName }}
      CONNECTION '{{ if $conn }}{{ $conn }} password=${REPLICATION_PASSWORD}{{ else }}host=<ACTIVE_REGION_DB_HOST> port=5432 dbname={{ .Values.postgres.auth.database }} user=replicator password=${REPLICATION_PASSWORD} sslmode=require{{ end }}'
      PUBLICATION {{ .Values.region.replication.publicationName }};
{{- else }}
{{- fail (printf "region.role must be 'active' or 'passive', got %q" .Values.region.role) }}
{{- end }}
{{- end }}
