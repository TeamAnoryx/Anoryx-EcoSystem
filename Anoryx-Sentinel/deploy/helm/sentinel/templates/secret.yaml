{{- if and .Values.createEnvSecret (not .Values.envSecret) -}}
# Rendered ONLY when createEnvSecret=true and no external envSecret is named.
# Prefer an externally-managed Secret (or External Secrets Operator) in
# production — see deploy/SELF_HOST.md (ADR-0012 §10).
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sentinel.fullname" . }}-env
  labels:
    {{- include "sentinel.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secretData }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
