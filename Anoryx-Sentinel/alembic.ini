# Alembic configuration for Anoryx-Sentinel persistence layer (F-003)
# script_location points to src/persistence/migrations/
# DATABASE_URL is loaded from .env by alembic env.py via python-dotenv.
# The env.py converts the asyncpg URL to a sync psycopg URL for migrations.
# Do NOT store connection strings here. They come from the environment only.

[alembic]
script_location = src/persistence/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC

[post_write_hooks]
# No post-write hooks required.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
