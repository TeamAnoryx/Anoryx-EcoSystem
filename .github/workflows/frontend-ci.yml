name: Admin Console CI

# Additive frontend lane (F-012, ADR-0015 D9). Independent of sentinel-ci.yml:
# separate file + path filter scoped to the console, so the Python lane is never
# touched and the two never share fixtures or ordering.
on:
  push:
    branches: [main]
    paths: ["Anoryx-Sentinel/frontend/**"]
  pull_request:
    branches: [main]
    paths: ["Anoryx-Sentinel/frontend/**"]

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admin-console:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Anoryx-Sentinel/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Anoryx-Sentinel/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Typecheck (tsc)
        run: npm run typecheck
      # Build with a throwaway canary admin token so the token-absence check has a
      # known value to grep for (vector 1). The canary is NOT a secret.
      - name: Build (next build)
        env:
          SENTINEL_API_URL: http://127.0.0.1:9
          SENTINEL_ADMIN_TOKEN: CANARY_admin_token_ci_do_not_ship_x7Q2
          SESSION_SECRET: CANARY_session_secret_ci_0123456789abcdef
        run: npm run build
      - name: Token absence in client bundle (vector 1)
        env:
          SENTINEL_ADMIN_TOKEN: CANARY_admin_token_ci_do_not_ship_x7Q2
        run: npm run check:token
      - name: Unit tests (vitest)
        run: npm test
      # Render lane (jsdom): mounts the shadow-AI panel and asserts the honesty
      # disclaimer renders in the live DOM (F-018, ADR-0021 §9 vector 1). Separate
      # config (jsdom env) from the node unit lane — must be gated explicitly so the
      # disclaimer-renders test cannot pass locally yet silently skip CI.
      - name: Render tests (vitest jsdom — honesty disclaimer / vector 1)
        run: npm run test:render
