name: Anoryx-Sentinel Release

# F-010 (ADR-0012 §7). Triggered by a semver tag (v*). Builds + pushes BOTH image
# variants (slim = core only; full = all extras) to GHCR, signs each with cosign
# (keyless OIDC / Sigstore), generates a per-variant SBOM with syft, publishes the
# Helm chart, and creates a GitHub Release with auto-generated notes.
#
# Added ALONGSIDE sentinel-ci.yml (R2 — the CI workflow is not modified).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write       # create the GitHub Release + push gh-pages (chart)
  packages: write       # push images to GHCR
  id-token: write       # OIDC token for cosign keyless signing
  pages: write          # Helm chart publish

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: teamanoryx/anoryx-sentinel

jobs:
  docker-build:
    name: Build · push · sign · SBOM (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [slim, full]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version + variant tags
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [ "${{ matrix.variant }}" = "full" ]; then
            # Full keeps the unsuffixed vX / latest tags (default pull).
            echo "extras=all" >> "$GITHUB_OUTPUT"
            {
              echo "tags=${REGISTRY}/${IMAGE_NAME}:${version}-full,${REGISTRY}/${IMAGE_NAME}:latest-full,${REGISTRY}/${IMAGE_NAME}:${version},${REGISTRY}/${IMAGE_NAME}:latest"
            } >> "$GITHUB_OUTPUT"
          else
            echo "extras=" >> "$GITHUB_OUTPUT"
            echo "tags=${REGISTRY}/${IMAGE_NAME}:${version}-slim,${REGISTRY}/${IMAGE_NAME}:latest-slim" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./Anoryx-Sentinel
          file: ./Anoryx-Sentinel/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            INSTALL_EXTRAS=${{ steps.meta.outputs.extras }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.variant }}.spdx.json

      - name: Attest SBOM to the image (cosign)
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign attest --yes --type spdxjson --predicate "sbom-${{ matrix.variant }}.spdx.json" "$IMAGE_REF"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.variant }}-spdx-json
          path: sbom-${{ matrix.variant }}.spdx.json

  helm-publish:
    name: Publish Helm chart (gh-pages)
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: Anoryx-Sentinel/deploy/helm
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-notes:
    name: GitHub Release + notes
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Anoryx Sentinel ${{ steps.meta.outputs.version }}

            Image variants (ADR-0012 §Image variants):
            - `ghcr.io/teamanoryx/anoryx-sentinel:${{ steps.meta.outputs.version }}-slim` — core only (no Bedrock/PII/gRPC).
            - `ghcr.io/teamanoryx/anoryx-sentinel:${{ steps.meta.outputs.version }}` (== `-full`) — all extras.

            Verify the cosign keyless signature (depends on Sigstore availability — ADR-0012 §10):

            ```
            cosign verify ghcr.io/teamanoryx/anoryx-sentinel:${{ steps.meta.outputs.version }}-slim \
              --certificate-identity-regexp '^https://github.com/TeamAnoryx/anoryx-sentinel/.github/workflows/sentinel-release.yml@refs/tags/v' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com
            ```
