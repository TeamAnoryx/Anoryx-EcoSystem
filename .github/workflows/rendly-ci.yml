name: Rendly CI

on:
  push:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']
  pull_request:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']

jobs:
  rendly-contracts:
    name: Contract + domain + auth validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rendly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        # R-002 added pydantic; R-003 adds fastapi + pyjwt[crypto] + cryptography + argon2-cffi
        # (deps) and httpx (dev, the TestClient transport); R-004 adds sqlalchemy + psycopg[binary]
        # + alembic + python-dotenv via pyproject.
        run: pip install -e ".[dev]"
      - name: Lint (ruff + black)
        run: ruff check . && black --check .
      - name: Validate contracts + domain model + auth (schemas, invariants, e2e) with coverage
        # One pytest run executes the R-001 contract suite (tests/contracts), the R-002 domain
        # suite (tests/domain), AND the R-003 auth suite (tests/auth: real ES256 issue/verify/
        # refresh e2e + adversarial cases). No database in this lane: the R-004 persistence suite
        # is collect-ignored (its conftest skips the directory when DATABASE_URL is unset) and the
        # persistence package is omitted from coverage (pyproject). --cov=rendly still enforces the
        # fail_under gate on the NON-DB surface, so any of those suites not running would leave it
        # uncovered and FAIL — proving the lane executes them (banked rule 4: CI authoritative).
        run: pytest --cov=rendly --cov-report=term-missing --tb=short -q

  # DB lane: the R-004 identity persistence tests against a real Postgres (must EXECUTE).
  # Proves round-trip reconstruction (ids un-canonicalized, tz-aware UTC, enums), cross-tenant
  # RLS isolation (incl. forged/empty/no-GUC fail-closed), the R-003 auth path on real Postgres
  # (password-grant + refresh-rotate + reuse-revokes-family across a fresh connection), and
  # fresh-DB rendly_app authentication (the F-010 SCRAM provisioning fix).
  rendly-db:
    name: Identity persistence + RLS + auth-DB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rendly
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rendly
          POSTGRES_PASSWORD: rendly
          POSTGRES_DB: rendly_dev
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://rendly:rendly@localhost:5432/rendly_dev
      APP_DATABASE_URL: postgresql://rendly_app:rendly@localhost:5432/rendly_dev
      RENDLY_PROVISION_APP_ROLE: "1"
      # R-005 async chat layer (asyncpg) against plaintext CI Postgres: no SSL probe. The realtime
      # conftest also setdefaults this + NULLPOOL, but setting it here is explicit (banked rule 4).
      RENDLY_DB_SSL: "disable"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Persistence + RLS + auth-DB + realtime-chat tests (whole tree, DB up)
        # Runs the full suite with the DB present — the persistence suite AND the R-005 realtime
        # chat suite (tests/realtime: real WS round-trip + cross-tenant deny + fail-closed seam +
        # bind_membership DB deny + token-in-URL reject, on real Postgres + a real in-process ASGI
        # WebSocket) are both collected. The pyproject gate measures the NON-DB surface here too;
        # persistence and realtime are gated separately below so neither rides on another suite.
        run: pytest --tb=short -q --cov=rendly --cov-report=term-missing
      - name: Persistence + realtime coverage floor (>=90%)
        # Both DB packages are omitted from the default (no-DB) config and measured here. Note the
        # coupling: rendly.persistence is exercised by BOTH tests/persistence (identity) AND
        # tests/realtime (the chat repo + async session layer), while rendly.realtime is exercised
        # by tests/realtime — so both suites must run to measure both packages. One step over both
        # suites measuring both packages keeps the gate honest (migrations excluded — DDL via the
        # alembic subprocess, not unit-cov). Proves both DB lanes EXECUTE (rule 11): a suite that
        # did not run leaves its package uncovered and FAILS this gate.
        run: |
          pytest tests/persistence tests/realtime \
            --cov=rendly.persistence \
            --cov=rendly.realtime \
            --cov-config=.coveragerc-persistence \
            --cov-report=term-missing \
            --cov-fail-under=90

  # Migration reversibility: upgrade -> downgrade -> upgrade on a fresh DB, then a full
  # drop-schema rebuild (a true fresh build, not a downgrade-base reset).
  rendly-migration-roundtrip:
    name: Migration round-trip
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rendly
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rendly
          POSTGRES_PASSWORD: rendly
          POSTGRES_DB: rendly_dev
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql://rendly:rendly@localhost:5432/rendly_dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: upgrade -> downgrade -> upgrade
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: drop-schema rebuild (true fresh build)
        run: |
          python -c "import os,psycopg; c=psycopg.connect(os.environ['DATABASE_URL']); c.autocommit=True; c.execute('DROP SCHEMA IF EXISTS rendly CASCADE'); c.close()"
          alembic upgrade head
