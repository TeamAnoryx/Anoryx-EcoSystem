name: Rendly CI

on:
  push:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']
  pull_request:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']

jobs:
  rendly-contracts:
    name: Contract validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rendly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Lint (ruff + black)
        run: ruff check . && black --check .
      - name: Validate contracts (OpenAPI + message catalog + every example)
        run: pytest --tb=short -q
