name: Rendly CI

on:
  push:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']
  pull_request:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']

jobs:
  rendly-contracts:
    name: Contract + domain + auth validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rendly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        # R-002 added pydantic; R-003 adds fastapi + pyjwt[crypto] + cryptography + argon2-cffi
        # (deps) and httpx (dev, the TestClient transport) via pyproject.
        run: pip install -e ".[dev]"
      - name: Lint (ruff + black)
        run: ruff check . && black --check .
      - name: Validate contracts + domain model + auth (schemas, invariants, e2e) with coverage
        # One pytest run executes the R-001 contract suite (tests/contracts), the R-002 domain
        # suite (tests/domain), AND the R-003 auth suite (tests/auth: real ES256 issue/verify/
        # refresh e2e + adversarial cases). --cov=rendly enforces the pyproject fail_under gate,
        # so any suite that did not run would leave that package surface uncovered and FAIL —
        # proving the lane executes the auth tests, not skips them (banked rule 4: CI authoritative).
        run: pytest --cov=rendly --cov-report=term-missing --tb=short -q
