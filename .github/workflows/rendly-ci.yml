name: Rendly CI

on:
  push:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']
  pull_request:
    branches: [main]
    paths: ['Rendly/**', '.github/workflows/rendly-ci.yml']

jobs:
  rendly-contracts:
    name: Contract + domain validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Rendly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        # R-002 adds pydantic (the domain package) to the install via pyproject.
        run: pip install -e ".[dev]"
      - name: Lint (ruff + black)
        run: ruff check . && black --check .
      - name: Validate contracts + domain model (schemas, invariants, examples) with coverage
        # One pytest run executes BOTH the R-001 contract suite (tests/contracts) and the
        # R-002 domain suite (tests/domain: invariants + JSON-Schema conformance). --cov=rendly
        # enforces the pyproject fail_under gate, so a domain suite that did not run would leave
        # the package uncovered and FAIL — proving the lane executes the domain tests, not skips.
        run: pytest --cov=rendly --cov-report=term-missing --tb=short -q
