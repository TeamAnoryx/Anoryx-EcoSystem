name: Anoryx-Sentinel CI

on:
  push:
    branches: [main]
    paths: ['Anoryx-Sentinel/**']
  pull_request:
    branches: [main]
    paths: ['Anoryx-Sentinel/**']

jobs:
  sentinel:
    name: Lint · Test · SAST
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_ci_only
          POSTGRES_DB: sentinel_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: Anoryx-Sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Lint (ruff + black)
        run: ruff check . && black --check .
      - name: SAST (semgrep)
        run: semgrep scan --config=p/python --config=p/secrets --severity=ERROR --no-git-ignore src/
      - name: Test (pytest + coverage)
        env:
          SENTINEL_KEY_SECRET: ${{ secrets.SENTINEL_KEY_SECRET_CI }}
          DATABASE_URL: postgresql://sentinel:sentinel_ci_only@localhost:5432/sentinel_ci
          APP_DATABASE_URL: ${{ secrets.APP_DATABASE_URL_CI }}
          SENTINEL_PROVISION_APP_ROLE: "1"
        run: pytest --tb=short -q --cov=src --cov-report=term-missing
