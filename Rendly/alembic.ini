# Alembic configuration for Rendly identity persistence (R-004).
# script_location points to src/rendly/persistence/migrations/. DATABASE_URL is loaded
# from the environment (.env via python-dotenv) by env.py — the privileged owner role.
# env.py converts the URL to a sync psycopg URL for migrations and pins the
# alembic_version table into the `rendly` schema. NEVER store a connection string here —
# it comes from the environment only.

[alembic]
script_location = src/rendly/persistence/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = src
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
