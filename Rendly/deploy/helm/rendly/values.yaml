# Rendly Helm values (R-010, ADR-0010).
# Mirrors Anoryx-AI-Orchestrator's O-008 Helm pattern (ADR-0008), scaled further down: Rendly
# has no Redis/MinIO/worker/frontend either, AND — unlike the Orchestrator — makes no
# outbound network call to another product (R-008's "Sentinel safety" is fully self-hosted
# in-process PII/injection/secret detection, not a network dependency).
#
# IMPORTANT — single-instance realtime state (see replicaCount below): the R-005/R-007
# WebSocket chat + huddle layer keeps its connection registry and huddle state IN-PROCESS
# (no Redis/broker fan-out). Running more than one replica silently breaks cross-replica
# message/huddle delivery — a client's peer may land on a different pod. This is a REAL
# capacity limit, not a default nobody bothered to raise; scaling out needs a shared
# broker first (out of scope for R-010, named deferral below).
#
# Production checklist (see deploy/DEPLOY-K8s.md):
#   - Set postgres.bundled=false → point at a managed service.
#   - Pre-create the envSecret (RENDLY_JWT_PRIVATE_KEY_PEM, and in external-DB mode
#     DATABASE_URL / APP_DATABASE_URL) and set envSecret below.
#   - Wire ingress + TLS (cert-manager) at your edge.
#   - Vault/KMS + mTLS are NOT provisioned by this chart — an honest, explicit deferral
#     (ADR-0010 §Honest deferrals), the same posture Orchestrator's O-008 and Sentinel's
#     F-010 shipped with.

image:
  repository: ghcr.io/teamanoryx/anoryx-rendly
  # Defaults to the chart's AppVersion (e.g. 1.0.0). Set to pin an explicit tag.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Single instance by default — see the file header. Do NOT raise this (or enable
# autoscaling below) without first adding a shared broker for the realtime layer.
replicaCount: 1

service:
  type: ClusterIP
  port: 8082

ingress:
  enabled: false               # operators wire their own (nginx + cert-manager)
  className: ""
  annotations: {}
  hosts: []
  tls: []

# --- Sensitive config -------------------------------------------------------- #
# Name of a PRE-EXISTING Kubernetes Secret holding the app's sensitive env,
# surfaced via envFrom: secretRef. Create it WITHOUT committing values — see
# deploy/helm/gen-k8s-secret.sh. Required keys (bundled-store demo):
#   RENDLY_JWT_PRIVATE_KEY_PEM   ES256 (P-256) signing key — fail-closed, no default
# Optional keys: RENDLY_TURN_SHARED_SECRET (coturn REST-API static-auth-secret).
# External-store mode (bundled=false) ALSO needs: DATABASE_URL, APP_DATABASE_URL.
envSecret: ""
# Set true ONLY to have the chart render the Secret from secretData below (not
# recommended for production — prefer an externally-managed Secret / ESO).
createEnvSecret: false
secretData: {}                 # map of KEY: value, used only when createEnvSecret=true

# --- Non-secret config (plain env vars) -------------------------------------- #
# R-007 self-hosted STUN/TURN bootstrap. Comma-separated URL lists; empty means
# STUN-only ICE (no TURN relay offered) — huddles still work for most NAT topologies.
stunUrls: ""                   # RENDLY_STUN_URLS
turnUrls: ""                   # RENDLY_TURN_URLS
env: []                        # list of {name, value}
extraEnv: []

# --- Workers ------------------------------------------------------------------ #
workers: 1                     # RENDLY_WORKERS

# --- Bundled Postgres (bundled by default; escape hatch below) --------------- #
postgres:
  bundled: true
  image: postgres:16-alpine
  storage: 8Gi
  storageClassName: ""
  auth:
    username: rendly
    database: rendly_dev
    # Dev-grade default password for the BUNDLED instance. Production uses
    # bundled=false + an external secret.
    password: rendly
    existingSecret: ""         # Secret with POSTGRES_PASSWORD (else password above is used)
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }
  # Escape hatch — set bundled=false and fill these to use managed Postgres.
  external:
    host: ""
    port: 5432
    database: rendly
    secretName: ""             # Secret providing DATABASE_URL / APP_DATABASE_URL

# --- Schema migrations (pre-upgrade Alembic Job) ------------------------------ #
migrations:
  enabled: true
  # provision the rendly_app role password on first run (R-004).
  provisionAppRole: true

resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { cpu: 500m, memory: 1Gi }

# NOT SAFE without a shared broker for the realtime layer (see file header) — the
# template exists (mirrors the chart's shape) but ships disabled.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

# Disabled by default: with replicaCount=1, minAvailable=1 would block EVERY voluntary
# eviction (node drains included) forever — a real operational trap for a single-instance
# service. Enable only alongside a deliberate multi-replica + shared-broker setup.
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# --- NetworkPolicy (restrictive by default) ----------------------------------- #
# Simpler than the Orchestrator's: Rendly makes NO outbound network call to another
# ecosystem product (R-008's Sentinel-safety inspection is self-hosted in-process), so
# there is no "arbitrary :443 egress to a dynamic peer" rule to carry here.
networkPolicy:
  enabled: true
  extraEgress: []
  # Ingress: the http port serves both the REST surface and the GET /v1/realtime
  # WebSocket upgrade (same port, same TCP-level rule — NetworkPolicy has no HTTP-path
  # granularity). Empty = open to any source; set to restrict to known client ranges.
  ingressCIDRs: []             # e.g. ["203.0.113.0/24"] — empty = open to any source
  extraIngress: []
  # Namespace allowed to scrape /metrics + probes (Prometheus).
  monitoringNamespace: monitoring

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Security contexts -------------------------------------------------------- #
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
