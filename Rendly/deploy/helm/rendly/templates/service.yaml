apiVersion: v1
kind: Service
metadata:
  name: {{ include "rendly.fullname" . }}
  labels:
    {{- include "rendly.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "rendly.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rendly
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
