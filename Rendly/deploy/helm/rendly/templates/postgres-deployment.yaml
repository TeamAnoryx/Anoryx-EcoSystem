{{- if .Values.postgres.bundled -}}
# Bundled Postgres — DEV/DEMO-GRADE. For production set postgres.bundled=false and point at
# a managed instance (RDS/CloudSQL/AlloyDB). Runs as the official image's default user (NOT
# the app securityContext) so it can own its data directory.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rendly.postgresFullname" . }}
  labels:
    {{- include "rendly.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "rendly.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        {{- include "rendly.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            {{- if .Values.postgres.auth.existingSecret }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.auth.existingSecret }}
                  key: POSTGRES_PASSWORD
            {{- else }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "rendly.postgresFullname" . }}
                  key: POSTGRES_PASSWORD
            {{- end }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgres.auth.username | quote }}, "-d", {{ .Values.postgres.auth.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
            # Default 1s is too tight on slow (kind/local) disk I/O.
            timeoutSeconds: 6
            failureThreshold: 6
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "rendly.postgresFullname" . }}
{{- end }}
