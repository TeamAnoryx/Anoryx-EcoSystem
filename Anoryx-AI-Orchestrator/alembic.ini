# Alembic configuration for the Anoryx-AI-Orchestrator persistence layer (O-003).
# script_location points to src/orchestrator/persistence/migrations/.
# ORCH_DATABASE_URL is loaded from the environment by env.py via python-dotenv; env.py
# converts the asyncpg URL to a sync psycopg URL for migrations. Do NOT store connection
# strings here — they come from the environment only. The Orchestrator owns its own
# alembic_version table in its own database (no collision with Sentinel's chain).

[alembic]
script_location = %(here)s/src/orchestrator/persistence/migrations
# Pin the revision scan to THIS package's versions dir only. When Sentinel is also
# pip-installed (the O-004 distribution e2e lane), an unpinned relative script_location can
# let alembic discover a second revision location and report "Multiple head revisions";
# an absolute %(here)s-rooted version_locations keeps the orchestrator chain single-headed.
version_locations = %(here)s/src/orchestrator/persistence/migrations/versions
file_template = %%(rev)s_%%(slug)s
# Make the `orchestrator` package importable from env.py without an editable install.
prepend_sys_path = src
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
