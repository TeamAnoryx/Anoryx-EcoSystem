openapi: "3.1.0"
info:
  title: Anoryx Orchestrator Internal API
  version: "1.0.0"
  description: |
    Internal, product-to-product API for Anoryx-AI-Orchestrator — the central
    orchestration layer between Anoryx Sentinel (the zero-trust AI gateway, which
    emits governance/usage events UP) and Delta (FinOps/budget policy, which submits
    policies DOWN for distribution to Sentinels).

    SCOPE OF THIS DOCUMENT (O-001 + O-002): O-001 defined THREE seams plus the
    transport security scheme; O-002 adds the cross-product event ENVELOPE that wraps the
    ingest payload, plus bounded replay, dead-letter (DLQ), and schema-version negotiation
    (see the O-002 section below). It is CONTRACT-ONLY — there is no runtime, persistence,
    or enforcement code behind it yet. The ingest pipeline, distribution engine, registry,
    persistence, UI, and deploy layers are later tasks (O-003…O-008) and MUST NOT be
    inferred from this document.

    ## The three seams
      1. Event ingest (Sentinel → Orchestrator): Sentinel pushes events up via an
         HMAC-signed webhook POST. Bodies conform to the O-002 event envelope
         (event-envelope.schema.json), whose payload wraps the LOCKED Sentinel event
         schema (contracts/events.schema.json, $id `sentinel:events:v1`) UNMODIFIED.
      2. Policy distribution intake (Delta → Orchestrator): Delta submits a policy
         record (conforming to the LOCKED contracts/policy.schema.json, $id
         `sentinel:policy:v1`, frozen at F-008 commit a9e2344) for distribution to
         one or more Sentinels. The Orchestrator's distribution engine (O-004, NOT
         in this contract) forwards it to Sentinel's existing F-012a admin/intake
         surface.
      3. Query API (Delta → Orchestrator): read-only metadata reads — policy
         distribution status and event query/read.

    ## The four stable IDs (see Anoryx-Sentinel/contracts/ids.md — LOCKED, IMMUTABLE)
    Every event carries the four stable IDs (tenant_id / team_id / project_id /
    agent_id) plus event_id, event_timestamp, request_id. These are the join key
    between Sentinel events and Delta records; this contract references them by
    `$ref` into the locked Sentinel schemas and never redefines them.

    ## Schema reuse by reference (never by copy)
    Event and policy bodies are `$ref`'d directly from the Sentinel contract files
    (`../../Anoryx-Sentinel/contracts/events.schema.json` and `…/policy.schema.json`).
    OpenAPI 3.1 aligns with JSON Schema 2020-12 (the dialect those files use), so the
    locked schemas are referenced with no translation. Every example payload in this
    document validates against those files UNMODIFIED. This contract REFERENCES — it
    never redefines or extends — the locked schemas. In particular the `policy_type`
    enum and both CHECK constraints in policy.schema.json are CLOSED; O-001 adds no
    policy_type.

    ## Validator dialect
    Sentinel, Anoryx-AI-Orchestrator, and Delta MUST all validate referenced records
    with a JSON Schema Draft 2020-12 validator so no parser-differential exists.

    ## HONESTY BOUNDARIES (non-removable; rule 14)
    (a) mTLS is DECLARED in this contract; certificate PROVISIONING is DEFERRED to
        O-008 (F-034). Until then the mutualTLS scheme is a contract declaration, not
        a live, enforced channel.
    (b) Policy signing is PASS-THROUGH by default: the Orchestrator forwards an
        already-signed (F-008 compact-JWS) policy record and does NOT sign on Delta's
        behalf. Orchestrator-signing is an OPTIONAL, GATED capability that is NOT
        enabled in v1 (the `sign_on_behalf` field is documented but disabled).
    (c) The query API is READ-ONLY METADATA at this stage. It exposes distribution
        status and event metadata; it does not mutate state and does not return full
        event payloads.
    (d) The Delta query service token is COARSE-GRAINED: per-tenant read
        authorization is NOT yet enforced (deferred to O-006). A token holder can read
        event/distribution metadata across tenants. The `tenant_id`/`team_id` query
        filters are conveniences, NOT an authorization boundary. Treat the token
        accordingly until O-006 lands.

    ## Trust boundary (what each auth layer does / does not cover)
    mTLS authenticates the PEER PRODUCT (Sentinel or Delta), not the message. The
    per-message HMAC body signature on event ingest (reusing the F-020 webhook
    pattern) gives per-event tamper-evidence and a replay window; it does NOT
    establish product identity (mTLS does). The Delta service token authorizes the
    distribution + query caller; it is bearer-only and does NOT sign request bodies.
    The Orchestrator does NOT cryptographically re-verify the F-008 compact-JWS on a
    distributed policy at this seam — Sentinel's intake (Anoryx-Sentinel/src/policy/
    intake.py) is the verifying authority that resolves authoritative scope from the
    signature and rejects body-ID disagreement. See ADR-0001 §Threat model.

    ## O-002 event bus (envelope, replay, DLQ, version negotiation)
    Every ingested event is wrapped in the canonical cross-product ENVELOPE
    (contracts/event-envelope.schema.json, $id `anoryx:event-envelope:v1`, ADR-0002).
    The envelope's `payload` member is the locked F-002 event, referenced by `$ref` and
    validating UNMODIFIED. The ingest seam below is reconciled to this one event shape:
    its body is the envelope, not a bare event. Three new bus seams (`POST /v1/bus/replays`,
    `GET /v1/bus/dlq`, `GET /v1/bus/schema-versions`) specify bounded replay, dead-letter
    metadata, and schema-version negotiation. These are CONTRACT-ONLY: no replay runs, no
    message moves to a DLQ, no version is negotiated at runtime in O-002 — O-003 builds the
    machinery.

    Three envelope invariants are CONTRACT OBLIGATIONS a consumer (O-003) MUST enforce
    fail-closed (JSON Schema cannot express them across sibling values): `event_type` MUST
    equal `payload.event_type`; `idempotency_key` MUST equal `payload.event_id` (the F-002
    bus dedup key); `source_product` MUST equal the mTLS-authenticated peer identity (never
    trusted from the body, rule 7). Disagreement on any is rejected (to DLQ).

    ## O-002 HONESTY BOUNDARIES (non-removable; ADR-0002)
    (a) Replay and DLQ are SPECIFIED, not implemented — O-003 builds the machinery.
    (b) Delivery is at-least-once; consumers MUST dedupe on idempotency_key.
    (c) Unknown-version handling is reject-to-DLQ.

    Framing in this document is intentionally "audit-ready" and "risk reduction",
    never "compliant" or "blocks all attacks".

servers:
  - url: https://orchestrator.anoryx.io
    description: Production (internal network only)
  - url: http://localhost:8081
    description: Local development

# mTLS authenticates the peer product on EVERY operation (DoD #3). Each operation
# adds a second factor (HMAC on ingest, service token on distribution + query) via
# an operation-level security override.
security:
  - mutualTLS: []

tags:
  - name: ingest
    description: |
      Event ingest from Sentinel (Sentinel → Orchestrator). HMAC-signed webhook
      push. Bodies conform to the O-002 event envelope (event-envelope.schema.json),
      whose `payload` member validates against the locked Sentinel event schema
      (events.schema.json, $id `sentinel:events:v1`) UNMODIFIED. The downstream ingest
      pipeline (validation, dedup, fan-out) is O-003 and is NOT part of this contract —
      this seam only acknowledges receipt.
  - name: distribution
    description: |
      Policy distribution intake from Delta (Delta → Orchestrator). Accepts an
      already-signed policy record for distribution to one or more Sentinels. The
      distribution engine that performs the outbound forward is O-004 and is NOT
      part of this contract.
  - name: query
    description: |
      Read-only metadata reads for Delta — policy distribution status and event
      query. Read-only at this stage (honesty boundary c).
  - name: bus
    description: |
      O-002 ecosystem event-bus seams: bounded replay, dead-letter (DLQ) metadata, and
      schema-version negotiation. CONTRACT-ONLY — the replay/DLQ machinery is O-003. The
      replay seam acknowledges a request; the read seams return metadata only.
  - name: registry
    description: |
      O-005 multi-Sentinel registry (operator-scoped). Operators register, list, read,
      modify, deregister, and health-check the Sentinel instances this Orchestrator
      coordinates. Gated by the operator bearer token (env ORCH_ADMIN_TOKEN), DISTINCT
      from the peer service token. HONESTY: the registry is OPERATOR-SCOPED — per-tenant
      authorization of its contents is DEFERRED to O-006; a declared capability is
      RECORDED, not probed against the live Sentinel.
  - name: coordination
    description: |
      O-005 coordinated policy distribution: a single operator push fanned out across the
      registered, enabled, healthy Sentinels whose declared capabilities cover the policy.
      Best-effort per target (a per-target failure does not roll back the others); mTLS
      provisioning to the targets is DEFERRED to O-008.

paths:
  /v1/ingest/events:
    post:
      operationId: ingestEvent
      tags: [ingest]
      summary: Ingest a single governance/usage event from Sentinel
      description: |
        Sentinel pushes one event WRAPPED in the O-002 event envelope
        (event-envelope.schema.json, $id `anoryx:event-envelope:v1`) over an HMAC-signed
        webhook; the envelope's `payload` member is the locked events.schema.json event
        ($id `sentinel:events:v1`), validating UNMODIFIED. Reconciled from O-001's
        bare-event body to one canonical event shape (ADR-0002, Fork D). This seam
        ACKNOWLEDGES receipt only; it performs no pipeline processing (validation, dedup,
        fan-out is O-003).

        Auth: mTLS (peer = Sentinel) AND an HMAC-SHA256 body signature (the F-020
        webhook pattern): the signer computes `HMAC(secret, "{timestamp}.{body}")`
        and sends `X-Sentinel-Signature: sha256=<hex>` plus `X-Sentinel-Timestamp`
        (Unix seconds). Receivers reject timestamps outside a ±300s window
        (replay defense). A syntactically present signature is NOT a verified
        signature; verification is a receiver obligation (O-003).
      security:
        - mutualTLS: []
          hmacIngest: []
      parameters:
        - $ref: '#/components/parameters/IngestTimestamp'
      requestBody:
        required: true
        description: |
          A single Sentinel event WRAPPED in the O-002 event envelope
          (event-envelope.schema.json, $id `anoryx:event-envelope:v1`). The envelope's
          `payload` member validates against the locked
          Anoryx-Sentinel/contracts/events.schema.json (oneOf over all event variants)
          UNMODIFIED. Reconciled from O-001's bare-event body to one canonical event
          shape (ADR-0002, Fork D). source_product is the receiver-stamped mTLS peer
          identity (never trusted from the body); idempotency_key equals payload.event_id
          (the bus dedup key); delivery is at-least-once (consumers MUST dedupe on
          idempotency_key).
        content:
          application/json:
            schema:
              $ref: "./event-envelope.schema.json"
            examples:
              policyDecisionDenyEnvelope:
                summary: An event envelope wrapping a policy_decision_deny event (payload validates against events.schema.json unmodified)
                value:
                  schema_version: 1
                  envelope_id: "f0e1d2c3-4b5a-4c6d-8e9f-0a1b2c3d4e5f"
                  event_type: policy_decision_deny
                  source_product: sentinel
                  occurred_at: "2026-06-26T12:00:01Z"
                  idempotency_key: "c1d2e3f4-5678-4abc-9def-0123456789ab"
                  sequence: 1024
                  correlation_id: "req-o001-ingest-example-01"
                  payload:
                    event_type: policy_decision_deny
                    tenant_id: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
                    team_id: "7d9e2f3a-1234-5c6b-8def-0123456789ab"
                    project_id: "b3c4d5e6-abcd-1234-ef01-234567890abc"
                    agent_id: "gateway-core"
                    event_id: "c1d2e3f4-5678-4abc-9def-0123456789ab"
                    event_timestamp: "2026-06-26T12:00:00Z"
                    request_id: "req-o001-ingest-example-01"
                    action_taken: blocked
                    policy_id: "d4e5f6a7-9012-4bcd-8ef0-123456789abc"
                    requested_model: "gpt-4o"
                    violation_type: "budget_cost_exceeded"
      responses:
        '202':
          description: Event accepted for (later) processing. No pipeline runs in O-002 (honesty boundary a); the ingest pipeline is O-003.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventIngestAccepted'
              examples:
                accepted:
                  value:
                    status: accepted
                    event_id: "c1d2e3f4-5678-4abc-9def-0123456789ab"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /v1/policies/distributions:
    post:
      operationId: createPolicyDistribution
      tags: [distribution]
      summary: Submit a signed policy for distribution to one or more Sentinels
      description: |
        Delta submits a policy record for distribution. The `policy` member conforms
        to the locked Anoryx-Sentinel/contracts/policy.schema.json ($id
        `sentinel:policy:v1`, frozen at F-008 a9e2344) UNMODIFIED, and carries its own
        embedded compact-JWS `signature` (the F-008 signing path). This is the
        PASS-THROUGH path: the Orchestrator forwards the already-signed record to
        Sentinel's intake; it does NOT sign on Delta's behalf (honesty boundary b).
        `sign_on_behalf` is documented but GATED OFF in v1.

        The outbound forward to Sentinel (and its status reconciliation) is O-004 and
        is NOT implemented by this contract. Sentinel's intake
        (Anoryx-Sentinel/src/policy/intake.py) remains the verifying authority that
        resolves authoritative scope from the signature.

        Auth: mTLS (peer = Delta) AND a Delta service token (bearer).
      security:
        - mutualTLS: []
          serviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyDistributionRequest'
            examples:
              budgetLimitDistribution:
                summary: Distribute a budget_limit policy (policy validates against policy.schema.json)
                value:
                  policy:
                    policy_type: budget_limit
                    tenant_id: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
                    team_id: "7d9e2f3a-1234-5c6b-8def-0123456789ab"
                    project_id: "b3c4d5e6-abcd-1234-ef01-234567890abc"
                    agent_id: "delta-budget"
                    policy_id: "e5f6a7b8-0123-4cde-9f01-23456789abcd"
                    policy_version: 1
                    effective_from: "2026-06-26T00:00:00Z"
                    signature: "eyJhbGciOiJFUzI1NiJ9.eyJ0ZW5hbnRfaWQiOiIyYTRmOGMxZSJ9.MEUCIQDexampleSignatureSegmentAAAA"
                    period: monthly
                    scope: team
                    max_cost_cents_per_period: 500000
                  targets:
                    - sentinel_id: "sentinel-prod-eu-1"
                  sign_on_behalf: false
      responses:
        '202':
          description: |
            Distribution request accepted and assigned an opaque distribution_id.
            Acceptance is NOT confirmation of delivery to any Sentinel (that is the
            O-004 distribution engine + the GET status seam).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionAccepted'
              examples:
                accepted:
                  value:
                    distribution_id: "a7b8c9d0-1234-4ef0-9abc-def012345678"
                    policy_id: "e5f6a7b8-0123-4cde-9f01-23456789abcd"
                    state: pending
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /v1/policies/distributions/{distribution_id}:
    get:
      operationId: getPolicyDistributionStatus
      tags: [query]
      summary: Read the distribution status of a submitted policy (read-only metadata)
      description: |
        Returns the distribution status for a previously submitted policy. READ-ONLY
        METADATA (honesty boundary c): per-target delivery state, no policy body, no
        mutation.

        NOTE: the service token is COARSE-GRAINED — per-tenant read authorization is
        deferred to O-006 (honesty boundary d).

        Auth: mTLS (peer = Delta) AND a Delta service token (bearer).
      security:
        - mutualTLS: []
          serviceToken: []
      parameters:
        - $ref: '#/components/parameters/DistributionId'
      responses:
        '200':
          description: The distribution status record (metadata only).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DistributionStatus'
              examples:
                partial:
                  value:
                    distribution_id: "a7b8c9d0-1234-4ef0-9abc-def012345678"
                    policy_id: "e5f6a7b8-0123-4cde-9f01-23456789abcd"
                    state: partial
                    created_at: "2026-06-26T12:00:05Z"
                    targets:
                      - sentinel_id: "sentinel-prod-eu-1"
                        state: distributed
                        last_attempt_at: "2026-06-26T12:00:06Z"
                      - sentinel_id: "sentinel-prod-us-1"
                        state: failed
                        last_attempt_at: "2026-06-26T12:00:06Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/events:
    get:
      operationId: queryEvents
      tags: [query]
      summary: Query ingested event metadata (read-only metadata)
      description: |
        Returns a metadata-only, cursor-paginated list of ingested events for Delta.
        READ-ONLY METADATA (honesty boundary c): join keys + type + time only, never
        full event payloads. Filtering by tenant/team/agent/type/time is supported.

        NOTE: the service token is COARSE-GRAINED — per-tenant read authorization is
        deferred to O-006 (honesty boundary d). The tenant_id/team_id filters are
        conveniences, not an authorization boundary.

        Auth: mTLS (peer = Delta) AND a Delta service token (bearer).
      security:
        - mutualTLS: []
          serviceToken: []
      parameters:
        - $ref: '#/components/parameters/FilterTenantId'
        - $ref: '#/components/parameters/FilterTeamId'
        - $ref: '#/components/parameters/FilterAgentId'
        - $ref: '#/components/parameters/FilterEventType'
        - $ref: '#/components/parameters/FilterSince'
        - $ref: '#/components/parameters/FilterUntil'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A page of event metadata records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventMetadataPage'
              examples:
                page:
                  value:
                    data:
                      - event_id: "c1d2e3f4-5678-4abc-9def-0123456789ab"
                        event_type: policy_decision_deny
                        event_timestamp: "2026-06-26T12:00:00Z"
                        tenant_id: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
                        team_id: "7d9e2f3a-1234-5c6b-8def-0123456789ab"
                        project_id: "b3c4d5e6-abcd-1234-ef01-234567890abc"
                        agent_id: "gateway-core"
                        request_id: "req-o001-ingest-example-01"
                    next_cursor: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/bus/replays:
    post:
      operationId: requestReplay
      tags: [bus]
      summary: Request a bounded replay of bus events (acknowledged only)
      description: |
        Requests a BOUNDED replay of previously-emitted envelopes, from a sequence
        lower bound, a timestamp lower bound, OR a specific dead-letter entry — exactly
        one selector (oneOf), always with a `limit` cap. Unbounded / full event-store
        replay is deliberately not expressible (replay-amplification defense).

        CONTRACT-ONLY: this seam ACKNOWLEDGES the request and assigns a `replay_id`; NO
        replay runs in O-002 (honesty boundary a). The replay engine, the window
        enforcement, and the rate limiting are O-003.

        Auth: mTLS (peer = Delta/operator) AND a Delta service token (bearer). Replay is
        a privileged operation bounded by window + limit + auth + rate.
      security:
        - mutualTLS: []
          serviceToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReplayRequest'
            examples:
              fromSequence:
                summary: Replay from a sequence lower bound, capped by limit
                value:
                  source_product: sentinel
                  from_sequence: 1024
                  limit: 100
              fromDlq:
                summary: Re-drive a single dead-lettered entry (replay-from-DLQ)
                value:
                  source_product: sentinel
                  dlq_id: "9f8e7d6c-5b4a-4039-8281-706f5e4d3c2b"
                  limit: 1
      responses:
        '202':
          description: |
            Replay request accepted and assigned an opaque replay_id. Acceptance is NOT
            execution (no replay runs in O-002).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayAccepted'
              examples:
                accepted:
                  value:
                    replay_id: "1b2c3d4e-5f60-4718-9a2b-3c4d5e6f7081"
                    state: pending
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /v1/bus/dlq:
    get:
      operationId: queryDeadLetters
      tags: [bus]
      summary: Query dead-letter (DLQ) entry metadata (read-only metadata)
      description: |
        Returns a metadata-only, cursor-paginated list of dead-lettered envelopes for
        Delta/operator triage. READ-ONLY METADATA: dlq_id, reason, attempt count, first-
        failed-at, and the originating envelope's classifying fields (event_type,
        source_product, sequence). It NEVER returns the preserved `original_envelope`
        body — that would re-expose full event payloads, which the O-001 query honesty
        boundary forbids. Recovering a full DLQ record (to re-drive it) is done by
        replay-from-DLQ (POST /v1/bus/replays with dlq_id), not by reading it here.

        NOTE: like the O-001 query seams the service token is COARSE-GRAINED — per-tenant
        read authorization is deferred to O-006.

        Auth: mTLS (peer = Delta/operator) AND a Delta service token (bearer).
      security:
        - mutualTLS: []
          serviceToken: []
      parameters:
        - $ref: '#/components/parameters/FilterReason'
        - $ref: '#/components/parameters/FilterSourceProduct'
        - $ref: '#/components/parameters/FilterSince'
        - $ref: '#/components/parameters/FilterUntil'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A page of dead-letter entry metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeadLetterMetadataPage'
              examples:
                page:
                  value:
                    data:
                      - dlq_id: "9f8e7d6c-5b4a-4039-8281-706f5e4d3c2b"
                        reason: unknown_schema_version
                        attempt_count: 3
                        first_failed_at: "2026-06-26T12:00:10Z"
                        event_type: policy_decision_deny
                        source_product: sentinel
                        sequence: 1024
                    next_cursor: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/bus/schema-versions:
    get:
      operationId: getSupportedSchemaVersions
      tags: [bus]
      summary: The supported envelope schema versions (version negotiation)
      description: |
        Returns the explicit allow-list of envelope `schema_version` values this bus
        accepts, plus the envelope schema $id. This is the allow-list backing the
        reject-to-DLQ rule (honesty boundary c): an inbound envelope whose schema_version
        is not in `supported` is routed to the DLQ (a consumer obligation in O-003), never
        best-effort-parsed.

        Auth: mTLS (peer = Delta/operator) AND a Delta service token (bearer).
      security:
        - mutualTLS: []
          serviceToken: []
      responses:
        '200':
          description: The supported envelope schema versions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaVersions'
              examples:
                v1:
                  value:
                    supported: [1]
                    envelope_schema_id: "anoryx:event-envelope:v1"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/registry/sentinels:
    post:
      operationId: registerSentinel
      tags: [registry]
      summary: Register a Sentinel instance in the coordination registry
      description: |
        Registers a Sentinel deployment the Orchestrator will coordinate. The
        `capabilities` array DECLARES which policy facets the instance claims to enforce
        (budget_limit, model_allowlist, model_approval, model_denylist, code_scan,
        data_lock); these are RECORDED as declared, NOT probed against the live Sentinel
        (honesty: capability is declared, not verified). `endpoint` is the Sentinel intake
        base URL; the runtime validates it (SSRF defense — non-https / private / loopback
        targets are rejected with 422). `peer_auth_ref` is a NON-SECRET reference label
        pointing at the credential held elsewhere (Vault / deploy tooling) — never the
        secret itself.

        OPERATOR-SCOPED: gated by the operator bearer token (env ORCH_ADMIN_TOKEN),
        DISTINCT from the peer service token. Per-tenant authorization of registry
        contents is DEFERRED to O-006.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SentinelRegistrationRequest'
            examples:
              register:
                summary: Register a Sentinel that declares budget + model-approval enforcement
                value:
                  sentinel_id: "sentinel-prod-eu-1"
                  endpoint: "https://sentinel-eu-1.internal.anoryx.io"
                  capabilities: [budget_limit, model_approval]
                  peer_auth_ref: "vault://orchestrator/peers/sentinel-prod-eu-1"
      responses:
        '201':
          description: The Sentinel was registered. Returns the stored registry entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentinelRegistryEntry'
              examples:
                registered:
                  value:
                    sentinel_id: "sentinel-prod-eu-1"
                    endpoint: "https://sentinel-eu-1.internal.anoryx.io"
                    peer_auth_ref: "vault://orchestrator/peers/sentinel-prod-eu-1"
                    capabilities: [budget_limit, model_approval]
                    health_status: unknown
                    consecutive_failures: 0
                    last_checked_at: null
                    last_healthy_at: null
                    enabled: true
                    created_at: "2026-06-30T12:00:00Z"
                    updated_at: "2026-06-30T12:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      operationId: listSentinels
      tags: [registry]
      summary: List registered Sentinel instances (operator-scoped)
      description: |
        Returns every registered Sentinel entry. OPERATOR-SCOPED: per-tenant
        authorization of registry contents is DEFERRED to O-006 — a token holder reads
        registry entries across tenants.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      responses:
        '200':
          description: The list of registered Sentinel entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentinelRegistryList'
              examples:
                list:
                  value:
                    sentinels:
                      - sentinel_id: "sentinel-prod-eu-1"
                        endpoint: "https://sentinel-eu-1.internal.anoryx.io"
                        peer_auth_ref: "vault://orchestrator/peers/sentinel-prod-eu-1"
                        capabilities: [budget_limit, model_approval]
                        health_status: healthy
                        consecutive_failures: 0
                        last_checked_at: "2026-06-30T12:05:00Z"
                        last_healthy_at: "2026-06-30T12:05:00Z"
                        enabled: true
                        created_at: "2026-06-30T12:00:00Z"
                        updated_at: "2026-06-30T12:05:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/registry/sentinels/{sentinel_id}:
    get:
      operationId: getSentinel
      tags: [registry]
      summary: Read one registered Sentinel instance (operator-scoped)
      description: |
        Returns a single registry entry by sentinel_id. OPERATOR-SCOPED: per-tenant
        authorization is DEFERRED to O-006.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      parameters:
        - $ref: '#/components/parameters/SentinelIdPath'
      responses:
        '200':
          description: The requested Sentinel registry entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentinelRegistryEntry'
              examples:
                entry:
                  value:
                    sentinel_id: "sentinel-prod-eu-1"
                    endpoint: "https://sentinel-eu-1.internal.anoryx.io"
                    peer_auth_ref: "vault://orchestrator/peers/sentinel-prod-eu-1"
                    capabilities: [budget_limit, model_approval]
                    health_status: healthy
                    consecutive_failures: 0
                    last_checked_at: "2026-06-30T12:05:00Z"
                    last_healthy_at: "2026-06-30T12:05:00Z"
                    enabled: true
                    created_at: "2026-06-30T12:00:00Z"
                    updated_at: "2026-06-30T12:05:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateSentinel
      tags: [registry]
      summary: Modify a registered Sentinel instance (operator-scoped)
      description: |
        Updates a subset of a registry entry's mutable fields (endpoint, capabilities,
        peer_auth_ref, enabled). Disabling (`enabled: false`) removes the instance from
        coordinated pushes and health cycles without deregistering it. As at registration,
        `endpoint` is SSRF-validated and `capabilities` are RECORDED as declared, NOT
        probed. OPERATOR-SCOPED: per-tenant authorization is DEFERRED to O-006.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      parameters:
        - $ref: '#/components/parameters/SentinelIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SentinelUpdateRequest'
            examples:
              disable:
                summary: Take a Sentinel out of coordinated pushes
                value:
                  enabled: false
              recapability:
                summary: Update endpoint and declared capabilities
                value:
                  endpoint: "https://sentinel-eu-1b.internal.anoryx.io"
                  capabilities: [budget_limit, model_approval, model_denylist]
      responses:
        '200':
          description: The updated Sentinel registry entry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentinelRegistryEntry'
              examples:
                updated:
                  value:
                    sentinel_id: "sentinel-prod-eu-1"
                    endpoint: "https://sentinel-eu-1b.internal.anoryx.io"
                    peer_auth_ref: "vault://orchestrator/peers/sentinel-prod-eu-1"
                    capabilities: [budget_limit, model_approval, model_denylist]
                    health_status: healthy
                    consecutive_failures: 0
                    last_checked_at: "2026-06-30T12:05:00Z"
                    last_healthy_at: "2026-06-30T12:05:00Z"
                    enabled: false
                    created_at: "2026-06-30T12:00:00Z"
                    updated_at: "2026-06-30T12:10:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      operationId: deregisterSentinel
      tags: [registry]
      summary: Deregister a Sentinel instance (operator-scoped)
      description: |
        Removes a Sentinel from the coordination registry. After deregistration the
        instance no longer participates in coordinated pushes or health cycles.
        OPERATOR-SCOPED: per-tenant authorization is DEFERRED to O-006.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      parameters:
        - $ref: '#/components/parameters/SentinelIdPath'
      responses:
        '200':
          description: The Sentinel was deregistered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SentinelDeregistered'
              examples:
                deregistered:
                  value:
                    sentinel_id: "sentinel-prod-eu-1"
                    deregistered: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/registry/health-check:
    post:
      operationId: runRegistryHealthCheck
      tags: [registry]
      summary: Run a health cycle across the registered Sentinels (operator-scoped)
      description: |
        Runs one health cycle over the registered, enabled Sentinels and returns the
        per-instance status transition. HONESTY: `healthy` means the instance was
        REACHABLE per the documented health contract — it is NOT a verification that the
        Sentinel is actually enforcing any policy or capability. `degraded` / `unreachable`
        reflect reachability / contract failures only; `consecutive_failures` is the streak
        backing the status. OPERATOR-SCOPED: per-tenant authorization is DEFERRED to O-006.

        Takes no request body.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      responses:
        '200':
          description: Per-instance health transitions for this cycle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResult'
              examples:
                cycle:
                  value:
                    results:
                      - sentinel_id: "sentinel-prod-eu-1"
                        previous_status: unknown
                        status: healthy
                        consecutive_failures: 0
                      - sentinel_id: "sentinel-prod-us-1"
                        previous_status: healthy
                        status: unreachable
                        consecutive_failures: 1
                        reason: connection_timeout
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/policies/coordinate:
    post:
      operationId: coordinatePolicyDistribution
      tags: [coordination]
      summary: Coordinate a policy push across the registered Sentinels (operator-scoped)
      description: |
        Distributes one already-signed policy to the registered, enabled, healthy
        Sentinels whose declared capabilities cover the policy. The `policy` member
        conforms to the locked Anoryx-Sentinel/contracts/policy.schema.json ($id
        `sentinel:policy:v1`, frozen at F-008 a9e2344) UNMODIFIED and carries its own
        embedded compact-JWS signature; as on the distribution seam this is PASS-THROUGH
        (the Orchestrator does NOT sign on the submitter's behalf).

        HONESTY: the coordinated push is BEST-EFFORT PER TARGET — a per-target failure
        does NOT roll back the targets that succeeded; the result reports each target's
        outcome and the targets skipped (e.g. disabled, unhealthy, or capability not
        declared). A capability skip is based on the DECLARED capability set, which is
        recorded, not probed. mTLS provisioning to the targets is DEFERRED to O-008.
        OPERATOR-SCOPED: per-tenant authorization is DEFERRED to O-006.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoordinatedPolicyRequest'
            examples:
              coordinate:
                summary: Coordinate a budget_limit policy across capable Sentinels
                value:
                  policy:
                    policy_type: budget_limit
                    tenant_id: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
                    team_id: "7d9e2f3a-1234-5c6b-8def-0123456789ab"
                    project_id: "b3c4d5e6-abcd-1234-ef01-234567890abc"
                    agent_id: "delta-budget"
                    policy_id: "e5f6a7b8-0123-4cde-9f01-23456789abcd"
                    policy_version: 1
                    effective_from: "2026-06-26T00:00:00Z"
                    signature: "eyJhbGciOiJFUzI1NiJ9.eyJ0ZW5hbnRfaWQiOiIyYTRmOGMxZSJ9.MEUCIQDexampleSignatureSegmentAAAA"
                    period: monthly
                    scope: team
                    max_cost_cents_per_period: 500000
      responses:
        '202':
          description: |
            The coordinated push was accepted and fanned out best-effort. The aggregate
            `state` plus per-target outcomes and skips are reported; acceptance is NOT a
            guarantee that every target enforced the policy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoordinatedDistributionResult'
              examples:
                partial:
                  value:
                    distribution_id: "a7b8c9d0-1234-4ef0-9abc-def012345678"
                    policy_id: "e5f6a7b8-0123-4cde-9f01-23456789abcd"
                    state: partial
                    targets:
                      - sentinel_id: "sentinel-prod-eu-1"
                        state: distributed
                      - sentinel_id: "sentinel-prod-us-1"
                        state: failed
                        reason: upstream_5xx
                    skipped:
                      - sentinel_id: "sentinel-prod-ap-1"
                        reason: capability_not_declared
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:

  securitySchemes:
    mutualTLS:
      type: mutualTLS
      description: |
        Mutual-TLS client-certificate authentication of the PEER PRODUCT (Sentinel
        or Delta). DECLARED here and APPLIED to every operation; certificate
        PROVISIONING and trust-store setup are DEFERRED to O-008 (F-034). Until then
        this scheme is a contract declaration, not a live enforced channel (honesty
        boundary a). mTLS establishes product identity only — it does not sign or
        authorize individual request bodies.

    hmacIngest:
      type: apiKey
      in: header
      name: X-Sentinel-Signature
      description: |
        Per-event HMAC-SHA256 body signature on the ingest seam, reusing the F-020
        webhook pattern (Anoryx-Sentinel/src/orchestration/webhooks/signer.py). The
        signer computes `HMAC-SHA256(signing_secret, "{timestamp}.{body}")` and sends
        the hex digest as `X-Sentinel-Signature: sha256=<hex>`, paired with the
        `X-Sentinel-Timestamp` header (Unix epoch seconds). Receivers MUST reject a
        timestamp outside a ±300s window (replay defense) and MUST recompute and
        compare the digest in constant time. NOTE: `apiKey` is the closest OpenAPI 3.1
        modelable type for an HMAC header; the real semantics (keyed signature over
        timestamp+body, not a static secret) are described here, not in the type. A
        present, well-formed signature is NOT a verified signature.

    serviceToken:
      type: http
      scheme: bearer
      description: |
        Delta service token (bearer) authorizing the distribution + query caller.
        Bearer-only: it authorizes the caller but does NOT sign request bodies (the
        embedded policy compact-JWS does that for distribution). Issued/rotated by
        deploy tooling; provisioning details are out of scope for O-001.

    operatorBearer:
      type: http
      scheme: bearer
      description: |
        O-005 OPERATOR bearer token (env ORCH_ADMIN_TOKEN) authorizing the privileged
        multi-Sentinel coordination operations: registry CRUD, the registry health-check
        cycle, and the coordinated policy push. DISTINCT from the peer `serviceToken`
        (env ORCH_SERVICE_TOKEN) used on the distribution + query seams — that is a
        peer-PRODUCT credential, this is an OPERATOR credential, and the two are NOT
        interchangeable. Bearer-only: it authorizes the operator caller but does NOT sign
        request bodies. The registry is OPERATOR-SCOPED — per-tenant authorization of its
        contents is DEFERRED to O-006, so a token holder operates across tenants; treat
        the token accordingly until O-006 lands. Issued/rotated by deploy tooling;
        provisioning details are out of scope here.

  parameters:
    IngestTimestamp:
      name: X-Sentinel-Timestamp
      in: header
      required: true
      description: |
        Unix epoch seconds (UTC) of signing, the timestamp half of the HMAC signed
        payload `"{timestamp}.{body}"`. Receivers reject values outside ±300s.
      schema:
        type: string
        # Unix epoch SECONDS: 10 digits today, 11 covers through year ~5138.
        # Nanosecond/millisecond magnitudes are out of contract by construction.
        pattern: '^[0-9]{10,11}$'
        maxLength: 11
      example: "1781784000"

    DistributionId:
      name: distribution_id
      in: path
      required: true
      description: Opaque identifier returned by POST /v1/policies/distributions.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "a7b8c9d0-1234-4ef0-9abc-def012345678"

    FilterTenantId:
      name: tenant_id
      in: query
      required: false
      description: Filter events to this tenant (UUID v4).
      schema:
        type: string
        format: uuid
        maxLength: 64

    FilterTeamId:
      name: team_id
      in: query
      required: false
      description: Filter events to this team (UUID v4).
      schema:
        type: string
        format: uuid
        maxLength: 64

    FilterAgentId:
      name: agent_id
      in: query
      required: false
      description: |
        Filter events to this emitting Sentinel component (lowercase slug, e.g.
        `gateway-core`). Matches the agent_id shape in events.schema.json — NOT a UUID,
        NOT the end-user AI model name.
      schema:
        type: string
        pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
        maxLength: 64

    FilterEventType:
      name: event_type
      in: query
      required: false
      description: |
        Filter to a single event_type const (one of the variants in
        events.schema.json, e.g. `policy_decision_deny`).
      schema:
        type: string
        pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
        maxLength: 64

    FilterSince:
      name: since
      in: query
      required: false
      description: Inclusive lower bound on event_timestamp (RFC 3339 date-time, UTC).
      schema:
        type: string
        format: date-time
        maxLength: 64

    FilterUntil:
      name: until
      in: query
      required: false
      description: Exclusive upper bound on event_timestamp (RFC 3339 date-time, UTC).
      schema:
        type: string
        format: date-time
        maxLength: 64

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of metadata records to return (bounded).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor from a previous response's next_cursor.
      schema:
        type: string
        maxLength: 512

    FilterReason:
      name: reason
      in: query
      required: false
      description: Filter dead-letter entries to a single failure reason.
      schema:
        $ref: '#/components/schemas/DeadLetterReason'

    FilterSourceProduct:
      name: source_product
      in: query
      required: false
      description: Filter dead-letter entries to a single emitting product.
      schema:
        $ref: '#/components/schemas/SourceProduct'

    SentinelIdPath:
      name: sentinel_id
      in: path
      required: true
      description: |
        Opaque Sentinel deployment id (registry key). Mirrors the sentinel_id shape used
        across the distribution targets and the O-005 registry.
      schema:
        type: string
        pattern: '^[A-Za-z0-9._-]{1,128}$'
        maxLength: 128
      example: "sentinel-prod-eu-1"

  schemas:

    EventIngestAccepted:
      type: object
      additionalProperties: false
      required: [status, event_id]
      description: Acknowledgement that an event was accepted for later processing.
      properties:
        status:
          type: string
          enum: [accepted]
        event_id:
          type: string
          format: uuid
          maxLength: 64
          description: Echo of the accepted event's event_id (the bus dedup key).

    PolicyDistributionTarget:
      type: object
      additionalProperties: false
      required: [sentinel_id]
      description: |
        A distribution target. `sentinel_id` is an OPAQUE Sentinel deployment
        identifier resolved by the O-005 registry; this contract does not define the
        registry or the resolution rules.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
          description: Opaque Sentinel deployment id (registry-resolved in O-005).

    PolicyDistributionRequest:
      type: object
      additionalProperties: false
      required: [policy]
      description: |
        A policy-distribution submission. `policy` is an already-signed policy record
        that validates against the LOCKED policy.schema.json UNMODIFIED (its embedded
        compact-JWS `signature` is the F-008 signing path). `targets` is optional; when
        omitted the distribution engine (O-004) resolves targets from the policy scope.
      properties:
        policy:
          $ref: "../../Anoryx-Sentinel/contracts/policy.schema.json"
        targets:
          type: array
          maxItems: 256
          description: Optional explicit distribution targets.
          items:
            $ref: '#/components/schemas/PolicyDistributionTarget'
        sign_on_behalf:
          type: boolean
          enum: [false]
          default: false
          description: |
            GATED / DISABLED in v1 (honesty boundary b). Constrained to `false` at the
            SCHEMA layer (enum: [false]) so the contract itself rejects `true` — this is
            secure-by-construction, not secure-by-documentation. When false the
            Orchestrator passes the already-signed policy through unchanged. Enabling
            Orchestrator-signing on Delta's behalf is a deliberate trust-surface
            expansion that requires a NEW ADR to widen this field to a plain boolean.
            Holding Delta's signing key is the larger trust surface and is intentionally
            not the default.

    DistributionAccepted:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, state]
      description: Acknowledgement that a distribution request was accepted (not yet delivered).
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
          description: Opaque id for status lookup via GET /v1/policies/distributions/{distribution_id}.
        policy_id:
          type: string
          format: uuid
          maxLength: 64
          description: Echo of the submitted policy's policy_id.
        state:
          type: string
          enum: [pending]
          description: Always 'pending' at acceptance; delivery is asynchronous (O-004).

    DistributionTargetStatus:
      type: object
      additionalProperties: false
      required: [sentinel_id, state]
      description: Per-target delivery state (metadata only).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        state:
          type: string
          enum: [pending, distributed, failed]
          description: Delivery state for this target. No error bodies are exposed here.
        last_attempt_at:
          type: string
          format: date-time
          maxLength: 64
          description: Timestamp of the last delivery attempt (RFC 3339, UTC), if any.

    DistributionStatus:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, state, created_at]
      description: |
        Distribution status for a submitted policy (read-only metadata). Aggregated
        `state` plus per-target states. No policy body is returned.
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
        policy_id:
          type: string
          format: uuid
          maxLength: 64
        state:
          type: string
          enum: [pending, distributed, partial, failed]
          description: Aggregate distribution state across all targets.
        created_at:
          type: string
          format: date-time
          maxLength: 64
        targets:
          type: array
          maxItems: 256
          items:
            $ref: '#/components/schemas/DistributionTargetStatus'

    EventMetadata:
      type: object
      additionalProperties: false
      required: [event_id, event_type, event_timestamp, tenant_id, team_id, project_id, agent_id]
      description: |
        Metadata-only projection of an ingested event (join keys + type + time). NEVER
        the full event payload (honesty boundary c). All FOUR stable IDs are required:
        every F-002 event variant requires tenant_id/team_id/project_id/agent_id, and
        these four are the join key between Sentinel events and Delta records, so the
        projection guarantees them (tightened during O-002 review; see ADR-0002).
      properties:
        event_id:
          type: string
          format: uuid
          maxLength: 64
        event_type:
          type: string
          pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
          maxLength: 64
        event_timestamp:
          type: string
          format: date-time
          maxLength: 64
        tenant_id:
          type: string
          format: uuid
          maxLength: 64
        team_id:
          type: string
          format: uuid
          maxLength: 64
        project_id:
          type: string
          format: uuid
          maxLength: 64
        agent_id:
          # The fourth stable ID (join key). Lowercase slug, mirroring the agent_id
          # shape in events.schema.json — NOT a UUID, NOT the end-user AI model name.
          type: string
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          maxLength: 64
        request_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,64}$'
          maxLength: 64

    EventMetadataPage:
      type: object
      additionalProperties: false
      required: [data]
      description: A cursor-paginated page of event metadata.
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/EventMetadata'
        next_cursor:
          type: [string, "null"]
          maxLength: 512
          description: Opaque cursor for the next page, or null when no more pages.

    Error:
      type: object
      additionalProperties: false
      required: [error]
      description: |
        Standard error envelope. Never echoes the request body, never contains
        plaintext PII; correlate via request_id.
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
              pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
              maxLength: 64
              description: Stable machine-readable error code slug.
            message:
              type: string
              maxLength: 512
              description: Human-readable, PII-free description.
            request_id:
              type: string
              pattern: '^[A-Za-z0-9._-]{1,64}$'
              maxLength: 64

    # ----------------------------------------------------------------------- #
    # O-002 event bus: envelope-derived enums, DLQ, replay, version negotiation
    # ----------------------------------------------------------------------- #

    SourceProduct:
      type: string
      enum: [sentinel, orchestrator, delta, rendly]
      description: |
        Emitting ecosystem product. Mirrors the source_product enum in
        event-envelope.schema.json. The TRUSTED value is the mTLS-authenticated peer
        identity, never the body (rule 7, ADR-0002).

    DeadLetterReason:
      type: string
      enum:
        - unknown_schema_version
        - payload_schema_invalid
        - source_identity_mismatch
        - idempotency_conflict
        - max_attempts_exceeded
      description: |
        Closed set of reasons an envelope is dead-lettered. unknown_schema_version
        (boundary c); payload_schema_invalid (payload failed events.schema.json);
        source_identity_mismatch (body source_product != mTLS peer); idempotency_conflict
        (dedup-key collision under at-least-once); max_attempts_exceeded (TERMINAL — the
        attempt ceiling that bounds DLQ poisoning).

    DeadLetterMetadata:
      type: object
      additionalProperties: false
      required: [dlq_id, reason, attempt_count, first_failed_at, event_type, source_product, sequence]
      description: |
        Metadata projection of a dead-lettered envelope (read-only). NEVER the preserved
        original_envelope body — the O-001 read-only-metadata boundary forbids re-exposing
        full payloads on a read seam.
      properties:
        dlq_id:
          type: string
          format: uuid
          maxLength: 64
        reason:
          $ref: '#/components/schemas/DeadLetterReason'
        attempt_count:
          type: integer
          minimum: 0
          maximum: 1000
          description: Attempts before dead-lettering. Bounded; max_attempts_exceeded is terminal.
        first_failed_at:
          type: string
          format: date-time
          maxLength: 64
        event_type:
          type: string
          pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
          maxLength: 64
          description: Classifying event_type of the dead-lettered envelope (triage without the body).
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        sequence:
          type: integer
          minimum: 0
          maximum: 9007199254740991

    DeadLetterMetadataPage:
      type: object
      additionalProperties: false
      required: [data]
      description: A cursor-paginated page of dead-letter entry metadata.
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/DeadLetterMetadata'
        next_cursor:
          type: [string, "null"]
          maxLength: 512
          description: Opaque cursor for the next page, or null when no more pages.

    DeadLetterEnvelope:
      type: object
      additionalProperties: false
      required: [dlq_id, original_envelope, reason, attempt_count, first_failed_at]
      description: |
        The dead-letter FAILURE-ENVELOPE: the original envelope PRESERVED, plus why it
        failed, how many attempts, and when it first failed. This is the full record the
        O-003 DLQ stores and that replay-from-DLQ re-drives; the GET /v1/bus/dlq read seam
        returns only the DeadLetterMetadata projection (never original_envelope — O-001
        read-only-metadata boundary). Closed and bounded (DLQ-poisoning defense).
      properties:
        dlq_id:
          type: string
          format: uuid
          maxLength: 64
        original_envelope:
          $ref: './event-envelope.schema.json'
        reason:
          $ref: '#/components/schemas/DeadLetterReason'
        attempt_count:
          type: integer
          minimum: 0
          maximum: 1000
          description: Attempts before dead-lettering. max_attempts_exceeded is terminal — bounds re-drive (DLQ-poisoning defense).
        first_failed_at:
          type: string
          format: date-time
          maxLength: 64
        last_failed_at:
          type: string
          format: date-time
          maxLength: 64
          description: Timestamp of the most recent failed attempt (RFC 3339, UTC), if any.

    ReplayLimit:
      type: integer
      minimum: 1
      maximum: 1000
      description: |
        Maximum envelopes to replay in one request (bounded 1..1000; replay-amplification
        defense). REQUIRED on every replay selector so the cap is enforced at the schema
        gate, not by a consumer-applied default — the contract's "always with a limit cap"
        guarantee holds structurally.

    ReplayFromSequence:
      type: object
      additionalProperties: false
      required: [source_product, from_sequence, limit]
      description: Replay from an inclusive per-source sequence lower bound.
      properties:
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        from_sequence:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Inclusive lower bound on the per-source monotonic sequence.
        limit:
          $ref: '#/components/schemas/ReplayLimit'

    ReplayFromTimestamp:
      type: object
      additionalProperties: false
      required: [source_product, from_timestamp, limit]
      description: Replay from an inclusive occurred_at lower bound.
      properties:
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        from_timestamp:
          type: string
          format: date-time
          maxLength: 64
          description: Inclusive lower bound on occurred_at (RFC 3339, UTC).
        limit:
          $ref: '#/components/schemas/ReplayLimit'

    ReplayFromDlq:
      type: object
      additionalProperties: false
      required: [source_product, dlq_id, limit]
      description: Re-drive a single dead-lettered entry (replay-from-DLQ).
      properties:
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        dlq_id:
          type: string
          format: uuid
          maxLength: 64
          description: The dead-letter entry to re-drive (from GET /v1/bus/dlq).
        limit:
          $ref: '#/components/schemas/ReplayLimit'

    ReplayRequest:
      description: |
        A BOUNDED replay request. Exactly ONE selector (oneOf) — from_sequence,
        from_timestamp, or dlq_id — plus the source_product stream and a bounded limit.
        Unbounded / full event-store replay is deliberately not expressible
        (replay-amplification defense). CONTRACT-ONLY: acknowledged, not executed
        (honesty boundary a).
      oneOf:
        - $ref: '#/components/schemas/ReplayFromSequence'
        - $ref: '#/components/schemas/ReplayFromTimestamp'
        - $ref: '#/components/schemas/ReplayFromDlq'

    ReplayAccepted:
      type: object
      additionalProperties: false
      required: [replay_id, state]
      description: Acknowledgement that a replay request was accepted (not executed in O-002).
      properties:
        replay_id:
          type: string
          format: uuid
          maxLength: 64
          description: Opaque id for the accepted replay request.
        state:
          type: string
          enum: [pending]
          description: Always 'pending' at acceptance; no replay runs in O-002 (boundary a).

    SchemaVersions:
      type: object
      additionalProperties: false
      required: [supported, envelope_schema_id]
      description: |
        The explicit allow-list of envelope schema_version values this bus accepts, plus
        the envelope schema $id. Backs the reject-to-DLQ rule (boundary c): an inbound
        envelope whose schema_version is not in `supported` is routed to the DLQ, never
        best-effort-parsed.
      properties:
        supported:
          type: array
          minItems: 1
          maxItems: 64
          items:
            type: integer
            minimum: 1
            maximum: 1000
          description: Accepted envelope schema_version values (v1 = [1]).
        envelope_schema_id:
          type: string
          const: "anoryx:event-envelope:v1"
          maxLength: 64
          description: The $id of the envelope schema this contract version pins.

    # ----------------------------------------------------------------------- #
    # O-005 multi-Sentinel coordination: registry, health, coordinated push
    # ----------------------------------------------------------------------- #

    SentinelCapability:
      type: string
      enum:
        - budget_limit
        - model_allowlist
        - model_approval
        - model_denylist
        - code_scan
        - data_lock
      description: |
        A policy facet a Sentinel instance DECLARES it can enforce. Closed set. DECLARED,
        not probed — registration records the claim; it does NOT verify the live Sentinel
        actually enforces the facet.

    HealthStatus:
      type: string
      enum: [unknown, healthy, degraded, unreachable]
      description: |
        Registry health status of a Sentinel instance. `healthy` = REACHABLE per the
        documented health contract, NOT a verification the instance is enforcing policy.
        `unknown` = never health-checked; `degraded` / `unreachable` = contract /
        reachability failure.

    SentinelRegistryEntry:
      type: object
      additionalProperties: false
      required:
        - sentinel_id
        - endpoint
        - capabilities
        - health_status
        - consecutive_failures
        - enabled
        - created_at
        - updated_at
      description: |
        A registered Sentinel instance the Orchestrator coordinates. health_status,
        consecutive_failures, last_checked_at, and last_healthy_at are maintained by the
        registry health cycle; created_at / updated_at are registry bookkeeping.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
          description: Opaque Sentinel deployment id (registry key).
        endpoint:
          type: string
          format: uri
          maxLength: 2048
          description: Sentinel intake base URL (SSRF-validated by the runtime at write time).
        peer_auth_ref:
          type: string
          maxLength: 512
          description: |
            NON-SECRET reference LABEL for the peer credential held elsewhere (e.g. a Vault
            path or deploy-tooling key id). NEVER the secret itself — the secret is never
            stored in or returned by the registry.
        capabilities:
          type: array
          minItems: 1
          maxItems: 16
          items:
            $ref: '#/components/schemas/SentinelCapability'
          description: Declared (not probed) policy facets this instance claims to enforce.
        health_status:
          $ref: '#/components/schemas/HealthStatus'
        consecutive_failures:
          type: integer
          minimum: 0
          maximum: 1000000
          description: Consecutive failed health cycles backing the current health_status.
        last_checked_at:
          type: [string, "null"]
          format: date-time
          maxLength: 64
          description: Timestamp of the last health cycle (RFC 3339, UTC), or null if never checked.
        last_healthy_at:
          type: [string, "null"]
          format: date-time
          maxLength: 64
          description: Timestamp the instance was last observed healthy (RFC 3339, UTC), or null.
        enabled:
          type: boolean
          description: When false the instance is excluded from coordinated pushes and health cycles.
        created_at:
          type: string
          format: date-time
          maxLength: 64
        updated_at:
          type: string
          format: date-time
          maxLength: 64

    SentinelRegistrationRequest:
      type: object
      additionalProperties: false
      required: [sentinel_id, endpoint, capabilities]
      description: |
        A request to register a Sentinel instance. `capabilities` are DECLARED, not
        probed; `endpoint` is SSRF-validated by the runtime; `peer_auth_ref`, when
        present, is a NON-SECRET reference label (never the secret).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        endpoint:
          type: string
          format: uri
          maxLength: 2048
        capabilities:
          type: array
          minItems: 1
          maxItems: 16
          items:
            $ref: '#/components/schemas/SentinelCapability'
        peer_auth_ref:
          type: string
          maxLength: 512
          description: NON-SECRET reference label for the peer credential (never the secret).

    SentinelUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      description: |
        A partial update to a registry entry — any subset of the mutable fields. At least
        one field MUST be present. `endpoint` is SSRF-validated and `capabilities` are
        DECLARED (not probed) exactly as at registration; `peer_auth_ref` is a NON-SECRET
        reference label (never the secret).
      properties:
        endpoint:
          type: string
          format: uri
          maxLength: 2048
        capabilities:
          type: array
          minItems: 1
          maxItems: 16
          items:
            $ref: '#/components/schemas/SentinelCapability'
        peer_auth_ref:
          type: string
          maxLength: 512
          description: NON-SECRET reference label for the peer credential (never the secret).
        enabled:
          type: boolean
          description: Toggle participation in coordinated pushes and health cycles.

    SentinelRegistryList:
      type: object
      additionalProperties: false
      required: [sentinels]
      description: The full list of registered Sentinel entries (operator-scoped).
      properties:
        sentinels:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/SentinelRegistryEntry'

    SentinelDeregistered:
      type: object
      additionalProperties: false
      required: [sentinel_id, deregistered]
      description: Acknowledgement that a Sentinel was removed from the registry.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        deregistered:
          type: boolean
          const: true
          description: Always true on success.

    HealthCheckItem:
      type: object
      additionalProperties: false
      required: [sentinel_id, previous_status, status, consecutive_failures]
      description: |
        One Sentinel's health transition for a cycle. `status` = REACHABLE per the
        documented health contract, NOT verified-enforcing. `reason` (optional) is a
        PII-free, machine-readable cause for a non-healthy status.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        previous_status:
          type: string
          maxLength: 64
          description: The health_status before this cycle (free-form to allow unknown prior values).
        status:
          $ref: '#/components/schemas/HealthStatus'
        consecutive_failures:
          type: integer
          minimum: 0
          maximum: 1000000
        reason:
          type: string
          maxLength: 512
          description: Optional PII-free cause for a non-healthy status.

    HealthCheckResult:
      type: object
      additionalProperties: false
      required: [results]
      description: Per-instance health transitions produced by one health cycle.
      properties:
        results:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/HealthCheckItem'

    CoordinatedPolicyRequest:
      type: object
      additionalProperties: false
      required: [policy]
      description: |
        A coordinated-push submission. `policy` is an already-signed policy record that
        validates against the LOCKED policy.schema.json UNMODIFIED (the same locked schema
        the distribution seam references). Targets are NOT supplied here — the registry
        resolves the registered, enabled, healthy, capability-matching Sentinels.
      properties:
        policy:
          $ref: "../../Anoryx-Sentinel/contracts/policy.schema.json"

    CoordinatedTargetResult:
      type: object
      additionalProperties: false
      required: [sentinel_id, state]
      description: Per-target outcome of a coordinated push (best-effort; no rollback across targets).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        state:
          type: string
          enum: [distributed, failed, skipped]
          description: Outcome for this target. No upstream error bodies are exposed here.
        reason:
          type: string
          maxLength: 512
          description: Optional PII-free cause for a failed or skipped target.

    CoordinatedSkippedTarget:
      type: object
      additionalProperties: false
      required: [sentinel_id, reason]
      description: |
        A registered Sentinel deliberately NOT pushed to this cycle (e.g. disabled,
        unhealthy, or its declared capabilities do not cover the policy).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        reason:
          type: string
          maxLength: 512
          description: PII-free cause for the skip (e.g. capability_not_declared, disabled, unhealthy).

    CoordinatedDistributionResult:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, state, targets, skipped]
      description: |
        The result of a coordinated push. Aggregate `state` plus per-target outcomes and
        the targets skipped. BEST-EFFORT: a per-target failure does not roll back the
        others, and `state: partial` means some targets succeeded while others failed.
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
        policy_id:
          type: string
          format: uuid
          maxLength: 64
          description: Echo of the submitted policy's policy_id.
        state:
          type: string
          enum: [pending, distributed, partial, failed]
          description: Aggregate outcome across all coordinated targets.
        targets:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/CoordinatedTargetResult'
        skipped:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/CoordinatedSkippedTarget'

  responses:
    Unauthorized:
      description: |
        Peer authentication failed — invalid/absent mTLS client certificate or
        (on ingest) a missing/invalid HMAC signature, or (on Delta seams) a
        missing/invalid service token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthorized:
              value:
                error:
                  code: unauthorized
                  message: peer authentication failed
                  request_id: "req-o001-ingest-example-01"
    Forbidden:
      description: |
        Authenticated but not permitted — e.g. an ingest HMAC timestamp outside the
        ±300s replay window, or a signature mismatch.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            forbidden:
              value:
                error:
                  code: signature_invalid
                  message: request signature rejected
                  request_id: "req-o001-ingest-example-01"
    NotFound:
      description: No distribution exists for the supplied distribution_id.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            notFound:
              value:
                error:
                  code: not_found
                  message: distribution not found
                  request_id: "req-o001-query-example-01"
    UnprocessableEntity:
      description: |
        The body failed schema validation against the locked Sentinel schema
        (events.schema.json on ingest, policy.schema.json on distribution).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalid:
              value:
                error:
                  code: schema_invalid
                  message: request body failed schema validation
                  request_id: "req-o001-ingest-example-01"
    Conflict:
      description: |
        The request conflicts with existing state — e.g. registering a sentinel_id that is
        already registered. Reuses the standard Error envelope (no new error shape).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            alreadyRegistered:
              value:
                error:
                  code: already_registered
                  message: sentinel_id already registered
                  request_id: "req-o005-registry-example-01"
