  /v1/relay/dispatch:
    post:
      operationId: relayDispatch
      tags: [relay]
      summary: Dispatch one inter-app AI request through a governed, audited Sentinel relay
      description: |
        Forwards `payload` as the JSON body of a POST to `target_path` on the registered
        Sentinel instance `sentinel_id`, after: (1) resolving source_product from the
        matched relay-source bearer (never from the body); (2) confirming the target is
        registered, enabled, and HEALTHY (O-005 registry); (3) re-validating its endpoint
        through the SSRF gate immediately before the outbound call (never trusting a
        stored endpoint blindly); (4) making exactly ONE outbound attempt (no automatic
        retry — a relay caller that wants a retry issues a new request, since retrying a
        non-idempotent LLM call risks duplicate provider cost); and (5) hash-chain
        auditing the outcome, whether it was FORWARDED (Sentinel answered — any status
        code Sentinel itself returned), BLOCKED (target unknown/disabled/unhealthy/
        SSRF-invalid — nothing was sent), or FAILED (a transport-layer error — Sentinel
        may or may not have received it).

        `target_path` MUST be one of the operator-configured relay-eligible Sentinel
        paths (ORCH_RELAY_ALLOWED_PATHS; defaults to Sentinel's shipped OpenAI-compatible
        surface: /v1/chat/completions, /v1/completions, /v1/models) — a CLOSED allowlist,
        not an open passthrough to any Sentinel route.

        TRANSPARENT RESPONSE: on a forwarded dispatch, this seam returns SENTINEL'S OWN
        status code and body unchanged (a transparent relay, not normalized to 200) — a
        non-2xx from Sentinel (e.g. its F-005 hooks blocked the content) is relayed as-is.

        HONESTY BOUNDARIES (ADR-0009): (a) this seam does NOT re-implement Sentinel's
        PII/injection/secret detection — Sentinel's own gateway does that when the
        request arrives; (b) NO STREAMING in v1 — a `payload.stream: true` request is
        rejected (422); (c) NO AUTOMATIC RETRY — every dispatch is a single attempt.

        Auth: mTLS (peer = Delta or Rendly) AND a relay-source bearer (env-configured per
        source_product) AND the tenant's own Sentinel virtual API key, carried separately
        (see securitySchemes) and forwarded to Sentinel unchanged.
      security:
        - mutualTLS: []
          relaySourceBearer: []
          sentinelAuthorizationHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelayDispatchRequest'
            examples:
              chatCompletion:
                summary: Relay a chat-completions request to a registered Sentinel
                value:
                  tenant_id: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
                  sentinel_id: "sentinel-prod-eu-1"
                  target_path: "/v1/chat/completions"
                  payload:
                    model: "gpt-4o-mini"
                    messages:
                      - role: user
                        content: "Summarize this quarter's board deck."
      responses:
        '200':
          description: |
            Sentinel answered. This is Sentinel's OWN response, unchanged — the status
            code documented here is the common case; a real dispatch may return any
            status Sentinel itself returned (this seam is a transparent relay, not a
            normalizer).
          content:
            application/json:
              schema:
                type: object
                description: Sentinel's raw OpenAI-compatible response body, forwarded unchanged.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          $ref: '#/components/responses/RelayUpstreamError'
        '503':
          $ref: '#/components/responses/RelayTargetUnavailable'

  /v1/identity/events:
    post:
      operationId: ingestIdentityEvent
      tags: [identity]
      summary: Ingest one normalized cross-product identity/access event
      description: |
        Sentinel, Delta, or Rendly each push ONE normalized "who accessed what, where"
        record after their OWN existing auth boundary fires — Sentinel's F-014 SSO login,
        Delta's admin-token use, Rendly's JWT verification. `source_product` is
        SERVER-RESOLVED from the matched identity-source bearer — never accepted from the
        body.

        IDEMPOTENT: a retried push with the same (source_product, idempotency_key) is
        recorded as `disposition: duplicate` (no second row, never an error). Every ingest
        ATTEMPT — fresh accept or duplicate — is hash-chain audited.

        HONESTY BOUNDARY (ADR-0010): this seam does NOT verify, translate, or federate any
        product's credential — it only durably records that a (product-verified) access
        happened. `principal_id` is an OPAQUE identifier in the source product's OWN
        namespace (an admin_user_id, an idp_subject, a static admin slug); no cross-product
        principal-identity mapping is implied or performed.

        Auth: mTLS (peer = the source product) AND an identity-source bearer.
      security:
        - mutualTLS: []
          identitySourceBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityEventIngestRequest'
            examples:
              ssoLogin:
                summary: Sentinel records an operator SSO login
                value:
                  tenant_id: "2a4f8c1e-0012-4b3d-9abc-d1e2f3a4b5c6"
                  principal_type: operator
                  principal_id: "idp-subject-a1b2c3"
                  action: sso_login
                  target: "admin-console"
                  idempotency_key: "sentinel-sso-a1b2c3-1781784000"
                  occurred_at: "2026-07-08T12:00:00Z"
      responses:
        '202':
          description: The event was durably recorded (fresh accept or idempotent duplicate).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityEventIngestAccepted'
              examples:
                accepted:
                  value:
                    status: accepted
                    disposition: accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request body exceeds the maximum allowed size.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      operationId: queryIdentityEvents
      tags: [identity]
      summary: Query this tenant's cross-product identity events (read-only metadata)
      description: |
        Cursor-paginated read of the caller's OWN tenant's identity/access events across
        Sentinel, Delta, and Rendly. Reuses the EXISTING O-006 per-tenant principal
        (`query_service_tokens`) — the SAME credential that already gates `GET /v1/events` —
        rather than a new tenant-read trust root. Results are RLS-scoped to the principal's
        tenant; there is no cross-tenant `tenant_id` filter (unlike `/v1/events`) because
        the principal already fixes the tenant.

        Auth: mTLS (peer = Delta) AND a per-tenant service token (bearer).
      security:
        - mutualTLS: []
          serviceToken: []
      parameters:
        - name: source_product
          in: query
          required: false
          description: Filter to one source product.
          schema:
            type: string
            enum: [sentinel, delta, rendly]
        - name: principal_type
          in: query
          required: false
          schema:
            type: string
            enum: [operator, tenant_user, service_account, peer_credential]
        - name: action
          in: query
          required: false
          schema:
            type: string
            maxLength: 64
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A cursor-paginated page of this tenant's identity events (ascending sequence order).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityEventPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /v1/admin/identity/events/recent:
    get:
      operationId: listRecentIdentityEventsAdmin
      tags: [admin, identity]
      summary: List recent cross-product identity events across ALL tenants (operator-scoped)
      description: |
        Cross-tenant operator fleet-triage view of recent identity/access events — the same
        shape and the SAME operator bearer (`ORCH_ADMIN_TOKEN`) as the O-007 admin reads. A
        tenant's own scoped view is `GET /v1/identity/events`.

        Auth: mTLS (operator host) AND an operator bearer token.
      security:
        - mutualTLS: []
          operatorBearer: []
      parameters:
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A single bounded page of recent identity events across all tenants (newest-first).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminIdentityEventPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:

  securitySchemes:
    mutualTLS:
      type: mutualTLS
      description: |
        Mutual-TLS client-certificate authentication of the PEER PRODUCT (Sentinel
        or Delta). DECLARED here and APPLIED to every operation; certificate
        PROVISIONING and trust-store setup are DEFERRED to O-008 (F-034). Until then
        this scheme is a contract declaration, not a live enforced channel (honesty
        boundary a). mTLS establishes product identity only — it does not sign or
        authorize individual request bodies.

    hmacIngest:
      type: apiKey
      in: header
      name: X-Sentinel-Signature
      description: |
        Per-event HMAC-SHA256 body signature on the ingest seam, reusing the F-020
        webhook pattern (Anoryx-Sentinel/src/orchestration/webhooks/signer.py). The
        signer computes `HMAC-SHA256(signing_secret, "{timestamp}.{body}")` and sends
        the hex digest as `X-Sentinel-Signature: sha256=<hex>`, paired with the
        `X-Sentinel-Timestamp` header (Unix epoch seconds). Receivers MUST reject a
        timestamp outside a ±300s window (replay defense) and MUST recompute and
        compare the digest in constant time. NOTE: `apiKey` is the closest OpenAPI 3.1
        modelable type for an HMAC header; the real semantics (keyed signature over
        timestamp+body, not a static secret) are described here, not in the type. A
        present, well-formed signature is NOT a verified signature.

    serviceToken:
      type: http
      scheme: bearer
      description: |
        Delta service token (bearer) authorizing the distribution + query caller.
        Bearer-only: it authorizes the caller but does NOT sign request bodies (the
        embedded policy compact-JWS does that for distribution). Issued/rotated by
        deploy tooling; provisioning details are out of scope for O-001.
        NOTE (O-006): this COARSE shared `ORCH_SERVICE_TOKEN` gates BOTH the distribution
        GET-status (GET /v1/policies/distributions/{id}) and the distribution WRITE (POST
        /v1/policies/distributions) as a trusted multi-tenant relay — on the POST its inbound
        `tenant_id` is server-resolved from the signed body, not validated per-tenant (O-004
        LOW-1 and LOW-2 BOTH carried forward). For the NEW per-tenant read seams (/v1/events,
        /v1/bus/dlq) the coarse `ORCH_SERVICE_TOKEN` is legacy/not accepted: those seams
        authenticate a PER-TENANT token from `query_service_tokens` presented under this same
        Bearer scheme and enforce per-tenant isolation.

    operatorBearer:
      type: http
      scheme: bearer
      description: |
        O-005 OPERATOR bearer token (env ORCH_ADMIN_TOKEN) authorizing the privileged
        multi-Sentinel coordination operations: registry CRUD, the registry health-check
        cycle, and the coordinated policy push. DISTINCT from the peer `serviceToken`
        (env ORCH_SERVICE_TOKEN) used on the distribution + query seams — that is a
        peer-PRODUCT credential, this is an OPERATOR credential, and the two are NOT
        interchangeable. Bearer-only: it authorizes the operator caller but does NOT sign
        request bodies. The registry is OPERATOR-SCOPED — per-tenant authorization of its
        contents is DEFERRED to O-006, so a token holder operates across tenants; treat
        the token accordingly until O-006 lands. Issued/rotated by deploy tooling;
        provisioning details are out of scope here.

    relaySourceBearer:
      type: http
      scheme: bearer
      description: |
        O-009 RELAY SOURCE bearer token (env ORCH_RELAY_SOURCE_TOKENS, keyed by
        source_product: delta | rendly) authorizing a caller to dispatch inter-app AI
        traffic through the governed relay. source_product is SERVER-RESOLVED from the
        matched token — never accepted from the request body. DISTINCT from every other
        Orchestrator credential (operatorBearer, serviceToken, hmacIngest).

    sentinelAuthorizationHeader:
      type: apiKey
      in: header
      name: X-Sentinel-Authorization
      description: |
        The TENANT'S OWN Sentinel virtual API key (the same credential the tenant would
        present calling Sentinel directly), carried in a header DISTINCT from the relay's
        own `Authorization` (which authenticates the Delta/Rendly source, not the
        tenant). Forwarded to Sentinel UNCHANGED as its `Authorization: Bearer <value>` —
        the Orchestrator never stores, mints, or inspects it (secret hygiene).

    identitySourceBearer:
      type: http
      scheme: bearer
      description: |
        O-010 IDENTITY SOURCE bearer token (env ORCH_IDENTITY_SOURCE_TOKENS, keyed by
        source_product: sentinel | delta | rendly) authorizing a caller to push identity/
        access events into the cross-product correlation log. source_product is
        SERVER-RESOLVED from the matched token — never accepted from the request body.
        DISTINCT from every other Orchestrator credential (operatorBearer, serviceToken,
        hmacIngest, relaySourceBearer).

  parameters:
    IngestTimestamp:
      name: X-Sentinel-Timestamp
      in: header
      required: true
      description: |
        Unix epoch seconds (UTC) of signing, the timestamp half of the HMAC signed
        payload `"{timestamp}.{body}"`. Receivers reject values outside ±300s.
      schema:
        type: string
        # Unix epoch SECONDS: 10 digits today, 11 covers through year ~5138.
        # Nanosecond/millisecond magnitudes are out of contract by construction.
        pattern: '^[0-9]{10,11}$'
        maxLength: 11
      example: "1781784000"

    DistributionId:
      name: distribution_id
      in: path
      required: true
      description: Opaque identifier returned by POST /v1/policies/distributions.
      schema:
        type: string
        format: uuid
        maxLength: 64
      example: "a7b8c9d0-1234-4ef0-9abc-def012345678"

    FilterTenantId:
      name: tenant_id
      in: query
      required: false
      description: Filter events to this tenant (UUID v4).
      schema:
        type: string
        format: uuid
        maxLength: 64

    FilterTeamId:
      name: team_id
      in: query
      required: false
      description: Filter events to this team (UUID v4).
      schema:
        type: string
        format: uuid
        maxLength: 64

    FilterAgentId:
      name: agent_id
      in: query
      required: false
      description: |
        Filter events to this emitting Sentinel component (lowercase slug, e.g.
        `gateway-core`). Matches the agent_id shape in events.schema.json — NOT a UUID,
        NOT the end-user AI model name.
      schema:
        type: string
        pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
        maxLength: 64

    FilterEventType:
      name: event_type
      in: query
      required: false
      description: |
        Filter to a single event_type const (one of the variants in
        events.schema.json, e.g. `policy_decision_deny`).
      schema:
        type: string
        pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
        maxLength: 64

    FilterSince:
      name: since
      in: query
      required: false
      description: Inclusive lower bound on event_timestamp (RFC 3339 date-time, UTC).
      schema:
        type: string
        format: date-time
        maxLength: 64

    FilterUntil:
      name: until
      in: query
      required: false
      description: Exclusive upper bound on event_timestamp (RFC 3339 date-time, UTC).
      schema:
        type: string
        format: date-time
        maxLength: 64

    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of metadata records to return (bounded).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50

    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor from a previous response's next_cursor.
      schema:
        type: string
        maxLength: 512

    FilterReason:
      name: reason
      in: query
      required: false
      description: Filter dead-letter entries to a single failure reason.
      schema:
        $ref: '#/components/schemas/DeadLetterReason'

    FilterSourceProduct:
      name: source_product
      in: query
      required: false
      description: Filter dead-letter entries to a single emitting product.
      schema:
        $ref: '#/components/schemas/SourceProduct'

    SentinelIdPath:
      name: sentinel_id
      in: path
      required: true
      description: |
        Opaque Sentinel deployment id (registry key). Mirrors the sentinel_id shape used
        across the distribution targets and the O-005 registry.
      schema:
        type: string
        pattern: '^[A-Za-z0-9._-]{1,128}$'
        maxLength: 128
      example: "sentinel-prod-eu-1"

  schemas:

    EventIngestAccepted:
      type: object
      additionalProperties: false
      required: [status, event_id]
      description: Acknowledgement that an event was accepted for later processing.
      properties:
        status:
          type: string
          enum: [accepted]
        event_id:
          type: string
          format: uuid
          maxLength: 64
          description: Echo of the accepted event's event_id (the bus dedup key).

    PolicyDistributionTarget:
      type: object
      additionalProperties: false
      required: [sentinel_id]
      description: |
        A distribution target. `sentinel_id` is an OPAQUE Sentinel deployment
        identifier resolved by the O-005 registry; this contract does not define the
        registry or the resolution rules.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
          description: Opaque Sentinel deployment id (registry-resolved in O-005).

    PolicyDistributionRequest:
      type: object
      additionalProperties: false
      required: [policy]
      description: |
        A policy-distribution submission. `policy` is an already-signed policy record
        that validates against the LOCKED policy.schema.json UNMODIFIED (its embedded
        compact-JWS `signature` is the F-008 signing path). `targets` is optional; when
        omitted the distribution engine (O-004) resolves targets from the policy scope.
      properties:
        policy:
          $ref: "../../Anoryx-Sentinel/contracts/policy.schema.json"
        targets:
          type: array
          maxItems: 256
          description: Optional explicit distribution targets.
          items:
            $ref: '#/components/schemas/PolicyDistributionTarget'
        sign_on_behalf:
          type: boolean
          enum: [false]
          default: false
          description: |
            GATED / DISABLED in v1 (honesty boundary b). Constrained to `false` at the
            SCHEMA layer (enum: [false]) so the contract itself rejects `true` — this is
            secure-by-construction, not secure-by-documentation. When false the
            Orchestrator passes the already-signed policy through unchanged. Enabling
            Orchestrator-signing on Delta's behalf is a deliberate trust-surface
            expansion that requires a NEW ADR to widen this field to a plain boolean.
            Holding Delta's signing key is the larger trust surface and is intentionally
            not the default.

    DistributionAccepted:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, state]
      description: Acknowledgement that a distribution request was accepted (not yet delivered).
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
          description: Opaque id for status lookup via GET /v1/policies/distributions/{distribution_id}.
        policy_id:
          type: string
          format: uuid
          maxLength: 64
          description: Echo of the submitted policy's policy_id.
        state:
          type: string
          enum: [pending]
          description: Always 'pending' at acceptance; delivery is asynchronous (O-004).

    DistributionTargetStatus:
      type: object
      additionalProperties: false
      required: [sentinel_id, state]
      description: Per-target delivery state (metadata only).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        state:
          type: string
          enum: [pending, distributed, failed]
          description: Delivery state for this target. No error bodies are exposed here.
        last_attempt_at:
          type: string
          format: date-time
          maxLength: 64
          description: Timestamp of the last delivery attempt (RFC 3339, UTC), if any.

    DistributionStatus:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, state, created_at]
      description: |
        Distribution status for a submitted policy (read-only metadata). Aggregated
        `state` plus per-target states. No policy body is returned.
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
        policy_id:
          type: string
          format: uuid
          maxLength: 64
        state:
          type: string
          enum: [pending, distributed, partial, failed]
          description: Aggregate distribution state across all targets.
        created_at:
          type: string
          format: date-time
          maxLength: 64
        targets:
          type: array
          maxItems: 256
          items:
            $ref: '#/components/schemas/DistributionTargetStatus'

    AdminDistributionSummary:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, tenant_id, policy_type, state, created_at]
      description: |
        A cross-tenant SUMMARY of one policy distribution, for the O-007 operator
        fleet-triage view (GET /v1/admin/distributions/recent). Join key + classification +
        lifecycle state ONLY. It NEVER carries the signed policy body (no signed_record, no
        content_hash) — mirroring the "no payload" discipline of the event reads. Full
        per-target delivery status is read via the existing
        GET /v1/policies/distributions/{distribution_id} seam.
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
        policy_id:
          type: string
          format: uuid
          maxLength: 64
        tenant_id:
          type: string
          format: uuid
          maxLength: 64
        policy_type:
          type: string
          maxLength: 32
          description: |
            One of the six locked policy_type values (membership only; the locked
            policy.schema.json enum is CLOSED and is not redefined here).
        state:
          type: string
          enum: [pending, distributed, partial, failed]
          description: Aggregate distribution state (mirrors DistributionStatus.state).
        created_at:
          type: string
          format: date-time
          maxLength: 64

    AdminDistributionSummaryPage:
      type: object
      additionalProperties: false
      required: [data]
      description: |
        A single bounded "recent N" page of cross-tenant distribution summaries, for the
        O-007 operator fleet-triage view (GET /v1/admin/distributions/recent). Newest-first;
        NO cursor pagination in v1 — a DELIBERATE SIMPLIFICATION for a triage surface, not
        an omission.
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/AdminDistributionSummary'

    EventMetadata:
      type: object
      additionalProperties: false
      required: [event_id, event_type, event_timestamp, tenant_id, team_id, project_id, agent_id]
      description: |
        Metadata-only projection of an ingested event (join keys + type + time). NEVER
        the full event payload (honesty boundary c). All FOUR stable IDs are required:
        every F-002 event variant requires tenant_id/team_id/project_id/agent_id, and
        these four are the join key between Sentinel events and Delta records, so the
        projection guarantees them (tightened during O-002 review; see ADR-0002).
      properties:
        event_id:
          type: string
          format: uuid
          maxLength: 64
        event_type:
          type: string
          pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
          maxLength: 64
        event_timestamp:
          type: string
          format: date-time
          maxLength: 64
        tenant_id:
          type: string
          format: uuid
          maxLength: 64
        team_id:
          type: string
          format: uuid
          maxLength: 64
        project_id:
          type: string
          format: uuid
          maxLength: 64
        agent_id:
          # The fourth stable ID (join key). Lowercase slug, mirroring the agent_id
          # shape in events.schema.json — NOT a UUID, NOT the end-user AI model name.
          type: string
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          maxLength: 64
        request_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,64}$'
          maxLength: 64

    EventMetadataPage:
      type: object
      additionalProperties: false
      required: [data]
      description: A cursor-paginated page of event metadata.
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/EventMetadata'
        next_cursor:
          type: [string, "null"]
          maxLength: 512
          description: Opaque cursor for the next page, or null when no more pages.

    AdminEventMetadataPage:
      type: object
      additionalProperties: false
      required: [data]
      description: |
        A single bounded "recent N" page of event metadata across ALL tenants, for the
        O-007 operator fleet-triage view (GET /v1/admin/events/recent). Reuses the SAME
        EventMetadata projection as EventMetadataPage (join keys + type + time, never a
        payload). Unlike EventMetadataPage there is NO `next_cursor` field: this triage
        surface returns one newest-first page and does NOT paginate in v1 — a DELIBERATE
        SIMPLIFICATION, not an omission (deep, filtered, paginated reads remain the
        per-tenant /v1/events seam).
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/EventMetadata'

    Error:
      type: object
      additionalProperties: false
      required: [error]
      description: |
        Standard error envelope. Never echoes the request body, never contains
        plaintext PII; correlate via request_id.
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:
              type: string
              pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
              maxLength: 64
              description: Stable machine-readable error code slug.
            message:
              type: string
              maxLength: 512
              description: Human-readable, PII-free description.
            request_id:
              type: string
              pattern: '^[A-Za-z0-9._-]{1,64}$'
              maxLength: 64

    # ----------------------------------------------------------------------- #
    # O-002 event bus: envelope-derived enums, DLQ, replay, version negotiation
    # ----------------------------------------------------------------------- #

    SourceProduct:
      type: string
      enum: [sentinel, orchestrator, delta, rendly]
      description: |
        Emitting ecosystem product. Mirrors the source_product enum in
        event-envelope.schema.json. The TRUSTED value is the mTLS-authenticated peer
        identity, never the body (rule 7, ADR-0002).

    DeadLetterReason:
      type: string
      enum:
        - unknown_schema_version
        - payload_schema_invalid
        - source_identity_mismatch
        - idempotency_conflict
        - max_attempts_exceeded
      description: |
        Closed set of reasons an envelope is dead-lettered. unknown_schema_version
        (boundary c); payload_schema_invalid (payload failed events.schema.json);
        source_identity_mismatch (body source_product != mTLS peer); idempotency_conflict
        (dedup-key collision under at-least-once); max_attempts_exceeded (TERMINAL — the
        attempt ceiling that bounds DLQ poisoning).

    DeadLetterMetadata:
      type: object
      additionalProperties: false
      required: [dlq_id, reason, attempt_count, first_failed_at, event_type, source_product, sequence]
      description: |
        Metadata projection of a dead-lettered envelope (read-only). NEVER the preserved
        original_envelope body — the O-001 read-only-metadata boundary forbids re-exposing
        full payloads on a read seam.
      properties:
        dlq_id:
          type: string
          format: uuid
          maxLength: 64
        reason:
          $ref: '#/components/schemas/DeadLetterReason'
        attempt_count:
          type: integer
          minimum: 0
          maximum: 1000
          description: Attempts before dead-lettering. Bounded; max_attempts_exceeded is terminal.
        first_failed_at:
          type: string
          format: date-time
          maxLength: 64
        event_type:
          type: string
          pattern: '^[a-z0-9]+(_[a-z0-9]+)*$'
          maxLength: 64
          description: Classifying event_type of the dead-lettered envelope (triage without the body).
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        sequence:
          type: integer
          minimum: 0
          maximum: 9007199254740991

    DeadLetterMetadataPage:
      type: object
      additionalProperties: false
      required: [data]
      description: A cursor-paginated page of dead-letter entry metadata.
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/DeadLetterMetadata'
        next_cursor:
          type: [string, "null"]
          maxLength: 512
          description: Opaque cursor for the next page, or null when no more pages.

    DeadLetterEnvelope:
      type: object
      additionalProperties: false
      required: [dlq_id, original_envelope, reason, attempt_count, first_failed_at]
      description: |
        The dead-letter FAILURE-ENVELOPE: the original envelope PRESERVED, plus why it
        failed, how many attempts, and when it first failed. This is the full record the
        O-003 DLQ stores and that replay-from-DLQ re-drives; the GET /v1/bus/dlq read seam
        returns only the DeadLetterMetadata projection (never original_envelope — O-001
        read-only-metadata boundary). Closed and bounded (DLQ-poisoning defense).
      properties:
        dlq_id:
          type: string
          format: uuid
          maxLength: 64
        original_envelope:
          $ref: './event-envelope.schema.json'
        reason:
          $ref: '#/components/schemas/DeadLetterReason'
        attempt_count:
          type: integer
          minimum: 0
          maximum: 1000
          description: Attempts before dead-lettering. max_attempts_exceeded is terminal — bounds re-drive (DLQ-poisoning defense).
        first_failed_at:
          type: string
          format: date-time
          maxLength: 64
        last_failed_at:
          type: string
          format: date-time
          maxLength: 64
          description: Timestamp of the most recent failed attempt (RFC 3339, UTC), if any.

    ReplayLimit:
      type: integer
      minimum: 1
      maximum: 1000
      description: |
        Maximum envelopes to replay in one request (bounded 1..1000; replay-amplification
        defense). REQUIRED on every replay selector so the cap is enforced at the schema
        gate, not by a consumer-applied default — the contract's "always with a limit cap"
        guarantee holds structurally.

    ReplayFromSequence:
      type: object
      additionalProperties: false
      required: [source_product, from_sequence, limit]
      description: Replay from an inclusive per-source sequence lower bound.
      properties:
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        from_sequence:
          type: integer
          minimum: 0
          maximum: 9007199254740991
          description: Inclusive lower bound on the per-source monotonic sequence.
        limit:
          $ref: '#/components/schemas/ReplayLimit'

    ReplayFromTimestamp:
      type: object
      additionalProperties: false
      required: [source_product, from_timestamp, limit]
      description: Replay from an inclusive occurred_at lower bound.
      properties:
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        from_timestamp:
          type: string
          format: date-time
          maxLength: 64
          description: Inclusive lower bound on occurred_at (RFC 3339, UTC).
        limit:
          $ref: '#/components/schemas/ReplayLimit'

    ReplayFromDlq:
      type: object
      additionalProperties: false
      required: [source_product, dlq_id, limit]
      description: Re-drive a single dead-lettered entry (replay-from-DLQ).
      properties:
        source_product:
          $ref: '#/components/schemas/SourceProduct'
        dlq_id:
          type: string
          format: uuid
          maxLength: 64
          description: The dead-letter entry to re-drive (from GET /v1/bus/dlq).
        limit:
          $ref: '#/components/schemas/ReplayLimit'

    ReplayRequest:
      description: |
        A BOUNDED replay request. Exactly ONE selector (oneOf) — from_sequence,
        from_timestamp, or dlq_id — plus the source_product stream and a bounded limit.
        Unbounded / full event-store replay is deliberately not expressible
        (replay-amplification defense). CONTRACT-ONLY: acknowledged, not executed
        (honesty boundary a).
      oneOf:
        - $ref: '#/components/schemas/ReplayFromSequence'
        - $ref: '#/components/schemas/ReplayFromTimestamp'
        - $ref: '#/components/schemas/ReplayFromDlq'

    ReplayAccepted:
      type: object
      additionalProperties: false
      required: [replay_id, state]
      description: Acknowledgement that a replay request was accepted (not executed in O-002).
      properties:
        replay_id:
          type: string
          format: uuid
          maxLength: 64
          description: Opaque id for the accepted replay request.
        state:
          type: string
          enum: [pending]
          description: Always 'pending' at acceptance; no replay runs in O-002 (boundary a).

    SchemaVersions:
      type: object
      additionalProperties: false
      required: [supported, envelope_schema_id]
      description: |
        The explicit allow-list of envelope schema_version values this bus accepts, plus
        the envelope schema $id. Backs the reject-to-DLQ rule (boundary c): an inbound
        envelope whose schema_version is not in `supported` is routed to the DLQ, never
        best-effort-parsed.
      properties:
        supported:
          type: array
          minItems: 1
          maxItems: 64
          items:
            type: integer
            minimum: 1
            maximum: 1000
          description: Accepted envelope schema_version values (v1 = [1]).
        envelope_schema_id:
          type: string
          const: "anoryx:event-envelope:v1"
          maxLength: 64
          description: The $id of the envelope schema this contract version pins.

    # ----------------------------------------------------------------------- #
    # O-005 multi-Sentinel coordination: registry, health, coordinated push
    # ----------------------------------------------------------------------- #

    SentinelCapability:
      type: string
      enum:
        - budget_limit
        - model_allowlist
        - model_approval
        - model_denylist
        - code_scan
        - data_lock
      description: |
        A policy facet a Sentinel instance DECLARES it can enforce. Closed set. DECLARED,
        not probed — registration records the claim; it does NOT verify the live Sentinel
        actually enforces the facet.

    HealthStatus:
      type: string
      enum: [unknown, healthy, degraded, unreachable]
      description: |
        Registry health status of a Sentinel instance. `healthy` = REACHABLE per the
        documented health contract, NOT a verification the instance is enforcing policy.
        `unknown` = never health-checked; `degraded` / `unreachable` = contract /
        reachability failure.

    SentinelRegistryEntry:
      type: object
      additionalProperties: false
      required:
        - sentinel_id
        - endpoint
        - capabilities
        - health_status
        - consecutive_failures
        - enabled
        - created_at
        - updated_at
      description: |
        A registered Sentinel instance the Orchestrator coordinates. health_status,
        consecutive_failures, last_checked_at, and last_healthy_at are maintained by the
        registry health cycle; created_at / updated_at are registry bookkeeping.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
          description: Opaque Sentinel deployment id (registry key).
        endpoint:
          type: string
          format: uri
          maxLength: 2048
          description: Sentinel intake base URL (SSRF-validated by the runtime at write time).
        peer_auth_ref:
          type: string
          maxLength: 512
          description: |
            NON-SECRET reference LABEL for the peer credential held elsewhere (e.g. a Vault
            path or deploy-tooling key id). NEVER the secret itself — the secret is never
            stored in or returned by the registry.
        capabilities:
          type: array
          minItems: 1
          maxItems: 16
          items:
            $ref: '#/components/schemas/SentinelCapability'
          description: Declared (not probed) policy facets this instance claims to enforce.
        health_status:
          $ref: '#/components/schemas/HealthStatus'
        consecutive_failures:
          type: integer
          minimum: 0
          maximum: 1000000
          description: Consecutive failed health cycles backing the current health_status.
        last_checked_at:
          type: [string, "null"]
          format: date-time
          maxLength: 64
          description: Timestamp of the last health cycle (RFC 3339, UTC), or null if never checked.
        last_healthy_at:
          type: [string, "null"]
          format: date-time
          maxLength: 64
          description: Timestamp the instance was last observed healthy (RFC 3339, UTC), or null.
        enabled:
          type: boolean
          description: When false the instance is excluded from coordinated pushes and health cycles.
        created_at:
          type: string
          format: date-time
          maxLength: 64
        updated_at:
          type: string
          format: date-time
          maxLength: 64

    SentinelRegistrationRequest:
      type: object
      additionalProperties: false
      required: [sentinel_id, endpoint, capabilities]
      description: |
        A request to register a Sentinel instance. `capabilities` are DECLARED, not
        probed; `endpoint` is SSRF-validated by the runtime; `peer_auth_ref`, when
        present, is a NON-SECRET reference label (never the secret).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        endpoint:
          type: string
          format: uri
          maxLength: 2048
        capabilities:
          type: array
          minItems: 1
          maxItems: 16
          items:
            $ref: '#/components/schemas/SentinelCapability'
        peer_auth_ref:
          type: string
          maxLength: 512
          description: NON-SECRET reference label for the peer credential (never the secret).

    SentinelUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      description: |
        A partial update to a registry entry — any subset of the mutable fields. At least
        one field MUST be present. `endpoint` is SSRF-validated and `capabilities` are
        DECLARED (not probed) exactly as at registration; `peer_auth_ref` is a NON-SECRET
        reference label (never the secret).
      properties:
        endpoint:
          type: string
          format: uri
          maxLength: 2048
        capabilities:
          type: array
          minItems: 1
          maxItems: 16
          items:
            $ref: '#/components/schemas/SentinelCapability'
        peer_auth_ref:
          type: string
          maxLength: 512
          description: NON-SECRET reference label for the peer credential (never the secret).
        enabled:
          type: boolean
          description: Toggle participation in coordinated pushes and health cycles.

    SentinelRegistryList:
      type: object
      additionalProperties: false
      required: [sentinels]
      description: The full list of registered Sentinel entries (operator-scoped).
      properties:
        sentinels:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/SentinelRegistryEntry'

    SentinelDeregistered:
      type: object
      additionalProperties: false
      required: [sentinel_id, deregistered]
      description: Acknowledgement that a Sentinel was removed from the registry.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        deregistered:
          type: boolean
          const: true
          description: Always true on success.

    HealthCheckItem:
      type: object
      additionalProperties: false
      required: [sentinel_id, previous_status, status, consecutive_failures]
      description: |
        One Sentinel's health transition for a cycle. `status` = REACHABLE per the
        documented health contract, NOT verified-enforcing. `reason` (optional) is a
        PII-free, machine-readable cause for a non-healthy status.
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        previous_status:
          type: string
          maxLength: 64
          description: The health_status before this cycle (free-form to allow unknown prior values).
        status:
          $ref: '#/components/schemas/HealthStatus'
        consecutive_failures:
          type: integer
          minimum: 0
          maximum: 1000000
        reason:
          type: string
          maxLength: 512
          description: Optional PII-free cause for a non-healthy status.

    HealthCheckResult:
      type: object
      additionalProperties: false
      required: [results]
      description: Per-instance health transitions produced by one health cycle.
      properties:
        results:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/HealthCheckItem'

    CoordinatedPolicyRequest:
      type: object
      additionalProperties: false
      required: [policy]
      description: |
        A coordinated-push submission. `policy` is an already-signed policy record that
        validates against the LOCKED policy.schema.json UNMODIFIED (the same locked schema
        the distribution seam references). Targets are NOT supplied here — the registry
        resolves the registered, enabled, healthy, capability-matching Sentinels.
      properties:
        policy:
          $ref: "../../Anoryx-Sentinel/contracts/policy.schema.json"

    CoordinatedTargetResult:
      type: object
      additionalProperties: false
      required: [sentinel_id, state]
      description: Per-target outcome of a coordinated push (best-effort; no rollback across targets).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        state:
          type: string
          enum: [distributed, failed, skipped]
          description: Outcome for this target. No upstream error bodies are exposed here.
        reason:
          type: string
          maxLength: 512
          description: Optional PII-free cause for a failed or skipped target.

    CoordinatedSkippedTarget:
      type: object
      additionalProperties: false
      required: [sentinel_id, reason]
      description: |
        A registered Sentinel deliberately NOT pushed to this cycle (e.g. disabled,
        unhealthy, or its declared capabilities do not cover the policy).
      properties:
        sentinel_id:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,128}$'
          maxLength: 128
        reason:
          type: string
          maxLength: 512
          description: PII-free cause for the skip (e.g. capability_not_declared, disabled, unhealthy).

    CoordinatedDistributionResult:
      type: object
      additionalProperties: false
      required: [distribution_id, policy_id, state, targets, skipped]
      description: |
        The result of a coordinated push. Aggregate `state` plus per-target outcomes and
        the targets skipped. BEST-EFFORT: a per-target failure does not roll back the
        others, and `state: partial` means some targets succeeded while others failed.
      properties:
        distribution_id:
          type: string
          format: uuid
          maxLength: 64
        policy_id:
          type: string
          format: uuid
          maxLength: 64
          description: Echo of the submitted policy's policy_id.
        state:
          type: string
          enum: [pending, distributed, partial, failed]
          description: Aggregate outcome across all coordinated targets.
        targets:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/CoordinatedTargetResult'
        skipped:
          type: array
          maxItems: 4096
          items:
            $ref: '#/components/schemas/CoordinatedSkippedTarget'

    RelayDispatchRequest:
      type: object
      description: |
        A single inter-app AI request to relay to a registered Sentinel (O-009,
        ADR-0009). tenant_id is the tenant whose traffic this is (audit attribution);
        sentinel_id names a registry entry (O-005); target_path MUST be one of the
        operator-allowlisted Sentinel paths; payload is forwarded as the outbound JSON
        body (re-serialized, not byte-preserved — there is no signature over it to
        preserve, unlike the O-004 signed policy record).
      additionalProperties: false
      required: [tenant_id, sentinel_id, target_path, payload]
      properties:
        tenant_id:
          type: string
          format: uuid
          maxLength: 64
        sentinel_id:
          type: string
          maxLength: 128
          example: "sentinel-prod-eu-1"
        target_path:
          type: string
          maxLength: 256
          description: One of the operator-configured relay-eligible Sentinel paths.
          example: "/v1/chat/completions"
        payload:
          type: object
          description: |
            Forwarded as the JSON body of the outbound call. `stream: true` is rejected
            (422) — streaming relay is not supported in v1.

    IdentityEventIngestRequest:
      type: object
      description: |
        One normalized "who accessed what, where" record (O-010, ADR-0010). `principal_id`
        is opaque in the SOURCE PRODUCT's own namespace — no cross-product identity mapping
        is implied. `occurred_at` MUST carry an explicit UTC offset.
      additionalProperties: false
      required: [tenant_id, principal_type, principal_id, action, idempotency_key, occurred_at]
      properties:
        tenant_id:
          type: string
          format: uuid
          maxLength: 64
        principal_type:
          type: string
          enum: [operator, tenant_user, service_account, peer_credential]
        principal_id:
          type: string
          maxLength: 256
          example: "idp-subject-a1b2c3"
        action:
          type: string
          maxLength: 64
          example: "sso_login"
        target:
          type: string
          maxLength: 256
          nullable: true
          description: What was accessed, if applicable (opt-in — absent when not meaningful).
        idempotency_key:
          type: string
          maxLength: 128
          description: Source-supplied dedup key, unique per source_product.
        occurred_at:
          type: string
          format: date-time
          description: When the SOURCE product recorded this (ISO-8601, explicit UTC offset required).

    IdentityEventIngestAccepted:
      type: object
      required: [status, disposition]
      properties:
        status:
          type: string
          const: accepted
        disposition:
          type: string
          enum: [accepted, duplicate]
          description: "`duplicate` means an idempotent replay of an already-recorded (source_product, idempotency_key) — not an error."

    IdentityEvent:
      type: object
      description: One correlated identity/access record, as returned by the read seams.
      required:
        [
          tenant_id,
          source_product,
          principal_type,
          principal_id,
          action,
          idempotency_key,
          occurred_at,
          received_at,
        ]
      properties:
        tenant_id:
          type: string
          format: uuid
        source_product:
          type: string
          enum: [sentinel, delta, rendly]
        principal_type:
          type: string
          enum: [operator, tenant_user, service_account, peer_credential]
        principal_id:
          type: string
        action:
          type: string
        target:
          type: string
          nullable: true
        idempotency_key:
          type: string
        occurred_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
          description: When the Orchestrator durably recorded this event.

    IdentityEventPage:
      type: object
      description: A cursor-paginated page of a tenant's own identity events (ascending sequence order).
      required: [data]
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/IdentityEvent'
        next_cursor:
          type: string
          nullable: true
          maxLength: 512

    AdminIdentityEventPage:
      type: object
      description: A single bounded "recent N" page of identity events across ALL tenants (newest-first, no cursor).
      required: [data]
      properties:
        data:
          type: array
          maxItems: 200
          items:
            $ref: '#/components/schemas/IdentityEvent'

  responses:
    Unauthorized:
      description: |
        Peer authentication failed — invalid/absent mTLS client certificate or
        (on ingest) a missing/invalid HMAC signature, or (on Delta seams) a
        missing/invalid service token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unauthorized:
              value:
                error:
                  code: unauthorized
                  message: peer authentication failed
                  request_id: "req-o001-ingest-example-01"
    Forbidden:
      description: |
        Authenticated but not permitted — e.g. an ingest HMAC timestamp outside the
        ±300s replay window, or a signature mismatch.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            forbidden:
              value:
                error:
                  code: signature_invalid
                  message: request signature rejected
                  request_id: "req-o001-ingest-example-01"
    NotFound:
      description: No distribution exists for the supplied distribution_id.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            notFound:
              value:
                error:
                  code: not_found
                  message: distribution not found
                  request_id: "req-o001-query-example-01"
    UnprocessableEntity:
      description: |
        The body failed schema validation against the locked Sentinel schema
        (events.schema.json on ingest, policy.schema.json on distribution).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            invalid:
              value:
                error:
                  code: schema_invalid
                  message: request body failed schema validation
                  request_id: "req-o001-ingest-example-01"
    Conflict:
      description: |
        The request conflicts with existing state — e.g. registering a sentinel_id that is
        already registered. Reuses the standard Error envelope (no new error shape).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            alreadyRegistered:
              value:
                error:
                  code: already_registered
                  message: sentinel_id already registered
    RelayTargetUnavailable:
      description: |
        The target Sentinel is unknown, disabled, unhealthy, or its endpoint fails SSRF
        re-validation. Nothing was sent — recorded as a `blocked` audit disposition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            unhealthy:
              value:
                error:
                  code: target_degraded
                  message: target_degraded
                  request_id: "req-orch-example-01"
    RelayUpstreamError:
      description: |
        The outbound HTTP call to Sentinel failed at the transport layer (connect error /
        timeout). Sentinel may or may not have received the request — recorded as a
        `failed` audit disposition.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          examples:
            connectError:
              value:
                error:
                  code: connect_error
                  message: connect_error
                  request_id: "req-orch-example-01"
                  request_id: "req-o005-registry-example-01"
