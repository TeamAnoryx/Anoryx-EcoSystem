apiVersion: v1
kind: Pod
metadata:
  name: {{ include "orchestrator.fullname" . }}-test-connection
  labels:
    {{- include "orchestrator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: probe
      image: busybox:1.36
      # `helm test` passes iff /health returns HTTP 200 from the live Service.
      command: ["wget"]
      args:
        - "--spider"
        - "-q"
        - "http://{{ include "orchestrator.fullname" . }}:{{ .Values.service.port }}/health"
