# Anoryx-AI-Orchestrator Helm values (O-008, ADR-0008).
# Mirrors Anoryx-Sentinel's F-010 Helm pattern (ADR-0012/ADR-0027), scaled down: the
# Orchestrator has no Redis/MinIO/worker/frontend — it is a single stateless service
# (admin UI is served in-process, see O-007) plus its own bundled-or-external Postgres.
#
# Production checklist (see deploy/DEPLOY-K8s.md):
#   - Set postgres.bundled=false → point at a managed service.
#   - Pre-create the envSecret (ORCH_INGEST_HMAC_SECRET, ORCH_ADMIN_TOKEN, and in
#     external-DB mode ORCH_DATABASE_URL / ORCH_APP_DATABASE_URL) and set envSecret below.
#   - Wire ingress + TLS (cert-manager) at your edge.
#   - mTLS between Sentinel and the Orchestrator ingest seam is NOT provisioned by this
#     chart — an honest, explicit deferral (ADR-0008 §Honest deferrals). The interim
#     peer authenticator is the shared ORCH_INGEST_HMAC_SECRET.

image:
  repository: ghcr.io/teamanoryx/anoryx-orchestrator
  # Defaults to the chart's AppVersion (e.g. 0.1.0). Set to pin an explicit tag.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

replicaCount: 2

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false               # operators wire their own (nginx + cert-manager)
  className: ""
  annotations: {}
  hosts: []
  tls: []

# --- Sensitive config -------------------------------------------------------- #
# Name of a PRE-EXISTING Kubernetes Secret holding the app's sensitive env,
# surfaced via envFrom: secretRef. Create it WITHOUT committing values — see
# deploy/helm/gen-k8s-secret.sh. Required keys (bundled-store demo):
#   ORCH_INGEST_HMAC_SECRET   HMAC secret verifying Sentinel's signed ingest events
#   ORCH_ADMIN_TOKEN          operator bearer for registry CRUD + admin API/UI
# Optional keys: SENTINEL_ADMIN_TOKEN (outbound bearer presented to Sentinel intake).
# External-store mode (bundled=false) ALSO needs: ORCH_DATABASE_URL, ORCH_APP_DATABASE_URL.
envSecret: ""
# Set true ONLY to have the chart render the Secret from secretData below (not
# recommended for production — prefer an externally-managed Secret / ESO).
createEnvSecret: false
secretData: {}                 # map of KEY: value, used only when createEnvSecret=true

# --- Non-secret config (plain env vars) -------------------------------------- #
# JSON object mapping sentinel_id -> base URL for the O-004 static distribution
# targets map (ORCH_DISTRIBUTION_TARGETS). Not sensitive (no credentials). Empty
# means the dynamic registry (O-005) is the only distribution path.
distributionTargets: ""
# Sentinel admin-intake path override (ORCH_SENTINEL_INTAKE_PATH). Empty uses the
# app default ("/admin/policies/intake").
sentinelIntakePath: ""
env: []                        # list of {name, value}
extraEnv: []

# --- Workers ------------------------------------------------------------------ #
workers: 1                     # ORCH_WORKERS

# --- Bundled Postgres (bundled by default; escape hatch below) --------------- #
postgres:
  bundled: true
  image: postgres:16-alpine
  storage: 8Gi
  storageClassName: ""
  auth:
    username: orchestrator
    database: orchestrator_dev
    # Dev-grade default password for the BUNDLED instance. Production uses
    # bundled=false + an external secret.
    password: orchestrator
    existingSecret: ""         # Secret with POSTGRES_PASSWORD (else password above is used)
  resources:
    requests: { cpu: 250m, memory: 256Mi }
    limits: { cpu: "1", memory: 1Gi }
  # Escape hatch — set bundled=false and fill these to use managed Postgres.
  external:
    host: ""
    port: 5432
    database: orchestrator
    secretName: ""             # Secret providing ORCH_DATABASE_URL / ORCH_APP_DATABASE_URL

# --- Schema migrations (pre-upgrade Alembic Job) ------------------------------ #
migrations:
  enabled: true
  # provision the orchestrator_app role password on first run (O-003/O-006).
  provisionAppRole: true

resources:
  requests: { cpu: 250m, memory: 512Mi }
  limits: { cpu: 500m, memory: 1Gi }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# --- NetworkPolicy (restrictive by default, with an honest FQDN limitation) -- #
networkPolicy:
  enabled: true
  # Plain k8s NetworkPolicy cannot match egress by hostname. The chart scopes
  # in-cluster egress to the bundled Postgres pod on its specific port, plus DNS +
  # arbitrary :443 (the O-005 registry targets arbitrary Sentinel instances, whose
  # addresses are not known at chart-render time). To RESTRICT egress by IP set
  # CIDRs here (FQDN rules need a Cilium/Calico CNI).
  sentinelEgressCIDRs: []      # e.g. ["203.0.113.0/24"]
  extraEgress: []
  # Ingress: the O-003 ingest seam (POST /v1/ingest/events) is called by Sentinel
  # instances that may live in a different namespace or cluster — their source is
  # not known at chart-render time, so ingress on the http port is OPEN by default
  # (defense-in-depth is the HMAC signature check at the app layer, ADR-0002/0008).
  # Set ingressCIDRs to restrict inbound to known Sentinel egress ranges.
  ingressCIDRs: []             # e.g. ["203.0.113.0/24"] — empty = open to any source
  extraIngress: []
  # Namespace allowed to scrape /metrics + probes (Prometheus).
  monitoringNamespace: monitoring

serviceAccount:
  create: true
  name: ""
  annotations: {}

# --- Security contexts -------------------------------------------------------- #
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
