{{- if and .Values.postgres.bundled (not .Values.postgres.auth.existingSecret) -}}
# Bundled Postgres password Secret. The password is referenced via
# secretKeyRef so it never appears in a Deployment/Job pod spec (etcd /
# `kubectl get pod -o yaml`). DEV-GRADE — production should use
# postgres.bundled=false with an externally-managed instance + envSecret.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "delta.postgresFullname" . }}
  labels:
    {{- include "delta.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | quote }}
{{- end }}
