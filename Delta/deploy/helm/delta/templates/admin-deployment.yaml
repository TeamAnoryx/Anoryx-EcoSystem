apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "delta.fullname" . }}-admin
  labels:
    {{- include "delta.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  replicas: {{ .Values.admin.replicaCount }}
  selector:
    matchLabels:
      {{- include "delta.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: admin
  template:
    metadata:
      labels:
        {{- include "delta.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: admin
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "delta.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Gate serving on the schema being at head, same as the ingest Deployment.
      initContainers:
        {{- include "delta.waitForPostgres" . | nindent 8 }}
        {{- include "delta.waitForMigrate" . | nindent 8 }}
      containers:
        - name: admin
          image: {{ include "delta.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          # The image's ENTRYPOINT (docker-entrypoint.sh) stays in place — it
          # assembles DATABASE_URL / APP_DATABASE_URL / DELTA_ADMIN_TOKEN from
          # envSecret/pgEnv, then execs these args (its `exec "$@"` tail). No
          # `command:` override here.
          args:
            - uvicorn
            - delta.allocation_admin.app:create_app
            - --factory
            - --host
            - "0.0.0.0"
            - --port
            - {{ .Values.admin.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.admin.service.port }}
              protocol: TCP
          env:
            - name: DELTA_PORT
              value: {{ .Values.admin.service.port | quote }}
            - name: DELTA_APP_USER
              value: "delta_app"
            # Bundled Postgres: connection PARTS + password via secretKeyRef (kept
            # OUT of the pod spec). External mode (bundled=false) supplies full
            # URLs via envSecret instead. The admin app never calls the
            # Orchestrator seam, so delta.orchestratorEnv is intentionally NOT
            # included here.
            {{- include "delta.pgEnv" . | nindent 12 }}
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.envSecret .Values.createEnvSecret }}
          envFrom:
            - secretRef:
                name: {{ include "delta.envSecretName" . }}
          {{- end }}
          # readOnlyRootFilesystem=true -> provide writable scratch dirs.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 24
          resources:
            {{- toYaml .Values.admin.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
